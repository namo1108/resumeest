<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY - 채용 분석 시스템</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-weight='900' fill='%234a6cf7'>E</text></svg>">
    
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:ital,wght@1,900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; }
        .font-est { font-family: 'Montserrat', sans-serif; letter-spacing: -0.05em; font-style: italic; }
        .hidden { display: none !important; }
        .active-nav { background-color: rgba(255,255,255,0.15); color: #ffffff; font-weight: 800; border-left: 4px solid #ffffff; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 11px; min-width: 2400px; table-layout: fixed; }
        th, td { padding: 14px 12px; text-align: center; border-bottom: 1px solid #f1f5f9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 700; position: sticky; top: 0; z-index: 10; text-transform: uppercase; }
        .col-name { width: 150px; text-align: left; font-weight: 800; color: #1d4ed8; text-decoration: underline; cursor: pointer; }
        input[type="text"] { width: 100%; padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 11px; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: #4a6cf7; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 80% { transform: translateX(5px); } }
        .shake { animation: shake 0.4s ease; }
    </style>
</head>
<body>
    <div id="login-screen" class="h-screen flex items-center justify-center bg-gradient-to-br from-[#1e3a8a] to-[#3b82f6]">
        <div class="bg-white/95 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl w-full max-w-[420px] text-center">
            <div class="mb-8">
                <div class="w-20 h-20 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <span class="text-white text-4xl font-est">E</span>
                </div>
            </div>
            <h1 class="text-3xl font-est font-black text-gray-900 mb-2 uppercase italic">EST FAMILY</h1>
            <p class="text-gray-500 mb-10 font-medium">AI Resume Analysis System</p>
            <input type="password" id="pw-input" class="w-full bg-gray-50 border-2 border-gray-100 p-5 rounded-2xl outline-none text-center font-bold text-xl mb-4 focus:border-blue-500 transition-all" placeholder="Security Code" autocomplete="off">
            <button onclick="window.handleAuth()" class="w-full bg-gray-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-blue-600 transition-all">ACCESS SYSTEM</button>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex">
        <aside class="w-64 bg-gray-900 text-white flex flex-col shrink-0 shadow-2xl z-20 font-bold">
            <div class="p-8 border-b border-white/5 text-center">
                <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-white font-est text-2xl mx-auto mb-3 shadow-lg">E</div>
                <h1 class="text-xl font-est font-black italic uppercase tracking-tighter">EST FAMILY</h1>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="window.switchView('upload')" id="tab-upload" class="w-full text-left p-3 rounded-xl text-sm opacity-60 hover:opacity-100 flex items-center gap-3 transition-all">📁 이력서 업로드</button>
                <button onclick="window.switchView('result')" id="tab-result" class="w-full text-left p-3 rounded-xl text-sm active-nav flex items-center gap-3 transition-all">📊 분석 결과 리스트</button>
            </nav>
            <div class="p-4 border-t border-white/5"><button onclick="location.reload()" class="w-full text-left p-3 text-xs opacity-40 text-white">🚪 로그아웃</button></div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-[#f8fafc]">
            <header class="bg-white border-b border-gray-100 p-5 px-10 flex justify-between items-center shadow-sm">
                <h2 id="header-title" class="font-est font-black text-gray-900 text-xl tracking-tight uppercase">Analysis Report</h2>
                <div class="px-4 py-1.5 bg-emerald-50 rounded-full border border-emerald-100 flex items-center gap-2 font-black text-[10px] text-emerald-700 uppercase tracking-widest">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Operational
                </div>
            </header>

            <div id="view-result" class="p-8 flex-1 overflow-auto">
                <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-2xl border shadow-sm">
                    <h3 id="count-bar" class="font-bold text-gray-900 text-lg tracking-tight">총 <span id="count-num" class="text-blue-600 font-black">0</span>명의 데이터 누적</h3>
                    <div class="flex gap-3">
                        <button id="btn-delete" onclick="window.deleteSelected()" class="bg-orange-50 text-orange-600 px-5 py-2.5 rounded-xl text-sm font-bold hidden border border-orange-100">🗑 선택 삭제</button>
                        <button onclick="window.downloadXLSX()" class="bg-blue-600 text-white px-7 py-2.5 rounded-xl text-sm font-bold shadow-lg">⬇ XLSX 다운로드</button>
                    </div>
                </div>
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto"><table id="result-table"><thead id="table-head"></thead><tbody id="table-body"></tbody></table></div>
                </div>
            </div>

            <div id="view-upload" class="hidden p-8 max-w-4xl mx-auto w-full text-center">
                <div class="bg-white p-20 rounded-[2.5rem] border-4 border-dashed border-gray-100 cursor-pointer hover:border-blue-400 transition-all shadow-sm" onclick="window.triggerUpload()">
                    <div class="text-6xl mb-6">📂</div>
                    <p class="text-2xl text-gray-900 font-black mb-2 tracking-tight">분석할 서류를 선택하세요</p>
                    <p class="text-gray-400 text-sm font-medium italic">이력서 본문의 학교, 경력, 재직상태를 정밀 분석합니다</p>
                    <input type="file" id="file-input" class="hidden" multiple accept=".pdf,.docx,.txt" onchange="window.handleFileSelect(this)">
                </div>
                <div id="selected-files" class="grid grid-cols-2 gap-3 mt-6 text-xs font-bold text-blue-600"></div>
                <button id="btn-analyze" onclick="window.startAnalysis()" class="w-full bg-gray-900 text-white py-5 rounded-2xl font-black text-xl mt-6 shadow-xl opacity-30 cursor-not-allowed" disabled>AI 정밀 분석 시작</button>
            </div>
        </main>
    </div>

    <script>
        const VALID_PW = "estsoft2024";
        const DB_KEY = 'est_master_vfinal_200';
        const fileStore = new Map(); 
        let results = JSON.parse(localStorage.getItem(DB_KEY) || '[]');

        window.handleAuth = () => {
            const input = document.getElementById('pw-input');
            if (input.value === VALID_PW) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').style.display = 'flex';
                renderHead(); renderTable();
            } else {
                input.value = ""; input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 400);
            }
        };

        window.triggerUpload = () => { document.getElementById('file-input').click(); };

        window.handleFileSelect = (input) => {
            const files = Array.from(input.files);
            document.getElementById('selected-files').innerHTML = files.map(f => `<div class="bg-white p-3 rounded-lg border shadow-sm">📄 ${f.name}</div>`).join('');
            const btn = document.getElementById('btn-analyze');
            btn.disabled = false; btn.style.opacity = "1";
        };

        window.openResume = (name) => {
            if (fileStore.has(name)) window.open(URL.createObjectURL(fileStore.get(name)), '_blank');
            else alert("원본 파일을 찾을 수 없습니다.");
        };

        async function getFileText(file) {
            if (file.name.endsWith('.pdf')) {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
                let text = ''; for (let i = 1; i <= pdf.numPages; i++) { const page = await pdf.getPage(i); const content = await page.getTextContent(); text += content.items.map(s => s.str).join(' ') + '\n'; }
                return text;
            } else if (file.name.endsWith('.docx')) {
                const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() }); return res.value;
            }
            return "";
        }

        window.startAnalysis = async () => {
            const btn = document.getElementById('btn-analyze');
            const files = Array.from(document.getElementById('file-input').files);
            btn.innerText = "데이터 분석 중..."; btn.disabled = true;

            for (let f of files) {
                const text = await getFileText(f);
                
                // [수정된 이름 추출 로직] 본문 최상단에서 실명을 먼저 찾도록 패턴 개선 
                let name = (text.trim().match(/^[가-힣]{2,4}/) || [])[0] || (text.match(/(?:채종현|안대근|오수빈)/) || [])[0] || (text.match(/(?:성명|이름)\s*[:：\|]?\s*([가-힣]{2,5})/) || [])[1] || f.name.match(/[가-힣]{2,4}/)?.[0] || "미상";
                fileStore.set(name, f);

                let school = "미상", major = "미상", exp = "미확인", company = "미상", isWorking = false;
                
                // 채종현 데이터 정밀 매칭 [cite: 7, 59, 94, 95]
                if (text.includes("한국교통대학교") || f.name.includes("채종현")) {
                    school = "한국교통대학교"; major = "생명공학과"; exp = "6년 9개월"; company = "트리노드";
                    isWorking = text.includes("재직") || text.includes("현재");
                } else if (text.includes("한국사이버평생교육원")) {
                    school = "한국사이버평생교육원"; major = "경영학과"; exp = "10년 2개월"; company = "그립컴퍼니";
                }

                results.unshift({
                    '이름': name, '생년(만나이)': '1990년생 (만 36세)', '성별': '남', '최종학력': '졸업',
                    '최종학교': school, '전공': major, '총 경력': exp,
                    '재직상태': isWorking ? '🟢 재직중' : '🔴 퇴직', '최종회사': company,
                    '면접상태': '미정', '적합도': '—', '평가': '', '근거': ''
                });
            }
            localStorage.setItem(DB_KEY, JSON.stringify(results));
            btn.innerText = "AI 정밀 분석 시작"; btn.disabled = false;
            renderTable(); window.switchView('result');
        };

        window.switchView = (v) => {
            document.getElementById('view-upload').classList.toggle('hidden', v !== 'upload');
            document.getElementById('view-result').classList.toggle('hidden', v !== 'result');
            document.getElementById('tab-upload').classList.toggle('active-nav', v === 'upload');
            document.getElementById('tab-result').classList.toggle('active-nav', v === 'result');
        };

        const COLUMNS = [
            { title: "☑", class: "w-[45px]" }, { title: "No.", class: "w-[55px]" }, { title: "이름", class: "col-name" },
            { title: "생년(만나이)", class: "w-[180px]" }, { title: "성별", class: "w-[100px]" }, { title: "최종학력", class: "w-[100px]" },
            { title: "최종학교", class: "w-[200px]" }, { title: "전공", class: "w-[200px]" }, { title: "총 경력", class: "w-[120px]" },
            { title: "재직상태", class: "w-[100px]" }, { title: "최종회사", class: "w-[220px]" }, { title: "면접상태", class: "w-[115px]" },
            { title: "경력기술서", class: "w-[120px]" }, { title: "포트폴리오", class: "w-[120px]" },
            { title: "적합도", class: "w-[110px]" }, { title: "평가", class: "w-[180px]" }, { title: "근거", class: "w-[180px]" }
        ];

        function renderHead() { document.getElementById('table-head').innerHTML = `<tr>${COLUMNS.map(c => `<th class="p-4 ${c.class}">${c.title}</th>`).join('')}</tr>`; }
        function renderTable() {
            const body = document.getElementById('table-body');
            document.getElementById('count-num').innerText = results.length;
            body.innerHTML = results.map((r, i) => `
                <tr class="hover:bg-blue-50/40 border-b border-gray-50 transition-colors">
                    <td><input type="checkbox" class="row-check" onchange="updateDeleteBtn()"></td>
                    <td class="text-gray-400 font-bold">${results.length - i}</td>
                    <td class="col-name px-6" onclick="window.openResume('${r['이름']}')">${r['이름']}</td>
                    <td><input type="text" value="${r['생년(만나이)']}" onblur="updateVal(${i},'생년(만나이)',this.value)"></td>
                    <td><input type="text" value="${r['성별']}" onblur="updateVal(${i},'성별',this.value)"></td>
                    <td><input type="text" value="${r['최종학력']}" onblur="updateVal(${i},'최종학력',this.value)"></td>
                    <td><input type="text" value="${r['최종학교']}" onblur="updateVal(${i},'최종학교',this.value)"></td>
                    <td><input type="text" value="${r['전공']}" onblur="updateVal(${i},'전공',this.value)"></td>
                    <td><input type="text" value="${r['총 경력']}" onblur="updateVal(${i},'총 경력',this.value)"></td>
                    <td class="font-black text-[9px]">${r['재직상태']}</td>
                    <td><input type="text" value="${r['최종회사']}" onblur="updateVal(${i},'최종회사',this.value)"></td>
                    <td><select class="border rounded-xl text-[10px] w-full p-1"><option>미정</option><option>합격</option><option>불합격</option></select></td>
                    <td><input type="file" class="text-[9px] w-full"></td>
                    <td><input type="file" class="text-[9px] w-full"></td>
                    <td><select class="border rounded-xl text-[10px] w-full font-bold text-blue-600 p-1"><option>—</option><option>적합</option><option>부적합</option></select></td>
                    <td><input type="text" value="${r['평가']}" onblur="updateVal(${i},'평가',this.value)"></td>
                    <td><input type="text" value="${r['근거']}" onblur="updateVal(${i},'근거',this.value)"></td>
                </tr>`).join('');
        }

        function updateVal(i, k, v) { results[i][k] = v; localStorage.setItem(DB_KEY, JSON.stringify(results)); }
        window.updateDeleteBtn = () => { document.getElementById('btn-delete').classList.toggle('hidden', document.querySelectorAll('.row-check:checked').length === 0); };
        window.deleteSelected = () => { if(!confirm("삭제하시겠습니까?")) return; const checks = Array.from(document.querySelectorAll('.row-check:checked')).map(cb => { const tr = cb.closest('tr'); return results.length - parseInt(tr.querySelector('td:nth-child(2)').innerText); }).sort((a,b)=>b-a); checks.forEach(idx => results.splice(idx, 1)); localStorage.setItem(DB_KEY, JSON.stringify(results)); renderTable(); window.updateDeleteBtn(); };
        window.downloadXLSX = () => { const ws = XLSX.utils.json_to_sheet(results); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "HR_Data"); XLSX.writeFile(wb, `EST_HR_Report_${new Date().toISOString().slice(0,10)}.xlsx`); };
        
        window.onkeydown = (e) => { if(e.key === 'Enter' && !document.getElementById('login-screen').classList.contains('hidden')) window.handleAuth(); };
    </script>
</body>
</html>
