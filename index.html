<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY - 채용 이력서 분석 시스템</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-weight='900' fill='%234a6cf7'>E</text></svg>">
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; }
        .hidden { display: none !important; }
        .active-nav { background-color: rgba(255,255,255,0.2); color: #ffffff; font-weight: 800; border-left: 4px solid #ffffff; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 11px; min-width: 1600px; }
        th, td { padding: 14px 12px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 700; position: sticky; top: 0; z-index: 10; }
        .cell-school { min-width: 200px; font-weight: 700; color: #1e293b; text-align: left; }
        .cell-name { font-weight: 800; color: #0f172a; text-align: left; min-width: 150px; }

        /* 로그인 오류 shake 애니메이션 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.4s ease; }
    </style>
</head>
<body>

    <!-- 로그인 화면 -->
    <div id="login-screen" class="h-screen flex items-center justify-center bg-gradient-to-br from-[#1e3a8a] via-[#4a6cf7] to-[#93c5fd]">
        <div class="bg-white p-12 rounded-3xl shadow-2xl w-[420px] text-center relative overflow-hidden">
            <div class="w-20 h-20 bg-gradient-to-br from-[#4a6cf7] to-[#1e3a8a] rounded-3xl mx-auto mb-8 flex items-center justify-center text-white font-black text-3xl shadow-lg">E</div>
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2 tracking-tighter">이력서 분석 시스템</h1>
            <p class="text-sm text-gray-500 mb-10 font-medium">접근하려면 비밀번호를 입력하세요</p>
            <input type="password" id="pw-input"
                class="w-full border-2 border-gray-100 p-5 rounded-xl mb-3 outline-none focus:border-[#4a6cf7] text-center font-bold bg-white transition-colors"
                placeholder="비밀번호 입력" autocomplete="off">
            <!-- 인라인 오류 메시지 (alert 대체) -->
            <p id="login-error" class="hidden text-red-500 text-sm font-bold mb-5">비밀번호가 올바르지 않습니다.</p>
            <div class="mb-0 h-3"></div>
            <button id="login-btn"
                class="w-full bg-[#1e3a8a] text-white py-5 rounded-xl font-bold hover:bg-blue-800 shadow-lg text-lg transition-all active:scale-[0.98]">
                시스템 로그인
            </button>
        </div>
    </div>

    <!-- 메인 앱 -->
    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-64 bg-gradient-to-b from-[#1e3a8a] to-[#1e40af] text-white flex flex-col shrink-0 shadow-2xl z-20">
            <div class="p-7 border-b border-white/10 flex items-center gap-3">
                <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center text-white font-black text-xl">E</div>
                <div>
                    <h1 class="text-xl font-extrabold italic uppercase leading-none tracking-tight">EST FAMILY</h1>
                    <p class="text-[10px] text-white/50 mt-1 uppercase">HR System</p>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-2 font-bold">
                <button id="tab-btn-upload"
                    class="w-full text-left p-4 rounded-xl text-sm opacity-70 hover:opacity-100 flex items-center gap-3 transition-all">
                    📁 이력서 업로드
                </button>
                <button id="tab-btn-result"
                    class="w-full text-left p-4 rounded-xl text-sm active-nav flex items-center gap-3 transition-all">
                    📊 분석 결과 리스트
                </button>
            </nav>
            <!-- 로그아웃 버튼 -->
            <div class="p-4 border-t border-white/10">
                <button id="logout-btn"
                    class="w-full text-left p-3 rounded-xl text-xs opacity-50 hover:opacity-90 flex items-center gap-3 transition-all text-white font-bold">
                    🚪 로그아웃
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-[#f1f5f9]">
            <header class="bg-white border-b border-gray-100 p-5 px-9 flex justify-between items-center shadow-sm z-10">
                <h2 id="header-title" class="font-extrabold text-gray-900 text-xl">분석 결과 리스트</h2>
                <div class="px-4 py-1.5 bg-green-50 rounded-full border border-green-100 flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[11px] font-extrabold text-green-700 tracking-widest uppercase">System Online</span>
                </div>
            </header>

            <!-- 결과 뷰 -->
            <div id="view-result" class="p-9 flex-1 overflow-auto">
                <div class="bg-white p-6 rounded-2xl mb-7 shadow-sm border border-gray-100 flex justify-between items-center">
                    <div>
                        <h3 id="count-bar" class="font-bold text-gray-900 text-base">
                            총 <span class="text-blue-600 font-black text-xl">0</span>명의 데이터 누적
                        </h3>
                    </div>
                    <div class="flex gap-3">
                        <button id="btn-delete-selected"
                            class="bg-orange-50 text-orange-500 border border-orange-200 px-5 py-3 rounded-xl text-sm font-bold hover:bg-orange-100 transition-colors hidden">
                            🗑 선택 삭제
                        </button>
                        <button id="btn-clear"
                            class="bg-red-50 text-red-500 border border-red-100 px-5 py-3 rounded-xl text-sm font-bold hover:bg-red-100 transition-colors">
                            전체 초기화
                        </button>
                        <button id="btn-download"
                            class="bg-[#4a6cf7] text-white px-7 py-3 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700 transition-colors">
                            ⬇ XLSX 다운로드
                        </button>
                    </div>
                </div>
                <div class="bg-white rounded-3xl border border-gray-100 overflow-x-auto shadow-sm">
                    <table id="result-table">
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- 업로드 뷰 -->
            <div id="view-upload" class="hidden p-9 max-w-3xl mx-auto w-full space-y-7 text-center">
                <div class="bg-white p-16 rounded-3xl border-4 border-dashed border-gray-200 cursor-pointer hover:border-blue-400 transition-colors" id="drop-zone">
                    <div class="text-6xl mb-7">📂</div>
                    <p class="text-2xl text-blue-700 font-extrabold">분석할 이력서를 선택하세요</p>
                    <p class="text-sm text-gray-400 mt-2.5 font-medium">PDF, HWP, DOCX, TXT 지원 (개별 데이터 자동 추출)</p>
                    <input type="file" id="file-input" class="hidden" multiple accept=".pdf,.hwp,.docx,.doc,.txt">
                </div>
                <div id="selected-files" class="grid grid-cols-2 gap-3 text-xs text-gray-500 font-bold px-2 text-center"></div>
                <button id="btn-analyze"
                    class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl opacity-30 cursor-not-allowed transition-all shadow-xl"
                    disabled>
                    AI 정밀 분석 시작
                </button>
            </div>
        </main>
    </div>

    <script>
        // ──────────────────────────────────────────────
        //  설정 & 전역 상태
        // ──────────────────────────────────────────────
        const VALID_PW = "estsoft2024";
        const CURRENT_YEAR = 2026;
        const DB_KEY = 'est_final_master_db';
        const SESSION_KEY = 'est_auth';
        const COLUMNS = [
            "☑", "No.", "이름", "생년(만나이)", "성별", "최종학력",
            "최종학교", "전공", "총 경력", "재직상태", "최종회사",
            "면접상태", "이력서", "적합도", "평가", "근거"
        ];

        let results = JSON.parse(localStorage.getItem(DB_KEY) || '[]');

        // ──────────────────────────────────────────────
        //  유틸
        // ──────────────────────────────────────────────
        function saveData() {
            localStorage.setItem(DB_KEY, JSON.stringify(results));
        }

        // 경력 문자열 → 총 개월 수 파싱 ("10년 2개월", "3년", "8개월", "신입" 등)
        function parseExpMonths(str) {
            if (!str) return 0;
            const s = str.replace(/\s/g, '');
            let months = 0;
            const y = s.match(/(\d+)년/); if (y) months += parseInt(y[1]) * 12;
            const m = s.match(/(\d+)개월/); if (m) months += parseInt(m[1]);
            return months;
        }
        function formatExp(months) {
            if (months === 0) return '신입';
            const y = Math.floor(months / 12), m = months % 12;
            return y > 0 && m > 0 ? `${y}년 ${m}개월` : y > 0 ? `${y}년` : `${m}개월`;
        }

        // 최종회사 텍스트 → 재직상태 뱃지
        function statusBadge(company, exp) {
            const c = (company || '').toLowerCase();
            if (!company || company === '-' || company === '') {
                if ((exp || '').includes('신입') || (exp || '').includes('재학')) {
                    return '<span class="px-2 py-0.5 rounded-full text-[9px] font-black bg-blue-100 text-blue-600">신입</span>';
                }
                return '<span class="px-2 py-0.5 rounded-full text-[9px] font-black bg-gray-100 text-gray-400">미확인</span>';
            }
            if (c.includes('재직중') || c.includes('재직')) {
                return '<span class="px-2 py-0.5 rounded-full text-[9px] font-black bg-green-100 text-green-700">🟢 재직중</span>';
            }
            if (c.includes('퇴직') || c.includes('이직') || c.includes('퇴사')) {
                return '<span class="px-2 py-0.5 rounded-full text-[9px] font-black bg-red-100 text-red-600">🔴 퇴직</span>';
            }
            // 괄호 없으면 퇴직으로 처리
            return '<span class="px-2 py-0.5 rounded-full text-[9px] font-black bg-gray-100 text-gray-500">🔴 퇴직</span>';
        }

        // 선택 삭제
        function deleteSelected() {
            const checked = Array.from(document.querySelectorAll('.row-check:checked'))
                .map(cb => parseInt(cb.dataset.index));
            if (checked.length === 0) return;
            if (!confirm(`선택한 ${checked.length}명을 삭제하시겠습니까?`)) return;
            results = results.filter((_, i) => !checked.includes(i));
            saveData();
            renderTable();
        }

        // 체크박스 상태에 따라 선택삭제 버튼 토글
        function updateDeleteBtn() {
            const any = document.querySelectorAll('.row-check:checked').length > 0;
            document.getElementById('btn-delete-selected').classList.toggle('hidden', !any);
        }

        // ──────────────────────────────────────────────
        //  로그인 / 로그아웃
        // ──────────────────────────────────────────────
        function enterApp() {
            // sessionStorage에 인증 상태 저장 → 새로고침해도 로그인 유지
            sessionStorage.setItem(SESSION_KEY, '1');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            renderHead();
            renderTable();
        }

        function logout() {
            sessionStorage.removeItem(SESSION_KEY);
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('pw-input').value = '';
            document.getElementById('login-error').classList.add('hidden');
        }

        // ──────────────────────────────────────────────
        //  초기화 & 이벤트 바인딩
        // ──────────────────────────────────────────────
        window.addEventListener('load', () => {
            // 세션 유지 확인 (새로고침 시 재로그인 불필요)
            if (sessionStorage.getItem(SESSION_KEY) === '1') {
                enterApp();
            }

            const pwInput  = document.getElementById('pw-input');
            const loginBtn = document.getElementById('login-btn');
            const loginErr = document.getElementById('login-error');

            const handleAuth = () => {
                if (pwInput.value === VALID_PW) {
                    loginErr.classList.add('hidden');
                    enterApp();
                } else {
                    // 인라인 오류 표시 + shake 애니메이션
                    loginErr.classList.remove('hidden');
                    pwInput.value = '';
                    pwInput.classList.add('shake');
                    pwInput.style.borderColor = '#ef4444';
                    setTimeout(() => {
                        pwInput.classList.remove('shake');
                        pwInput.style.borderColor = '';
                        pwInput.focus();
                    }, 500);
                }
            };

            loginBtn.addEventListener('click', handleAuth);
            pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleAuth(); });
            // 입력 시작 시 오류 메시지 숨김
            pwInput.addEventListener('input', () => {
                loginErr.classList.add('hidden');
                pwInput.style.borderColor = '';
            });

            document.getElementById('logout-btn').addEventListener('click', logout);
            document.getElementById('tab-btn-upload').onclick = () => switchView('upload');
            document.getElementById('tab-btn-result').onclick = () => switchView('result');

            const fileInput = document.getElementById('file-input');
            document.getElementById('drop-zone').onclick = () => fileInput.click();
            fileInput.onchange = handleFileSelect;
            document.getElementById('btn-analyze').onclick = startAnalysis;
            document.getElementById('btn-download').onclick = downloadXLSX;
            document.getElementById('btn-clear').onclick = clearAllData;
            document.getElementById('btn-delete-selected').onclick = deleteSelected;

            // ── 테이블 이벤트 위임: 한 번만 등록 ──
            const tbody = document.getElementById('table-body');
            tbody.addEventListener('change', function(e) {
                const idx = parseInt(e.target.dataset.index);
                if (e.target.classList.contains('row-check')) { updateDeleteBtn(); return; }
                if (isNaN(idx)) return;
                if (e.target.classList.contains('interview-select')) { results[idx]['면접상태'] = e.target.value; saveData(); }
                if (e.target.classList.contains('fit-select'))       { results[idx]['적합도']   = e.target.value; saveData(); }
            });
            tbody.addEventListener('blur', function(e) {
                const idx = parseInt(e.target.dataset.index);
                if (isNaN(idx)) return;
                if (e.target.classList.contains('exp-input'))     { results[idx]['총 경력'] = e.target.value; saveData(); }
                if (e.target.classList.contains('company-input')) { results[idx]['최종회사'] = e.target.value; saveData(); }
                if (e.target.classList.contains('eval-input'))    { results[idx]['평가']     = e.target.value; saveData(); }
                if (e.target.classList.contains('note-input'))    { results[idx]['근거']     = e.target.value; saveData(); }
            }, true);
        });

        // ──────────────────────────────────────────────
        //  뷰 전환
        // ──────────────────────────────────────────────
        function switchView(view) {
            document.getElementById('view-upload').classList.toggle('hidden', view !== 'upload');
            document.getElementById('view-result').classList.toggle('hidden', view !== 'result');
            document.getElementById('tab-btn-upload').classList.toggle('active-nav', view === 'upload');
            document.getElementById('tab-btn-result').classList.toggle('active-nav', view === 'result');
            document.getElementById('header-title').innerText =
                view === 'upload' ? '이력서 업로드' : '분석 결과 리스트';
        }

        // ──────────────────────────────────────────────
        //  파일 선택
        // ──────────────────────────────────────────────
        function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            document.getElementById('selected-files').innerHTML = files
                .map(f => `<div class="bg-gray-100 p-3 rounded-xl border border-gray-200 text-blue-600 font-bold">📄 ${f.name}</div>`)
                .join('');
            const btn = document.getElementById('btn-analyze');
            btn.disabled          = files.length === 0;
            btn.style.opacity     = files.length > 0 ? '1'           : '0.3';
            btn.style.cursor      = files.length > 0 ? 'pointer'     : 'not-allowed';
        }

        // ──────────────────────────────────────────────
        //  파일 텍스트 추출
        // ──────────────────────────────────────────────
        function readAsText(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload  = e => resolve(e.target.result || '');
                reader.onerror = () => resolve('');
                reader.readAsText(file, 'UTF-8');
            });
        }

        async function extractPdfText(file) {
            try {
                pdfjsLib.GlobalWorkerOptions.workerSrc =
                    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const buf = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
                let text = '';
                for (let p = 1; p <= pdf.numPages; p++) {
                    const page    = await pdf.getPage(p);
                    const content = await page.getTextContent();
                    text += content.items.map(i => i.str).join(' ') + '\n';
                }
                return text;
            } catch { return ''; }
        }

        async function extractDocxText(file) {
            try {
                const buf    = await file.arrayBuffer();
                const result = await mammoth.extractRawText({ arrayBuffer: buf });
                return result.value || '';
            } catch { return ''; }
        }

        async function getFileText(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'pdf')                   return extractPdfText(file);
            if (ext === 'docx' || ext === 'doc') return extractDocxText(file);
            if (ext === 'txt')                   return readAsText(file);
            return ''; // hwp 등은 빈 문자열 (파일명 기반 폴백)
        }

        // ──────────────────────────────────────────────
        //  한국어 이력서 파서
        // ──────────────────────────────────────────────
        function parseResume(text, fname) {
            const t = text || '';

            // ── 이름 ──
            let name = '';
            const nmMatch = t.match(/(?:이름|성명)\s*[:：\|]?\s*([가-힣]{2,5})/);
            if (nmMatch) { name = nmMatch[1]; }
            else {
                // 파일명에서 한글 이름 추출
                const fnBase = fname.replace(/\.(pdf|docx?|hwp|txt)$/i, '');
                const korMatch = fnBase.match(/[가-힣]{2,5}/);
                name = korMatch ? korMatch[0] : fnBase.split('_')[0] || fnBase.split('.')[0];
            }

            // ── 생년월일 & 성별 ──
            let birth = 1990, gender = '남';
            const bdMatch = t.match(/(?:생년월일|생일|출생일)\s*[:：]?\s*(\d{4})[.\-\/년]?\s*(\d{1,2})?/)
                         || t.match(/(\d{4})년\s*\d{1,2}월\s*\d{1,2}일\s*(?:생|출생)/);
            if (bdMatch) birth = parseInt(bdMatch[1]);
            else {
                // 주민번호 패턴
                const juminMatch = t.match(/(\d{2})(\d{2})(\d{2})\s*[-*]+\s*([1-4])/);
                if (juminMatch) {
                    const y2 = parseInt(juminMatch[1]), gen = parseInt(juminMatch[4]);
                    birth  = (gen <= 2) ? 1900 + y2 : 2000 + y2;
                    gender = (gen % 2 === 1) ? '남' : '여';
                } else {
                    // 파일명에서 연도 추출
                    const yrMatch = fname.match(/(\d{4})/);
                    if (yrMatch) birth = parseInt(yrMatch[1]);
                }
            }
            const gMatch = t.match(/성별\s*[:：]?\s*(남|여)/);
            if (gMatch) gender = gMatch[1];

            // ── 학력 ──
            let edu = '대졸', school = '';
            if (t.match(/대학원\s*(졸업|수료)/)) edu = '대학원졸';
            else if (t.match(/전문대|전문학교/)) edu = '전문대졸';
            else if (t.match(/고등학교|고졸/))   edu = '고졸';

            const schoolPatterns = [
                /([가-힣]{2,12}(?:대학교|사이버대학교|사이버평생교육원|평생교육원|사이버대))/,
                /([가-힣]{2,12}(?:대학|전문대학))/
            ];
            for (const p of schoolPatterns) {
                const m = t.match(p);
                if (m) { school = m[1]; break; }
            }

            // ── 전공 ──
            let major = '';
            const majorPatterns = [
                /(?:전공|학과|학부|계열)\s*[:：]?\s*([가-힣A-Za-z·\s]{2,20}(?:학과|학부|공학|과|전공|계열))/,
                /([가-힣A-Za-z]{2,15}(?:학과|공학과|학부))/
            ];
            for (const p of majorPatterns) {
                const m = t.match(p);
                if (m) { major = m[1].trim(); break; }
            }

            // ── 경력 계산 (날짜 범위 합산) ──
            let totalMonths = 0;
            const entries = [];

            // 패턴: 2019.03 ~ 2023.02 / 2019년 3월 ~ 2023년 2월 / 2019-03 ~ 현재
            const rangeRe = /(\d{4})[.\-년\/]\s*(\d{1,2})[월]?\s*[~\-–~]\s*(?:(\d{4})[.\-년\/]\s*(\d{1,2})[월]?|(현재|재직중|현직|재직))/g;
            let m;
            while ((m = rangeRe.exec(t)) !== null) {
                const sy = parseInt(m[1]), sm = parseInt(m[2]);
                let ey, em, cur = false;
                if (m[5]) { ey = CURRENT_YEAR; em = new Date().getMonth() + 1; cur = true; }
                else       { ey = parseInt(m[3]); em = parseInt(m[4]); }
                const dur = (ey - sy) * 12 + (em - sm);
                if (dur > 0 && dur < 600) {
                    totalMonths += dur;
                    entries.push({ sy, sm, ey, em, cur, pos: m.index });
                }
            }

            // ── 최종회사 ──
            let company = '';
            if (entries.length > 0) {
                const latest = entries.reduce((a, b) =>
                    (a.sy * 12 + a.sm) >= (b.sy * 12 + b.sm) ? a : b);

                // 해당 날짜 앞뒤 150자 내 회사명 탐색
                const ctx = t.substring(Math.max(0, latest.pos - 150), latest.pos + 50);
                const coPatterns = [
                    /(?:\(주\)|\(유\)|주식회사)\s*([가-힣A-Za-z][가-힣A-Za-z0-9\s]{1,20})/,
                    /([가-힣A-Za-z][가-힣A-Za-z0-9\s]{1,15}(?:주식회사|\(주\)|컴퍼니|코리아|그룹|테크|시스템|솔루션|서비스|파트너스|엔터|홀딩스))/,
                    /([가-힣A-Za-z][가-힣A-Za-z0-9\s]{2,15}(?:회사|기업|법인))/
                ];
                for (const p of coPatterns) {
                    const cm = ctx.match(p);
                    if (cm) { company = cm[0].trim(); break; }
                }
                if (latest.cur && company) company = company.replace(/\s*\(재직중\)$/,'') + '(재직중)';
                else if (latest.cur) company = '재직중';
            }

            // ── 신입 fallback ──
            const expStr = totalMonths > 0
                ? formatExp(totalMonths)
                : (t.match(/신입|재학|졸업예정/) ? '신입' : '');

            return {
                name    : name || '미확인',
                birth,
                gender,
                edu,
                school  : school  || '미확인',
                major   : major   || '미확인',
                exp     : expStr  || '미확인',
                company : company || '미확인'
            };
        }

        // ──────────────────────────────────────────────
        //  분석 (파일 내용 파싱)
        // ──────────────────────────────────────────────
        async function startAnalysis() {
            const btn   = document.getElementById('btn-analyze');
            const files = Array.from(document.getElementById('file-input').files);
            btn.disabled      = true;
            btn.style.opacity = '0.6';

            let added = 0;
            for (let fi = 0; fi < files.length; fi++) {
                const file  = files[fi];
                btn.innerText = `분석 중... (${fi + 1}/${files.length}) ${file.name}`;

                const text = await getFileText(file);
                const d    = parseResume(text, file.name);

                // 중복 방지
                if (results.some(r => r['이름'] === d.name)) continue;

                results.unshift({
                    'No.'         : 0,
                    '이름'        : d.name,
                    '생년(만나이)': `${d.birth}년생 (만 ${CURRENT_YEAR - d.birth}세)`,
                    '성별'        : d.gender,
                    '최종학력'    : d.edu,
                    '최종학교'    : d.school,
                    '전공'        : d.major,
                    '총 경력'     : d.exp,
                    '최종회사'    : d.company,
                    '면접상태'    : '미정',
                    '이력서'      : '',
                    '적합도'      : '',
                    '평가'        : '',
                    '근거'        : ''
                });
                added++;
            }

            saveData();
            btn.innerText     = 'AI 정밀 분석 시작';
            btn.disabled      = true;
            btn.style.opacity = '0.3';
            btn.style.cursor  = 'not-allowed';
            document.getElementById('file-input').value = '';
            document.getElementById('selected-files').innerHTML = '';

            if (added === 0) alert('이미 등록된 이력서이거나 추가된 데이터가 없습니다.');

            renderTable();
            switchView('result');
        }

        // ──────────────────────────────────────────────
        //  전체 초기화
        // ──────────────────────────────────────────────
        function clearAllData() {
            if (!confirm('모든 데이터를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
            results = [];
            saveData();
            renderTable();
        }

        // ──────────────────────────────────────────────
        //  테이블 렌더
        // ──────────────────────────────────────────────
        function renderHead() {
            document.getElementById('table-head').innerHTML =
                `<tr>${COLUMNS.map((c, i) => i === 0
                    ? `<th class="p-4 text-[10px]"><input type="checkbox" id="check-all" class="cursor-pointer"></th>`
                    : `<th class="p-4 text-[10px] uppercase tracking-wider">${c}</th>`
                ).join('')}</tr>`;
            // 전체선택
            document.getElementById('check-all').addEventListener('change', function() {
                document.querySelectorAll('.row-check').forEach(cb => cb.checked = this.checked);
                updateDeleteBtn();
            });
        }

        function updateCountBar() {
            const totalMonths = results.reduce((sum, r) => sum + parseExpMonths(r['총 경력']), 0);
            const el = document.getElementById('count-bar');
            if (el) el.innerHTML = `총 <span class="text-blue-600 font-black text-xl">${results.length}</span>명의 데이터 누적`
                + (totalMonths > 0 ? `&nbsp;&nbsp;<span class="text-xs text-gray-400">전체 경력 합산 <span class="text-indigo-600 font-bold">${formatExp(totalMonths)}</span></span>` : '');
        }

        function renderTable() {
            const body = document.getElementById('table-body');

            if (results.length === 0) {
                updateCountBar();
                body.innerHTML = `<tr>
                    <td colspan="16" class="p-32 text-gray-300 font-bold text-lg uppercase text-center">
                        No Data Accumulated
                    </td>
                </tr>`;
                return;
            }

            updateCountBar();

            body.innerHTML = results.map((r, i) => `
                <tr class="hover:bg-blue-50/40 transition-colors border-b border-gray-50 font-medium text-gray-700" data-index="${i}">
                    <td class="text-center px-2">
                        <input type="checkbox" class="row-check cursor-pointer" data-index="${i}">
                    </td>
                    <td class="text-gray-400 font-semibold text-center">${results.length - i}</td>
                    <td class="cell-name py-4 px-6 text-left">${r['이름']}</td>
                    <td class="text-blue-700 font-black text-center">${r['생년(만나이)']}</td>
                    <td class="text-center">${r['성별']}</td>
                    <td class="text-center">${r['최종학력']}</td>
                    <td class="cell-school px-6 text-left">${r['최종학교']}</td>
                    <td class="text-blue-600 font-black text-[10px] px-6 text-left whitespace-pre-line">${r['전공']}</td>
                    <!-- 총 경력: 인라인 수정 가능 -->
                    <td class="text-center px-2">
                        <input type="text"
                            class="border rounded px-2 py-1 text-[10px] w-24 bg-white outline-none focus:ring-1 ring-blue-500 exp-input"
                            data-index="${i}" value="${(r['총 경력'] || '').replace(/"/g, '&quot;')}" placeholder="경력 입력">
                    </td>
                    <!-- 재직상태 자동 뱃지 -->
                    <td class="text-center px-2">${statusBadge(r['최종회사'], r['총 경력'])}</td>
                    <!-- 최종회사: 인라인 수정 가능 -->
                    <td class="text-left px-3">
                        <input type="text"
                            class="border rounded px-2 py-1 text-[10px] w-36 bg-white outline-none focus:ring-1 ring-blue-500 company-input"
                            data-index="${i}" value="${(r['최종회사'] || '').replace(/"/g, '&quot;')}" placeholder="회사명 입력">
                    </td>

                    <!-- 면접상태: 변경 즉시 localStorage 저장 -->
                    <td class="text-center">
                        <select class="border rounded-md px-1 py-1 text-[10px] bg-white outline-none focus:ring-1 ring-blue-500 interview-select" data-index="${i}">
                            ${['미정','서류통과','1차합격','최종합격','불합격','보류']
                                .map(v => `<option${r['면접상태'] === v ? ' selected' : ''}>${v}</option>`).join('')}
                        </select>
                    </td>

                    <!-- 이력서 링크 -->
                    <td class="text-center text-gray-400 text-[10px]">${r['이력서'] || '—'}</td>

                    <!-- 적합도: 드롭다운, 저장 -->
                    <td class="text-center">
                        <select class="border rounded-md px-1 py-1 text-[10px] bg-white outline-none focus:ring-1 ring-blue-500 fit-select" data-index="${i}">
                            ${[['', '—'],['매우적합','매우적합'],['적합','적합'],['보통','보통'],['부적합','부적합']]
                                .map(([v, l]) => `<option value="${v}"${r['적합도'] === v ? ' selected' : ''}>${l}</option>`).join('')}
                        </select>
                    </td>

                    <!-- 평가: 텍스트 입력, blur 시 저장 -->
                    <td class="text-center px-2">
                        <input type="text"
                            class="border rounded px-2 py-1 text-[10px] w-24 bg-white outline-none focus:ring-1 ring-blue-500 eval-input"
                            data-index="${i}" placeholder="평가 메모" value="${(r['평가'] || '').replace(/"/g, '&quot;')}">
                    </td>

                    <!-- 근거: 텍스트 입력, blur 시 저장 -->
                    <td class="text-center px-2">
                        <input type="text"
                            class="border rounded px-2 py-1 text-[10px] w-28 bg-white outline-none focus:ring-1 ring-blue-500 note-input"
                            data-index="${i}" placeholder="근거 메모" value="${(r['근거'] || '').replace(/"/g, '&quot;')}">
                    </td>
                </tr>`).join('');

        }

        // ──────────────────────────────────────────────
        //  XLSX 다운로드 (전체 컬럼 정상 내보내기)
        // ──────────────────────────────────────────────
        function downloadXLSX() {
            if (results.length === 0) return alert('데이터가 없습니다.');

            const exportData = results.map((r, i) => ({
                'No.'         : results.length - i,
                '이름'        : r['이름'],
                '생년(만나이)': r['생년(만나이)'],
                '성별'        : r['성별'],
                '최종학력'    : r['최종학력'],
                '최종학교'    : r['최종학교'],
                '전공'        : r['전공'],
                '총 경력'     : r['총 경력'],
                '최종회사'    : r['최종회사'],
                '면접상태'    : r['면접상태'],
                '이력서'      : r['이력서']  || '',
                '적합도'      : r['적합도']  || '',
                '평가'        : r['평가']    || '',
                '근거'        : r['근거']    || ''
            }));

            const ws = XLSX.utils.json_to_sheet(exportData);

            // 컬럼 너비 설정
            ws['!cols'] = [
                { wch: 5 }, { wch: 10 }, { wch: 22 }, { wch: 6 }, { wch: 10 },
                { wch: 26 }, { wch: 22 }, { wch: 14 }, { wch: 26 }, { wch: 10 },
                { wch: 15 }, { wch: 10 }, { wch: 20 }, { wch: 25 }
            ];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '분석결과');
            XLSX.writeFile(wb, `EST_FAMILY_분석데이터_${new Date().toISOString().slice(0, 10)}.xlsx`);
        }
    </script>
</body>
