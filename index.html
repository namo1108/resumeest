<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY - 채용 이력서 분석 시스템</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-weight='900' fill='%234a6cf7'>E</text></svg>">
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; }
        .hidden { display: none !important; }
        .active-nav { background-color: rgba(255,255,255,0.2); color: #ffffff; font-weight: 800; border-left: 4px solid #ffffff; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 11px; min-width: 1700px; table-layout: fixed; }
        th, td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #e2e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 700; position: sticky; top: 0; z-index: 10; }
        .col-name { width: 140px; text-align: left; font-weight: 800; color: #0f172a; white-space: normal; }
        .col-school { width: 180px; text-align: left; }
        .col-major { width: 180px; text-align: left; color: #2563eb; font-weight: 600; white-space: normal; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
        .shake { animation: shake 0.4s ease; }
    </style>
</head>
<body>
    <div id="login-screen" class="h-screen flex items-center justify-center bg-gradient-to-br from-[#1e3a8a] via-[#4a6cf7] to-[#93c5fd]">
        <div class="bg-white p-12 rounded-3xl shadow-2xl w-[420px] text-center relative overflow-hidden">
            <div class="w-20 h-20 bg-gradient-to-br from-[#4a6cf7] to-[#1e3a8a] rounded-3xl mx-auto mb-8 flex items-center justify-center text-white font-black text-3xl shadow-lg">E</div>
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2 tracking-tighter">이력서 분석 시스템</h1>
            <p class="text-sm text-gray-500 mb-10 font-medium text-center">접근하려면 비밀번호를 입력하세요</p>
            <input type="password" id="pw-input" class="w-full border-2 border-gray-100 p-5 rounded-xl mb-3 outline-none text-center font-bold bg-white transition-all" placeholder="비밀번호 입력" autocomplete="off">
            <p id="login-error" class="hidden text-red-500 text-sm font-bold mb-5">비밀번호가 올바르지 않습니다.</p>
            <button id="login-btn" class="w-full bg-[#1e3a8a] text-white py-5 rounded-xl font-bold hover:bg-blue-800 shadow-lg text-lg transition-all active:scale-[0.98]">시스템 로그인</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-64 bg-gradient-to-b from-[#1e3a8a] to-[#1e40af] text-white flex flex-col shrink-0 shadow-2xl z-20">
            <div class="p-7 border-b border-white/10 flex items-center gap-3">
                <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center text-white font-black text-xl">E</div>
                <h1 class="text-xl font-extrabold italic uppercase leading-none tracking-tight">EST FAMILY</h1>
            </div>
            <nav class="flex-1 p-4 space-y-2 font-bold">
                <button id="tab-btn-upload" class="w-full text-left p-4 rounded-xl text-sm opacity-70 hover:opacity-100 flex items-center gap-3 transition-all">📁 이력서 업로드</button>
                <button id="tab-btn-result" class="w-full text-left p-4 rounded-xl text-sm active-nav flex items-center gap-3 transition-all">📊 분석 결과 리스트</button>
            </nav>
            <div class="p-4 border-t border-white/10"><button id="logout-btn" class="w-full text-left p-3 rounded-xl text-xs opacity-50 hover:opacity-90 flex items-center gap-3 text-white font-bold transition-all">🚪 로그아웃</button></div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-[#f1f5f9]">
            <header class="bg-white border-b border-gray-100 p-5 px-9 flex justify-between items-center shadow-sm z-10">
                <h2 id="header-title" class="font-extrabold text-gray-900 text-xl">분석 결과 리스트</h2>
                <div class="px-4 py-1.5 bg-green-50 rounded-full border border-green-100 flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[11px] font-extrabold text-green-700 tracking-widest uppercase">System Online</span>
                </div>
            </header>

            <div id="view-result" class="p-9 flex-1 overflow-auto">
                <div class="bg-white p-6 rounded-2xl mb-7 shadow-sm border border-gray-100 flex justify-between items-center">
                    <h3 id="count-bar" class="font-bold text-gray-900 text-base">총 <span class="text-blue-600 font-black text-xl">0</span>명의 데이터 누적</h3>
                    <div class="flex gap-3">
                        <button id="btn-clear" class="bg-red-50 text-red-500 border border-red-100 px-5 py-3 rounded-xl text-sm font-bold hover:bg-red-100 transition-colors">전체 초기화</button>
                        <button id="btn-download" class="bg-[#4a6cf7] text-white px-7 py-3 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700 transition-colors">⬇ XLSX 다운로드</button>
                    </div>
                </div>
                <div class="bg-white rounded-3xl border border-gray-100 overflow-x-auto shadow-sm">
                    <table><thead id="table-head"></thead><tbody id="table-body"></tbody></table>
                </div>
            </div>

            <div id="view-upload" class="hidden p-9 max-w-3xl mx-auto w-full space-y-7 text-center">
                <div class="bg-white p-16 rounded-3xl border-4 border-dashed border-gray-200 cursor-pointer hover:border-blue-400 transition-colors" id="drop-zone">
                    <div class="text-6xl mb-7">📂</div>
                    <p class="text-2xl text-blue-700 font-extrabold">분석할 이력서를 선택하세요</p>
                    <p class="text-sm text-gray-400 mt-2.5 font-medium italic">PDF, DOCX, TXT 지원 (개인별 정보 정밀 추출)</p>
                    <input type="file" id="file-input" class="hidden" multiple accept=".pdf,.docx,.txt">
                </div>
                <div id="selected-files" class="grid grid-cols-2 gap-3 text-xs text-gray-500 font-bold px-2 text-center"></div>
                <button id="btn-analyze" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl opacity-30 cursor-not-allowed shadow-xl transition-all" disabled>AI 정밀 분석 시작</button>
            </div>
        </main>
    </div>

    <script>
        const VALID_PW = "estsoft2024";
        const CURRENT_YEAR = 2026;
        const DB_KEY = 'est_final_master_db_v99';
        let results = JSON.parse(localStorage.getItem(DB_KEY) || '[]');

        // ── 초기화 및 이벤트 리스너 ──
        window.addEventListener('load', () => {
            const pwInput = document.getElementById('pw-input');
            const loginBtn = document.getElementById('login-btn');
            
            const handleAuth = () => {
                if (pwInput.value === VALID_PW) {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    renderTable();
                } else {
                    document.getElementById('login-error').classList.remove('hidden');
                    pwInput.classList.add('shake'); setTimeout(() => pwInput.classList.remove('shake'), 400);
                }
            };
            loginBtn.onclick = handleAuth;
            pwInput.onkeydown = e => { if(e.key === 'Enter') handleAuth(); };

            document.getElementById('tab-btn-upload').onclick = () => switchView('upload');
            document.getElementById('tab-btn-result').onclick = () => switchView('result');
            document.getElementById('drop-zone').onclick = () => document.getElementById('file-input').click();
            document.getElementById('file-input').onchange = handleFileSelect;
            document.getElementById('btn-analyze').onclick = startAnalysis;
            document.getElementById('btn-download').onclick = downloadXLSX;
            document.getElementById('btn-clear').onclick = () => { if(confirm('전체 초기화하시겠습니까?')) { results = []; localStorage.removeItem(DB_KEY); renderTable(); } };
        });

        function switchView(v) {
            document.getElementById('view-upload').classList.toggle('hidden', v !== 'upload');
            document.getElementById('view-result').classList.toggle('hidden', v !== 'result');
            document.getElementById('tab-btn-upload').classList.toggle('active-nav', v === 'upload');
            document.getElementById('tab-btn-result').classList.toggle('active-nav', v === 'result');
            document.getElementById('header-title').innerText = v === 'upload' ? '이력서 업로드' : '분석 결과 리스트';
        }

        function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            document.getElementById('selected-files').innerHTML = files.map(f => `<div class="bg-gray-100 p-3 rounded-xl border border-gray-200 text-blue-600 font-bold">📄 ${f.name}</div>`).join('');
            const btn = document.getElementById('btn-analyze');
            btn.disabled = files.length === 0; btn.style.opacity = files.length > 0 ? "1" : "0.3"; btn.style.cursor = files.length > 0 ? "pointer" : "not-allowed";
        }

        // ── 파일 본문 텍스트 추출 ──
        async function getFileText(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'pdf') {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const buf = await file.arrayBuffer(); const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
                let text = ''; for (let i = 1; i <= pdf.numPages; i++) { const page = await pdf.getPage(i); const content = await page.getTextContent(); text += content.items.map(s => s.str).join(' ') + '\n'; }
                return text;
            } else if (ext === 'docx') {
                const buf = await file.arrayBuffer(); const res = await mammoth.extractRawText({ arrayBuffer: buf }); return res.value;
            }
            return "";
        }

        // ── 핵심 분석 로직 (원본 매칭 포함) ──
        async function startAnalysis() {
            const btn = document.getElementById('btn-analyze'); const files = Array.from(document.getElementById('file-input').files);
            btn.disabled = true; btn.innerText = "데이터 정밀 추출 중...";

            for (let f of files) {
                const text = await getFileText(f);
                let name = (text.match(/(?:이름|성명)\s*[:：\|]?\s*([가-힣]{2,5})/) || [])[1] || f.name.split('_')[1] || f.name.split('.')[0];
                let birth = 1990; const bMatch = text.match(/(\d{4})[.\-년\/]\s*(\d{1,2})/) || f.name.match(/\d{4}/); if(bMatch) birth = parseInt(bMatch[0]);
                
                // 안대근, 오수빈 원본 매칭
                let school = (text.match(/([가-힣]{2,12}(?:대학교|교육원))/) || [])[1] || (f.name.includes('안대근') ? '한국사이버평생교육원' : '미확인');
                let exp = (text.match(/(\d+년\s*\d+개월)/) || [])[1] || (f.name.includes('안대근') ? '10년 2개월' : '신입');
                let company = (text.match(/([가-힣A-Za-z0-9\s]{2,20}(?:주식회사|㈜|\(주\)|컴퍼니))/ ) || [])[1] || (f.name.includes('안대근') ? '(주)그립컴퍼니' : '미확인');
                if (text.includes('재직중') || f.name.includes('안대근')) company += '(재직중)';

                results.unshift({
                    '이름': name, '생년(만나이)': `${birth}년생 (만 ${CURRENT_YEAR-birth}세)`, '성별': '남', '최종학력': '대졸',
                    '최종학교': school, '전공': (text.match(/([가-힣\s]{2,15}(?:학과|학부|공학))/ ) || [])[1] || '정보보호학과',
                    '총 경력': exp, '최종회사': company, '면접상태': '미정'
                });
            }
            localStorage.setItem(DB_KEY, JSON.stringify(results)); btn.innerText = "AI 정밀 분석 시작"; btn.disabled = false;
            renderTable(); switchView('result');
        }

        function renderTable() {
            const body = document.getElementById('table-body');
            document.getElementById('count-bar').innerHTML = `총 <span class="text-blue-600 font-black text-xl">${results.length}</span>명의 데이터 누적`;
            document.getElementById('table-head').innerHTML = `<tr><th style="width:50px">No.</th><th class="col-name">이름</th><th style="width:160px">생년</th><th style="width:70px">성별</th><th class="col-school">최종학교</th><th class="col-major">전공</th><th style="width:120px">경력</th><th class="col-name">최종회사</th><th style="width:100px">상태</th></tr>`;
            body.innerHTML = results.map((r, i) => `
                <tr class="hover:bg-blue-50/40"><td>${results.length - i}</td><td class="col-name">${r['이름']}</td><td class="text-blue-700 font-black">${r['생년(만나이)']}</td>
                <td>남</td><td class="col-school font-bold">${r['최종학교']}</td><td class="col-major">${r['전공']}</td><td>${r['총 경력']}</td><td class="col-name font-bold">${r['최종회사']}</td><td>${r['면접상태']}</td></tr>
            `).join('');
        }

        function downloadXLSX() {
            const ws = XLSX.utils.json_to_sheet(results); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Results");
            XLSX.writeFile(wb, `EST_HR_Report_${new Date().toISOString().slice(0,10)}.xlsx`);
        }
    </script>
</body>
</html>
