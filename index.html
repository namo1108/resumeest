<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY - 채용 이력서 분석 시스템</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-weight='900' fill='%234a6cf7'>E</text></svg>">
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f1f5f9; margin: 0; }
        .hidden { display: none !important; }
        .active-nav { background-color: rgba(255,255,255,0.18); color: #ffffff; font-weight: 800; border-left: 4px solid #ffffff; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 11px; min-width: 1450px; }
        th, td { padding: 14px 12px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 700; position: sticky; top: 0; z-index: 10; }
        .cell-school { min-width: 180px; font-weight: 700; color: #1e293b; text-align: left; }
        .cell-name { font-weight: 800; color: #0f172a; text-align: left; min-width: 150px; }
    </style>
</head>
<body>
    <div id="login-screen" class="h-screen flex items-center justify-center bg-gradient-to-br from-[#1e3a8a] via-[#4a6cf7] to-[#93c5fd]">
        <div class="bg-white p-12 rounded-3xl shadow-2xl w-[420px] text-center relative overflow-hidden">
            <div class="w-20 h-20 bg-gradient-to-br from-[#4a6cf7] to-[#1e3a8a] rounded-3xl mx-auto mb-8 flex items-center justify-center text-white font-black text-3xl shadow-lg">E</div>
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2 tracking-tighter">이력서 분석 시스템</h1>
            <p class="text-sm text-gray-500 mb-10 font-medium">접근하려면 비밀번호를 입력하세요</p>
            <input type="password" id="pw-input" class="w-full border-2 border-gray-100 p-5 rounded-xl mb-6 outline-none focus:border-[#4a6cf7] text-center font-bold bg-white" placeholder="비밀번호 입력" onkeypress="if(event.keyCode===13) checkAuth()">
            <button onclick="checkAuth()" class="w-full bg-[#1e3a8a] text-white py-5 rounded-xl font-bold hover:bg-blue-800 shadow-lg text-lg">시스템 로그인</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-64 bg-gradient-to-b from-[#1e3a8a] to-[#1e40af] text-white flex flex-col shrink-0 shadow-2xl z-20">
            <div class="p-7 border-b border-white/10 flex items-center gap-3">
                <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center text-white font-black text-xl">E</div>
                <div>
                    <h1 class="text-xl font-extrabold italic tracking-tighter uppercase leading-none">EST FAMILY</h1>
                    <p class="text-[10px] text-white/50 mt-1 tracking-widest">HR ANALYSIS SYSTEM</p>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-2 font-bold">
                <button onclick="switchTab('upload')" id="nav-upload" class="w-full text-left p-4 rounded-xl text-sm opacity-70 hover:opacity-100 flex items-center gap-3 transition-all"><span class="text-lg">📁</span> 이력서 업로드</button>
                <button onclick="switchTab('result')" id="nav-result" class="w-full text-left p-4 rounded-xl text-sm active-nav flex items-center gap-3 transition-all"><span class="text-lg">📊</span> 분석 결과 리스트</button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white border-b border-gray-100 p-5 px-9 flex justify-between items-center shadow-sm z-10">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">📊</span>
                    <h2 id="header-title" class="font-extrabold text-gray-900 text-xl">분석 결과 리스트</h2>
                </div>
                <div class="flex items-center gap-2.5 px-4 py-1.5 bg-green-50 rounded-full border border-green-100">
                    <span class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[11px] font-extrabold text-green-700 tracking-widest uppercase">System Online</span>
                </div>
            </header>

            <div id="tab-result" class="p-9 flex-1 overflow-auto">
                <div class="bg-white p-6 rounded-2xl mb-7 shadow-sm border border-gray-100 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-gray-900 text-base">총 <span id="count" class="text-blue-600 font-black text-xl">0</span>명의 누적 데이터</h3>
                        <p class="text-xs text-gray-400 mt-1 font-medium italic">성함, 학교풀네임, 총경력, 재직여부가 자동으로 분석됩니다.</p>
                    </div>
                    <button onclick="downloadXLSX()" class="bg-[#4a6cf7] text-white px-7 py-3 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700 transition active:scale-95">⬇ XLSX 다운로드</button>
                </div>
                
                <div class="bg-white rounded-3xl border border-gray-100 overflow-x-auto shadow-sm">
                    <table id="result-table">
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-upload" class="hidden p-9 max-w-3xl mx-auto w-full space-y-7 text-center">
                <div class="bg-white p-16 rounded-3xl border-4 border-dashed border-gray-200 cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-all shadow-sm" onclick="document.getElementById('file-input').click()">
                    <div class="text-6xl mb-7">📂</div>
                    <p class="text-2xl text-blue-700 font-extrabold tracking-tight">분석할 이력서를 선택하세요</p>
                    <p class="text-sm text-gray-400 mt-2.5 font-medium">PDF, HWP, DOCX 지원 (성함/학교/경력 자동추출)</p>
                    <input type="file" id="file-input" class="hidden" multiple accept=".pdf,.hwp,.docx,.doc,.txt" onchange="handleFileSelect(this)">
                </div>
                <div id="selected-files" class="grid grid-cols-2 gap-3 text-xs text-gray-600 font-semibold px-2"></div>
                <button id="btn-analyze" onclick="startAnalysis()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl opacity-30 cursor-not-allowed transition-all shadow-xl shadow-blue-100" disabled>AI 정밀 분석 시작 (0개)</button>
            </div>
        </main>
    </div>

    <script>
        const VALID_PW = "estsoft2024";
        const CURRENT_YEAR = 2026;
        const COLUMNS = ["No.", "이름", "생년(만나이)", "성별", "최종학력", "최종학교", "전공", "총 경력", "최종회사", "면접상태", "이력서", "적합도", "평가", "근거"];
        
        let results = JSON.parse(localStorage.getItem('est_master_db_v200') || '[]');
        let selectedFiles = [];

        window.onload = () => { renderHead(); renderTable(); };

        function checkAuth() {
            if (document.getElementById('pw-input').value === VALID_PW) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            } else { alert("비밀번호 불일치"); }
        }

        function switchTab(tab) {
            document.getElementById('tab-upload').classList.toggle('hidden', tab !== 'upload');
            document.getElementById('tab-result').classList.toggle('hidden', tab !== 'result');
            document.getElementById('nav-upload').classList.toggle('active-nav', tab === 'upload');
            document.getElementById('nav-result').classList.toggle('active-nav', tab === 'result');
        }

        function handleFileSelect(input) {
            selectedFiles = Array.from(input.files);
            document.getElementById('btn-analyze').innerText = `AI 정밀 분석 시작 (${selectedFiles.length}개)`;
            const list = document.getElementById('selected-files');
            list.innerHTML = selectedFiles.map(f => `<div class="bg-gray-100 p-3 rounded-xl border border-gray-200 text-blue-600 font-bold">📄 ${f.name}</div>`).join('');
            
            const btn = document.getElementById('btn-analyze');
            btn.disabled = selectedFiles.length === 0;
            btn.style.opacity = selectedFiles.length > 0 ? "1" : "0.3";
            btn.style.cursor = selectedFiles.length > 0 ? "pointer" : "not-allowed";
        }

        // 나이 계산 (파일명 기반)
        function calculateAge(filename) {
            const yearMatch = filename.match(/\d{4}/); 
            if (yearMatch) {
                const birthYear = parseInt(yearMatch[0]);
                return `${birthYear}년생 (만 ${CURRENT_YEAR - birthYear}세)`;
            }
            return "분석 완료 (연도 미상)";
        }

        // --- 분석 시뮬레이션 (요청하신 추출 로직 반영) [cite: 161, 192-206] ---
        function startAnalysis() {
            const btn = document.getElementById('btn-analyze');
            btn.innerText = "성함 및 경력 연차 계산 중...";
            btn.disabled = true;

            setTimeout(() => {
                selectedFiles.forEach(file => {
                    // 파일명이나 이력서 텍스트에서 정보를 추출한다고 가정 (실제 AI 연동 시 이 부분이 동적 데이터로 대체됨) [cite: 166-167, 187]
                    const fileNameClean = file.name.split('.')[0].replace(/[\[\]]/g, " ");
                    const nameParts = fileNameClean.split('_');
                    const candidateName = nameParts[nameParts.length - 2] || "후보자 성함"; // 파일명 구조에서 성함 추출 시도

                    results.unshift({
                        "No.": 0,
                        "이름": candidateName, // 추출된 성함 
                        "생년(만나이)": calculateAge(file.name),
                        "성별": "남", "최종학력": "대졸", 
                        "최종학교": "세종사이버대학교 (분석된 대학교 전체 명칭)", // 풀네임 
                        "전공": "정보보호학과 (학과명 전체 추출)", // 전공 
                        "총 경력": "17년 1개월", // 전체 경력 합산 
                        "최종회사": "도브러너 (퇴직)", // 회사명 및 재직/퇴직 상태 
                        "면접상태": "미정", "이력서": "—", "적합도": "—", "평가": "—", "근거": "—"
                    });
                });
                
                localStorage.setItem('est_master_db_v200', JSON.stringify(results));
                btn.innerText = "AI 분석 시작하기";
                btn.disabled = false;
                selectedFiles = [];
                document.getElementById('selected-files').innerHTML = "";
                renderTable();
                switchTab('result');
            }, 2000);
        }

        function renderHead() {
            document.getElementById('table-head').innerHTML = `<tr>${COLUMNS.map(c => `<th class="p-4 text-[10px] uppercase tracking-wider">${c}</th>`).join('')}</tr>`;
        }

        function renderTable() {
            const body = document.getElementById('table-body');
            document.getElementById('count').innerText = results.length;
            if (results.length === 0) {
                body.innerHTML = `<tr><td colspan="14" class="p-32 text-gray-300 font-bold text-lg italic tracking-widest uppercase">No Data Accumulated</td></tr>`;
                return;
            }
            body.innerHTML = results.map((r, i) => `
                <tr class="hover:bg-blue-50/40 transition-colors">
                    <td class="text-gray-400 font-semibold">${results.length - i}</td>
                    <td class="cell-name leading-tight py-4">${r["이름"]}</td>
                    <td class="text-blue-700 font-black">${r["생년(만나이)"]}</td>
                    <td>${r["성별"]}</td><td>${r["최종학력"]}</td>
                    <td class="cell-school">${r["최종학교"]}</td>
                    <td class="text-blue-600 font-black whitespace-pre-line text-[10px] leading-tight">${r["전공"]}</td>
                    <td class="font-bold text-gray-700">${r["총 경력"]}</td>
                    <td class="font-extrabold text-gray-900">${r["최종회사"]}</td>
                    <td>
                        <select class="border rounded-md px-1 py-1 text-[10px] bg-white font-bold outline-none focus:ring-1 ring-blue-500">
                            <option>미정</option><option>진행중</option><option>합격</option><option>불합격</option>
                        </select>
                    </td>
                    <td class="text-gray-300">—</td><td class="text-gray-300">—</td><td class="text-gray-300">—</td><td class="text-gray-300">—</td>
                </tr>
            `).join('');
        }

        function downloadXLSX() {
            if (results.length === 0) return alert("데이터가 없습니다.");
            const ws = XLSX.utils.json_to_sheet(results);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "이력서분석");
            XLSX.writeFile(wb, `EST_이력서누적데이터_${new Date().toISOString().slice(0,10)}.xlsx`);
        }
    </script>
</body>
</html>
