<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY - 채용 이력서 분석 시스템</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background-color: #f9fafb; margin: 0; }
        .sidebar-active { background-color: rgba(255,255,255,0.12); color: #ffffff; font-weight: 700; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #e5e7eb; padding: 12px; text-align: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 상수 설정 [cite: 9, 11]
        const DEFAULT_PW = "estsoft2024";
        const COLUMNS = ["No.", "이름", "생년(만나이)", "성별", "최종학력", "최종학교", "전공", "총 경력", "최종회사", "면접진행 여부", "이력서", "JD 적합도", "적합도 평가", "평가 근거"];

        function App() {
            const [auth, setAuth] = useState(false);
            const [password, setPassword] = useState("");
            const [activeTab, setActiveTab] = useState("result");
            const [results, setResults] = useState([]);

            // 데이터 로드 및 저장
            useEffect(() => {
                const saved = localStorage.getItem('est_resume_final_data');
                if (saved) setResults(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('est_resume_final_data', JSON.stringify(results));
            }, [results]);

            const handleLogin = () => {
                if (password === DEFAULT_PW) {
                    setAuth(true);
                } else {
                    alert("비밀번호가 틀렸습니다.");
                }
            };

            const exportExcel = () => {
                const ws = XLSX.utils.json_to_sheet(results);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Results");
                XLSX.writeFile(wb, "이력서_분석결과.xlsx");
            }; [cite: 224-228]

            const addMockData = () => {
                const mock = {
                    "No.": results.length + 1,
                    "이름": "문철민",
                    "생년(만나이)": "미상 (만 나이 미상)",
                    "성별": "남",
                    "최종학력": "대졸(예정)",
                    "최종학교": "세종사이버대학교",
                    "전공": "정보보호학과(정보보안학과)",
                    "총 경력": "17년 1개월",
                    "최종회사": "도브러너",
                    "면접진행 여부": "미정",
                    "이력서": "—", "JD 적합도": "—", "적합도 평가": "—", "평가 근거": "—"
                };
                setResults([mock, ...results]);
            };

            if (!auth) {
                return (
                    <div className="h-screen flex items-center justify-center bg-gray-100">
                        <div className="bg-white p-8 rounded-lg shadow-md w-80">
                            <h2 className="text-xl font-bold mb-4 text-center">EST FAMILY</h2>
                            <input 
                                type="password" 
                                placeholder="비밀번호 입력" 
                                className="w-full border p-2 rounded mb-4 text-center"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                            />
                            <button onClick={handleLogin} className="w-full bg-blue-600 text-white p-2 rounded font-bold">로그인</button>
                        </div>
                    </div>
                );
            } [cite: 137-159]

            return (
                <div className="flex min-h-screen">
                    {/* 사이드바 [cite: 83-111] */}
                    <aside className="w-56 bg-[#1e3a8a] text-white flex flex-col shrink-0">
                        <div className="p-6 border-b border-white/10">
                            <h1 className="text-xl font-black italic">EST FAMILY</h1>
                        </div>
                        <nav className="p-4 space-y-2">
                            <button onClick={() => setActiveTab("upload")} className={`w-full text-left p-2 rounded ${activeTab === 'upload' ? 'sidebar-active' : ''}`}>업로드 & 설정</button>
                            <button onClick={() => setActiveTab("result")} className={`w-full text-left p-2 rounded ${activeTab === 'result' ? 'sidebar-active' : ''}`}>분석 결과</button>
                        </nav>
                    </aside>

                    <main className="flex-1 bg-[#f9fafb]">
                        <header className="bg-white border-b p-4 flex justify-between items-center px-8">
                            <h2 className="font-bold text-gray-700">{activeTab === 'upload' ? '업로드' : '분석 결과'}</h2>
                            <div className="text-xs font-bold text-green-600 flex items-center gap-1">
                                <span className="w-2 h-2 bg-green-500 rounded-full"></span> 일반 사용자
                            </div>
                        </header>

                        <div className="p-8">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-bold">총 {results.length}명 분석 완료</h3>
                                <div className="space-x-2">
                                    <button onClick={addMockData} className="bg-white border px-3 py-1.5 rounded text-xs">샘플추가</button>
                                    <button onClick={exportExcel} className="bg-blue-600 text-white px-4 py-2 rounded text-xs font-bold shadow-sm">⬇ XLSX 다운로드</button>
                                </div>
                            </div>

                            <div className="bg-white rounded border overflow-x-auto shadow-sm">
                                <table className="text-[11px]">
                                    <thead className="bg-gray-50">
                                        <tr>{COLUMNS.map(c => <th key={c} className="p-3 text-gray-500">{c}</th>)}</tr>
                                    </thead>
                                    <tbody>
                                        {results.map((r, i) => (
                                            <tr key={i} className="hover:bg-gray-50 border-b">
                                                <td className="text-gray-400">{results.length - i}</td>
                                                <td className="font-bold">{r["이름"]}</td>
                                                <td>{r["생년(만나이)"]}</td>
                                                <td>{r["성별"]}</td>
                                                <td>{r["최종학력"]}</td>
                                                <td>{r["최종학교"]}</td>
                                                <td className="text-blue-600 font-medium whitespace-pre-line">{r["전공"]}</td>
                                                <td>{r["총 경력"]}</td>
                                                <td>{r["최종회사"]}</td>
                                                <td>
                                                    <select className="border rounded p-1"><option>미정</option><option>합격</option></select>
                                                </td>
                                                <td className="text-gray-300">—</td>
                                                <td className="text-gray-300">—</td>
                                                <td className="text-gray-300">—</td>
                                                <td className="text-gray-300">—</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
