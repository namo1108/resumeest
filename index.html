<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY - 이력서 분석 시스템</title>
    <!-- 파비콘 설정 -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <!-- 외부 라이브러리 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .sidebar-item-active { background: rgba(255, 255, 255, 0.12); color: white; }
        .sidebar-item { color: rgba(255, 255, 255, 0.6); transition: all 0.2s; }
        .sidebar-item:hover { background: rgba(255, 255, 255, 0.08); color: white; }
        /* 테이블 스크롤바 디자인 */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #aaa; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // --- 상수 설정 ---
        const DEFAULT_PW = "estsoft2024";
        const ADMIN_PW = "admin1234";
        const SCORE_LABELS = {
            1: { label: "매우 부적합", sub: "직무 요건과 거의 일치하지 않음", color: "#dc2626", bg: "#fef2f2", border: "#fecaca" },
            2: { label: "부적합", sub: "일부 요건 충족, 보완 필요", color: "#ea580c", bg: "#fff7ed", border: "#fed7aa" },
            3: { label: "보통", sub: "기본 요건 충족, 추가 검토 필요", color: "#b45309", bg: "#fefce8", border: "#fde68a" },
            4: { label: "적합 Outreach 권장", sub: "직무 요건 충족, 적극 접촉 권장", color: "#15803d", bg: "#f0fdf4", border: "#86efac" },
            5: { label: "매우 적합 Outreach 권장", sub: "직무 요건에 탁월히 부합", color: "#1d4ed8", bg: "#eff6ff", border: "#93c5fd" }
        };

        const App = () => {
            const [auth, setAuth] = useState(null);
            const [loginInput, setLoginInput] = useState("");
            const [activeTab, setActiveTab] = useState("upload");
            const [files, setFiles] = useState([]);
            const [fileLinks, setFileLinks] = useState({});
            const [jd, setJd] = useState("");
            const [results, setResults] = useState([]);
            const [processing, setProcessing] = useState(false);
            const [progress, setProgress] = useState({ current: 0, total: 0 });
            const fileInputRef = useRef();

            const handleLogin = () => {
                if (loginInput === ADMIN_PW) setAuth("admin");
                else if (loginInput === DEFAULT_PW) setAuth("user");
                else alert("비밀번호가 올바르지 않습니다.");
                setLoginInput("");
            };

            // 데이터 파싱 로직 (좋다고 하셨던 버전 유지 및 확장)
            const handleAnalyze = async () => {
                if (!files.length) return;
                setProcessing(true);
                setResults([]);
                setProgress({ current: 0, total: files.length });

                try {
                    const out = [];
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        setProgress({ current: i + 1, total: files.length });
                        
                        // 실제 환경에서는 여기서 API 호출 및 텍스트 추출이 일어납니다.
                        // 스크린샷에 나온 데이터 예시 반영
                        const parsedData = {
                            name: file.name.split('_')[1]?.split('.')[0] || "채종현",
                            age: "1993년생 (만 31세)",
                            gender: "남",
                            edu: "대졸",
                            school: "한국교통대학교",
                            major: "생명공학과",
                            exp: "6년 9개월",
                            company: "트리노드",
                            interviewStatus: "미정",
                            score: 4.2,
                            reasons: ["직무 역량 우수", "경험 일치도 높음"]
                        };

                        const localUrl = URL.createObjectURL(file);
                        out.push({
                            no: i + 1,
                            ...parsedData,
                            resumeUrl: fileLinks[file.name] || localUrl
                        });
                        setResults([...out]);
                    }
                } catch (error) {
                    console.error(error);
                } finally {
                    setProcessing(false);
                    setActiveTab("result");
                }
            };

            const updateInterviewStatus = (index, value) => {
                const newResults = [...results];
                newResults[index].interviewStatus = value;
                setResults(newResults);
            };

            if (!auth) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#f8fafc]">
                        <div className="bg-white p-12 rounded-[2rem] shadow-2xl w-full max-w-md text-center border border-gray-100">
                            <h2 className="text-4xl font-black mb-2 text-[#1e3a8a] tracking-tighter italic">EST FAMILY</h2>
                            <p className="text-xs text-gray-400 mb-10 font-bold uppercase tracking-[0.2em]">Resume Analysis System</p>
                            <input 
                                type="password" 
                                value={loginInput}
                                onChange={(e) => setLoginInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                                placeholder="ACCESS PASSWORD"
                                className="w-full p-5 mb-5 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none transition-all text-center font-bold text-gray-700 bg-gray-50"
                            />
                            <button 
                                onClick={handleLogin}
                                className="w-full bg-[#1e3a8a] text-white p-5 rounded-2xl font-black text-lg hover:bg-blue-900 transition-all shadow-xl shadow-blue-900/20 active:scale-[0.98]"
                            >
                                LOGIN
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-[#f8fafc]">
                    {/* 사이드바 */}
                    <div className="w-64 bg-[#1e3a8a] flex flex-col shadow-2xl z-20 shrink-0">
                        <div className="p-8 border-b border-blue-900/50">
                            <h1 className="text-white font-black text-2xl tracking-tighter italic">EST FAMILY</h1>
                            <p className="text-blue-300 text-[10px] mt-1 uppercase tracking-widest font-bold opacity-60">Internal Only</p>
                        </div>
                        <nav className="flex-1 p-4 space-y-2 mt-6">
                            <SidebarButton active={activeTab === 'upload'} onClick={() => setActiveTab('upload')} icon="📁" label="업로드 & 설정" />
                            <SidebarButton active={activeTab === 'result'} onClick={() => setActiveTab('result')} icon="📊" label="분석 결과" />
                            <SidebarButton active={activeTab === 'admin'} onClick={() => setActiveTab('admin')} icon="⚙️" label="관리자 설정" />
                        </nav>
                        <div className="p-6">
                            <button onClick={() => setAuth(null)} className="w-full p-3 bg-blue-900/40 text-blue-200 rounded-xl text-[11px] font-bold hover:bg-blue-800 border border-blue-700/50 transition-all uppercase tracking-wider">Lock System</button>
                        </div>
                    </div>

                    {/* 메인 영역 */}
                    <main className="flex-1 flex flex-col min-w-0">
                        <header className="bg-white border-b border-gray-200 px-10 py-5 flex justify-between items-center shrink-0">
                            <h2 className="text-xl font-black text-gray-800 tracking-tight">
                                {activeTab === 'upload' ? 'Upload & Settings' : activeTab === 'result' ? 'Analysis Dashboard' : 'Settings'}
                            </h2>
                            <div className="flex items-center gap-6">
                                <div className="flex items-center gap-3 bg-gray-50 px-4 py-2 rounded-full border border-gray-100">
                                    <span className="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse shadow-sm shadow-green-500/50"></span>
                                    <span className="text-[11px] font-black text-gray-600 tracking-tight uppercase">
                                        {auth === 'admin' ? 'Auth: Admin' : 'Auth: Staff'}
                                    </span>
                                </div>
                                {activeTab === 'result' && (
                                    <button className="bg-[#1e293b] text-white px-5 py-2.5 rounded-lg text-xs font-black hover:bg-black transition-all shadow-lg shadow-black/10">
                                        엑셀 다운로드
                                    </button>
                                )}
                            </div>
                        </header>

                        <div className="flex-1 overflow-auto p-10 custom-scrollbar">
                            {activeTab === 'upload' && (
                                <div className="max-w-4xl mx-auto space-y-8 animate-in fade-in duration-500">
                                    <div className="bg-white p-10 rounded-[2.5rem] border border-gray-200 shadow-sm">
                                        <div 
                                            onClick={() => fileInputRef.current.click()}
                                            className="border-2 border-dashed border-gray-200 bg-gray-50 rounded-3xl p-16 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-all group"
                                        >
                                            <div className="text-5xl mb-6 group-hover:scale-110 transition-transform">📂</div>
                                            <p className="text-gray-900 font-black text-xl mb-2 tracking-tight">분석할 이력서 파일을 선택하세요</p>
                                            <p className="text-gray-400 text-sm font-medium tracking-tight">지원되는 파일: PDF, TXT (일괄 분석 가능)</p>
                                            <input type="file" multiple ref={fileInputRef} className="hidden" onChange={(e) => setFiles(Array.from(e.target.files))} />
                                        </div>
                                        {files.length > 0 && (
                                            <div className="mt-8 space-y-3">
                                                <p className="text-[11px] font-black text-blue-600 uppercase tracking-widest px-2">준비된 파일 ({files.length}건)</p>
                                                {files.map(f => (
                                                    <div key={f.name} className="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl border border-gray-100 transition-all hover:bg-white hover:shadow-md">
                                                        <span className="flex-1 text-sm font-bold text-gray-700 truncate">{f.name}</span>
                                                        <input type="text" placeholder="OneDrive Link (Optional)" className="flex-[2] text-[11px] p-3 border border-gray-200 rounded-xl bg-white focus:border-blue-500 outline-none" onChange={(e) => setFileLinks(prev => ({...prev, [f.name]: e.target.value}))} />
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    <div className="bg-white p-10 rounded-[2.5rem] border border-gray-200 shadow-sm">
                                        <h4 className="text-sm font-black text-gray-800 mb-6 flex items-center gap-2">
                                            <span className="w-1 h-4 bg-blue-600 rounded-full"></span> Job Description (JD)
                                        </h4>
                                        <textarea value={jd} onChange={(e) => setJd(e.target.value)} placeholder="분석 기준이 될 채용 공고나 직무 요구사항을 입력하세요..." className="w-full h-64 p-6 bg-gray-50 border border-gray-200 rounded-3xl outline-none focus:ring-4 focus:ring-blue-500/5 focus:border-blue-500 transition-all resize-none text-sm font-medium leading-relaxed"></textarea>
                                        <button onClick={handleAnalyze} disabled={!files.length || processing} className="w-full mt-8 bg-[#1e3a8a] text-white p-6 rounded-3xl font-black text-xl hover:bg-blue-900 disabled:bg-gray-200 shadow-2xl shadow-blue-900/20 transition-all active:scale-[0.99]">
                                            {processing ? `ANALYZING... (${progress.current}/${progress.total})` : 'AI 분석 시작'}
                                        </button>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'result' && (
                                <div className="space-y-4 animate-in fade-in duration-700">
                                    <div className="flex items-center justify-between mb-2">
                                        <p className="text-sm font-bold text-gray-500">분석 결과 <span className="text-blue-600 font-black">{results.length}건</span></p>
                                    </div>
                                    <div className="bg-white rounded-3xl border border-gray-200 shadow-sm overflow-hidden flex flex-col">
                                        <div className="overflow-x-auto custom-scrollbar">
                                            <table className="w-full text-left text-[13px] whitespace-nowrap">
                                                <thead className="bg-[#f8fafc] border-b border-gray-100">
                                                    <tr>
                                                        {["NO.", "이름", "생년(만나이)", "성별", "최종학력", "최종학교", "전공", "총 경력", "최종회사", "면접진행 여부", "이력서", "JD 적합도", "적합도 평가", "평가 근거"].map(h => (
                                                            <th key={h} className="p-5 font-black text-gray-400 text-[10px] uppercase tracking-tighter">{h}</th>
                                                        ))}
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-50 font-medium">
                                                    {results.length > 0 ? results.map((r, i) => {
                                                        const scoreInt = Math.floor(r.score);
                                                        const scoreInfo = SCORE_LABELS[scoreInt] || SCORE_LABELS[3];
                                                        return (
                                                            <tr key={i} className="hover:bg-blue-50/20 transition-colors">
                                                                <td className="p-5 text-gray-300 font-bold">{r.no}</td>
                                                                <td className="p-5 font-black text-gray-900">{r.name}</td>
                                                                <td className="p-5">{r.age}</td>
                                                                <td className="p-5">{r.gender}</td>
                                                                <td className="p-5">{r.edu}</td>
                                                                <td className="p-5">{r.school}</td>
                                                                <td className="p-5">{r.major}</td>
                                                                <td className="p-5 font-bold text-gray-700">{r.exp}</td>
                                                                <td className="p-5 font-bold text-gray-700">{r.company}</td>
                                                                <td className="p-5">
                                                                    <select 
                                                                        value={r.interviewStatus} 
                                                                        onChange={(e) => updateInterviewStatus(i, e.target.value)}
                                                                        className="bg-white border border-gray-200 rounded-lg p-1.5 text-xs font-bold outline-none focus:border-blue-500 shadow-sm"
                                                                    >
                                                                        <option value="미정">미정</option>
                                                                        <option value="통과">통과</option>
                                                                        <option value="보류">보류</option>
                                                                        <option value="탈락">탈락</option>
                                                                    </select>
                                                                </td>
                                                                <td className="p-5">
                                                                    <a href={r.resumeUrl} target="_blank" className="text-blue-600 font-black hover:underline underline-offset-4 flex items-center gap-1">
                                                                        열기 <span className="text-[10px] opacity-50 italic">↗</span>
                                                                    </a>
                                                                </td>
                                                                <td className="p-5">
                                                                    <span className="px-3 py-1 bg-[#15803d] text-white rounded-full text-[11px] font-black">
                                                                        {r.score}/5
                                                                    </span>
                                                                </td>
                                                                <td className="p-5">
                                                                    <div className="px-4 py-2.5 rounded-xl border min-w-[200px]" style={{ background: scoreInfo.bg, borderColor: scoreInfo.border }}>
                                                                        <div style={{ color: scoreInfo.color }} className="text-[11px] font-black">{scoreInfo.label}</div>
                                                                        <div className="text-[10px] text-gray-500 leading-tight mt-0.5">{scoreInfo.sub}</div>
                                                                    </div>
                                                                </td>
                                                                <td className="p-5">
                                                                    <ul className="text-[11px] space-y-1 list-disc list-inside text-gray-500 font-bold">
                                                                        {r.reasons.map((reason, idx) => <li key={idx}>{reason}</li>)}
                                                                    </ul>
                                                                </td>
                                                            </tr>
                                                        );
                                                    }) : (
                                                        <tr><td colSpan="14" className="p-32 text-center text-gray-300 font-bold text-lg">데이터가 없습니다.</td></tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const SidebarButton = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`w-full flex items-center p-4 rounded-2xl text-sm font-bold transition-all duration-300 ${active ? 'sidebar-item-active shadow-lg shadow-black/20 translate-x-1' : 'sidebar-item hover:translate-x-1'}`}>
                <span className="mr-4 text-xl">{icon}</span> {label}
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
