<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY | AI Resume Analyzer v4.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; overflow: hidden; margin: 0; }
        .sidebar { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); }
        .active-tab { background-color: #6366f1 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        
        /* 테이블 고정 레이아웃 */
        .result-table { table-layout: fixed; width: 100%; min-width: 1000px; border-collapse: separate; border-spacing: 0; }
        .result-table th { 
            position: sticky; top: 0; background: #f8fafc; z-index: 10; 
            font-size: 11px; font-weight: 800; text-transform: uppercase; color: #94a3b8; 
            padding: 16px 12px; border-bottom: 2px solid #e2e8f0; text-align: left;
        }
        .result-table td { 
            padding: 14px 12px; border-bottom: 1px solid #f1f5f9; 
            background: white; font-size: 13px; vertical-align: middle;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        .editable-input { 
            width: 100%; border: 1px solid transparent; background: transparent; 
            text-align: left; font-weight: 700; color: #475569; padding: 4px; border-radius: 6px;
            transition: all 0.2s;
        }
        .editable-input:hover { background-color: #f1f5f9; border-color: #e2e8f0; }
        .editable-input:focus { outline: 2px solid #6366f1; background-color: #fff; }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .modal-overlay { background-color: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); display: none; }
        .modal-active { display: flex !important; }

        /* 드래그 앤 드롭 하이라이트 */
        .drop-zone--over { border-color: #6366f1 !important; background-color: rgba(99, 102, 241, 0.1) !important; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col md:flex-row overflow-hidden">

    <aside class="sidebar w-full md:w-64 shrink-0 flex flex-col z-30 shadow-2xl h-auto md:h-full">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-brain text-white"></i>
                </div>
                <div>
                    <h1 class="text-white text-lg font-black tracking-tight leading-none">EST FAMILY</h1>
                    <p class="text-indigo-400 text-[10px] font-bold tracking-widest uppercase mt-1">AI Intelligence</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-1.5">
            <button onclick="switchTab('upload')" id="nav-upload" class="active-tab w-full flex items-center gap-3 px-5 py-4 rounded-2xl text-slate-400 hover:bg-white/5 hover:text-white transition-all font-bold text-sm">
                <i class="fas fa-upload"></i> 분석 설정 및 업로드
            </button>
            <button onclick="switchTab('results')" id="nav-results" class="w-full flex items-center gap-3 px-5 py-4 rounded-2xl text-slate-400 hover:bg-white/5 hover:text-white transition-all font-bold text-sm">
                <i class="fas fa-chart-pie"></i> 분석 결과 리포트
            </button>
        </nav>
        <div class="p-6">
            <div class="bg-indigo-500/10 rounded-2xl p-4 border border-indigo-500/20 text-[11px] text-indigo-300">
                <div class="flex items-center gap-2 font-bold mb-1">
                    <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span> Gemini 2.5 Flash
                </div>
                실시간 데이터 동기화 활성화됨
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-white relative">
        <header class="h-20 border-b border-slate-100 px-8 flex items-center justify-between bg-white z-20">
            <div class="flex flex-col">
                <h2 id="title-text" class="text-xl font-black text-slate-900 tracking-tight">분석 설정 및 업로드</h2>
                <p id="subtitle-text" class="text-xs text-slate-400 font-bold">파일을 드래그하여 업로드할 수 있습니다.</p>
            </div>
            <div id="loader" class="hidden flex items-center gap-3 px-5 py-2.5 bg-indigo-600 text-white rounded-2xl text-xs font-black animate-pulse">
                <i class="fas fa-spinner fa-spin"></i> AI 파싱 중...
            </div>
        </header>

        <div class="flex-1 overflow-hidden relative">
            <!-- 탭 1: 업로드 -->
            <div id="view-upload" class="h-full overflow-y-auto p-10 custom-scroll space-y-8">
                <div class="max-w-4xl mx-auto space-y-8">
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                        <label class="text-[11px] font-black text-indigo-500 uppercase mb-4 block tracking-widest">Job Description</label>
                        <textarea id="jd-input" class="w-full h-40 p-5 bg-slate-50 border border-slate-200 rounded-2xl text-sm outline-none focus:border-indigo-500 transition-all" placeholder="채용 공고의 상세 내용을 입력해 주세요."></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div id="drop-zone" class="p-12 border-2 border-dashed border-slate-200 rounded-[2rem] hover:bg-indigo-50/30 cursor-pointer flex flex-col items-center justify-center transition-all group">
                            <i class="fas fa-cloud-upload-alt text-3xl text-slate-300 group-hover:text-indigo-500 mb-4 transition-colors"></i>
                            <span class="text-sm font-black text-slate-800">이력서 파일 선택 또는 드래그</span>
                            <p class="text-xs text-slate-400 mt-1">PDF, 이미지 선택 (다중 가능)</p>
                            <input type="file" id="file-input" class="hidden" multiple accept="image/*,.pdf">
                        </div>
                        <div class="bg-white p-6 rounded-[2rem] border border-slate-200 overflow-hidden flex flex-col">
                            <h4 class="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest">Upload Queue</h4>
                            <div id="file-queue" class="flex-1 space-y-2 overflow-y-auto custom-scroll">
                                <p class="text-center py-8 text-slate-300 text-xs font-bold">대기 중인 파일 없음</p>
                            </div>
                        </div>
                    </div>
                    <button id="start-btn" onclick="processAnalysis()" class="w-full py-5 bg-slate-900 text-white rounded-[1.5rem] font-black hover:bg-black transition-all shadow-xl disabled:opacity-50 disabled:cursor-not-allowed">
                        AI 분석 시작
                    </button>
                </div>
            </div>

            <!-- 탭 2: 리포트 -->
            <div id="view-results" class="hidden h-full flex flex-col">
                <div class="flex-1 overflow-auto custom-scroll p-6">
                    <div class="bg-white rounded-[1.5rem] border border-slate-200 overflow-x-auto shadow-sm">
                        <table class="result-table">
                            <thead>
                                <tr>
                                    <th style="width: 50px;">NO</th>
                                    <th style="width: 100px;">성명</th>
                                    <th style="width: 80px;">성별</th>
                                    <th style="width: 100px;">나이</th>
                                    <th style="width: 150px;">최종학력/전공</th>
                                    <th style="width: 100px;">총 경력</th>
                                    <th style="width: 150px;">최종 회사</th>
                                    <th style="width: 80px;">적합도</th>
                                    <th style="width: 200px;">AI 분석 요약</th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                                <tr><td colspan="9" class="text-center py-20 text-slate-300 font-bold">데이터를 로드 중이거나 없습니다.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 상세 모달 -->
    <div id="modal" class="modal-overlay fixed inset-0 z-50 items-center justify-center p-6">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[85vh]">
            <div class="p-8 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-lg"><i class="fas fa-file-alt"></i></div>
                    <div>
                        <h3 id="modal-name" class="text-xl font-black text-slate-900">상세 분석 리포트</h3>
                        <p class="text-[10px] text-indigo-500 font-black tracking-widest mt-0.5 uppercase">Gemini AI Insight</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white shadow-sm transition-all text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            <div id="modal-content" class="p-8 space-y-6 overflow-y-auto custom-scroll">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">종합 평가</label>
                    <div id="modal-summary" class="bg-indigo-50/50 p-6 rounded-3xl border border-indigo-100 text-slate-700 font-bold leading-relaxed text-sm"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-emerald-50/50 p-6 rounded-[2rem] border border-emerald-100">
                        <label class="text-[10px] font-black text-emerald-600 uppercase tracking-widest block mb-3">강점 및 적합성</label>
                        <ul id="modal-pos-list" class="space-y-2"></ul>
                    </div>
                    <div class="bg-rose-50/50 p-6 rounded-[2rem] border border-rose-100">
                        <label class="text-[10px] font-black text-rose-600 uppercase tracking-widest block mb-3">약점 및 리스크</label>
                        <ul id="modal-neg-list" class="space-y-2"></ul>
                    </div>
                </div>
            </div>
            <div class="p-6 bg-slate-50 flex justify-end">
                <button onclick="closeModal()" class="px-10 py-3 bg-slate-900 text-white rounded-xl font-black text-xs hover:scale-105 transition-transform">닫기</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'est-family-final-v1';
        const apiKey = ""; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        let selectedFiles = [];
        let results = [];

        // 초기화 및 인증
        const init = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token).catch(() => signInAnonymously(auth));
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (u) => {
            if (u) { 
                user = u; 
                loadData(); 
            }
        });
        init();

        // 드래그 앤 드롭 설정
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drop-zone--over');
        });

        ['dragleave', 'dragend'].forEach(type => {
            dropZone.addEventListener(type, () => dropZone.classList.remove('drop-zone--over'));
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-zone--over');
            if (e.dataTransfer.files.length) {
                handleFileSelection(e.dataTransfer.files);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFileSelection(e.target.files);
            }
        });

        function handleFileSelection(files) {
            selectedFiles = Array.from(files);
            const queue = document.getElementById('file-queue');
            queue.innerHTML = selectedFiles.map(f => `
                <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl text-[11px] font-bold text-slate-600 border border-slate-100">
                    <div class="flex items-center gap-2 truncate">
                        <i class="fas fa-file-alt text-indigo-400"></i> ${f.name}
                    </div>
                    <span class="text-[9px] text-slate-400 shrink-0">${(f.size / 1024 / 1024).toFixed(2)}MB</span>
                </div>
            `).join('');
        }

        // 분석 실행
        window.processAnalysis = async () => {
            const jd = document.getElementById('jd-input').value;
            const startBtn = document.getElementById('start-btn');
            
            if (!jd) return alert("JD(채용 공고)를 입력해 주세요.");
            if (selectedFiles.length === 0) return alert("분석할 이력서 파일을 선택해 주세요.");
            
            startBtn.disabled = true;
            document.getElementById('loader').classList.remove('hidden');

            for (const file of selectedFiles) {
                try {
                    const base64 = await toB64(file);
                    const prompt = `이력서 분석 후 JSON으로만 응답:
                    { "name": "이름", "gender": "성별", "age": "나이", "degree": "학위", "major": "전공", "school": "최종학교", "career": "경력", "company": "최종회사", "score": 0.0, "summary": "3줄요약", "strengths": ["강점1","강점2"], "risks": ["약점1","약점2"] }`;

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `JD: ${jd}` }, { inlineData: { mimeType: file.type || 'application/pdf', data: base64 } }] }],
                            systemInstruction: { parts: [{ text: prompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    const resJson = await res.json();
                    if (resJson.candidates && resJson.candidates[0]) {
                        const data = JSON.parse(resJson.candidates[0].content.parts[0].text);
                        if (!user) return;
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'analyses'), { 
                            ...data, 
                            timestamp: serverTimestamp(),
                            uid: user.uid
                        });
                    }
                } catch (err) {
                    console.error("파일 처리 중 오류:", err);
                    alert(`${file.name} 분석 중 오류가 발생했습니다.`);
                }
            }
            
            document.getElementById('loader').classList.add('hidden');
            startBtn.disabled = false;
            switchTab('results');
        };

        function loadData() {
            if (!user) return;
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'analyses');
            onSnapshot(q, (snap) => {
                const list = [];
                snap.forEach(d => list.push({ id: d.id, ...d.data() }));
                list.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                results = list;
                render();
            }, (err) => {
                console.error("Firestore 로드 오류:", err);
            });
        }

        function render() {
            const tbody = document.getElementById('table-body');
            if (results.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center py-20 text-slate-300 font-bold">데이터가 없습니다.</td></tr>';
                return;
            }
            tbody.innerHTML = results.map((r, i) => `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="text-center text-slate-300 font-black text-[10px]">${i + 1}</td>
                    <td class="font-black text-slate-800">${r.name || '-'}</td>
                    <td>
                        <input class="editable-input" value="${r.gender || ''}" onblur="updateField('${r.id}', 'gender', this.value)" placeholder="-">
                    </td>
                    <td>
                        <input class="editable-input" value="${r.age || ''}" onblur="updateField('${r.id}', 'age', this.value)" placeholder="-">
                    </td>
                    <td><span class="font-bold text-indigo-600">${r.degree || ''}</span> <span class="text-slate-400 text-[11px]">${r.major || ''}</span></td>
                    <td class="font-bold text-slate-600">${r.career || '-'}</td>
                    <td class="text-slate-500 font-medium">${r.school || r.company || '-'}</td>
                    <td><span class="px-2 py-1 bg-indigo-600 text-white rounded-lg text-[10px] font-black">${r.score || '0.0'}</span></td>
                    <td>
                        <button onclick="openModal('${r.id}')" class="text-indigo-600 font-black text-[11px] hover:bg-indigo-50 px-3 py-1 rounded-full border border-indigo-100 transition-all flex items-center gap-1">
                            <i class="fas fa-search-plus"></i> 상세 분석 보기
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        window.updateField = async (id, field, val) => {
            if (!id || !user) return;
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'analyses', id), { [field]: val });
            } catch (e) {
                console.error("업데이트 실패:", e);
            }
        };

        window.openModal = (id) => {
            const d = results.find(x => x.id === id);
            if (!d) return;
            document.getElementById('modal-name').innerText = d.name + ' 분석 보고서';
            document.getElementById('modal-summary').innerText = d.summary || '분석 결과가 없습니다.';
            document.getElementById('modal-pos-list').innerHTML = (d.strengths || []).map(s => `<li class="text-[12px] font-bold text-emerald-800 leading-snug flex items-start gap-2"><i class="fas fa-check text-emerald-500 mt-1"></i>${s}</li>`).join('');
            document.getElementById('modal-neg-list').innerHTML = (d.risks || []).map(r => `<li class="text-[12px] font-bold text-rose-800 leading-snug flex items-start gap-2"><i class="fas fa-exclamation-circle text-rose-400 mt-1"></i>${r}</li>`).join('');
            document.getElementById('modal').classList.add('modal-active');
        };

        window.closeModal = () => document.getElementById('modal').classList.remove('modal-active');

        window.switchTab = (tab) => {
            document.getElementById('view-upload').classList.toggle('hidden', tab !== 'upload');
            document.getElementById('view-results').classList.toggle('hidden', tab !== 'results');
            document.getElementById('nav-upload').classList.toggle('active-tab', tab === 'upload');
            document.getElementById('nav-results').classList.toggle('active-tab', tab === 'results');
            document.getElementById('title-text').innerText = tab === 'results' ? '분석 결과 리포트' : '분석 설정 및 업로드';
        };

        const toB64 = f => new Promise((res, rej) => {
            const r = new FileReader(); 
            r.readAsDataURL(f);
            r.onload = () => res(r.result.split(',')[1]); 
            r.onerror = (err) => {
                console.error("FileReader 에러:", err);
                rej(err);
            };
        });
    </script>
</body>
</html>
