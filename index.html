<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY - 채용 이력서 분석 시스템</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-weight='900' fill='%234a6cf7'>E</text></svg>">
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; }
        .hidden { display: none !important; }
        .active-nav { background-color: rgba(255,255,255,0.2); color: #ffffff; font-weight: 800; border-left: 4px solid #ffffff; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 11px; min-width: 2300px; table-layout: fixed; }
        th, td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #e2e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 700; position: sticky; top: 0; z-index: 10; }
        .col-check { width: 45px; } .col-no { width: 55px; }
        .col-name { width: 150px; text-align: left; font-weight: 800; color: #1d4ed8; text-decoration: underline; cursor: pointer; }
        .col-birth { width: 180px; } .col-school { width: 220px; text-align: left; }
        .col-major { width: 220px; text-align: left; color: #2563eb; font-weight: 600; white-space: normal; }
        .col-exp { width: 120px; } .col-status { width: 100px; }
        .col-company { width: 220px; text-align: left; } .col-interview { width: 115px; }
        .col-file { width: 120px; } .col-fit { width: 110px; } .col-memo { width: 180px; }
        input[type="text"] { width: 100%; padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 4px; outline: none; }
    </style>
</head>
<body>
    <div id="login-screen" class="h-screen flex items-center justify-center bg-gradient-to-br from-[#1e3a8a] to-[#93c5fd]">
        <div class="bg-white p-12 rounded-3xl shadow-2xl w-[420px] text-center">
            <div class="w-20 h-20 bg-gradient-to-br from-[#4a6cf7] to-[#1e3a8a] rounded-3xl mx-auto mb-8 flex items-center justify-center text-white font-black text-3xl">E</div>
            <input type="password" id="pw-input" class="w-full border-2 p-5 rounded-xl mb-3 text-center font-bold" placeholder="비밀번호 입력">
            <button id="login-btn" class="w-full bg-[#1e3a8a] text-white py-5 rounded-xl font-bold">시스템 로그인</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-64 bg-gradient-to-b from-[#1e3a8a] to-[#1e40af] text-white flex flex-col shrink-0 shadow-2xl z-20">
            <nav class="flex-1 p-4 space-y-2 font-bold">
                <button id="tab-btn-upload" class="w-full text-left p-4 rounded-xl text-sm opacity-70">📁 이력서 업로드</button>
                <button id="tab-btn-result" class="w-full text-left p-4 rounded-xl text-sm active-nav">📊 분석 결과 리스트</button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-[#f1f5f9]">
            <div id="view-result" class="p-9 flex-1 overflow-auto">
                <div class="flex justify-between items-center mb-7 bg-white p-6 rounded-2xl shadow-sm">
                    <h3 id="count-bar" class="font-bold text-gray-900 text-base">총 0명의 누적 데이터</h3>
                    <div class="flex gap-3">
                        <button id="btn-delete-selected" class="bg-orange-50 text-orange-600 px-5 py-3 rounded-xl text-sm font-bold hidden">🗑 선택 삭제</button>
                        <button id="btn-download" class="bg-[#4a6cf7] text-white px-7 py-3 rounded-xl text-sm font-bold">⬇ XLSX 다운로드</button>
                    </div>
                </div>
                <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                    <div class="overflow-x-auto"><table id="result-table"><thead id="table-head"></thead><tbody id="table-body"></tbody></table></div>
                </div>
            </div>

            <div id="view-upload" class="hidden p-9 max-w-3xl mx-auto w-full text-center">
                <div class="bg-white p-16 rounded-3xl border-4 border-dashed cursor-pointer" id="drop-zone">
                    <p class="text-2xl text-blue-700 font-extrabold">분석할 서류를 선택하세요</p>
                    <p class="text-sm text-gray-400 mt-2 font-medium italic">이력서, 경력기술서, 포트폴리오 정밀 파싱</p>
                    <input type="file" id="file-input" class="hidden" multiple accept=".pdf,.docx,.txt">
                </div>
                <div id="selected-files" class="grid grid-cols-2 gap-3 mt-4 text-xs font-bold"></div>
                <button id="btn-analyze" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black mt-6" disabled>AI 정밀 분석 시작</button>
            </div>
        </main>
    </div>

    <script>
        const VALID_PW = "estsoft2024";
        const CURRENT_YEAR = 2026;
        const DB_KEY = 'est_final_master_v300';
        const COLUMNS = [
            { title: "☑", class: "col-check" }, { title: "No.", class: "col-no" }, { title: "이름", class: "col-name" },
            { title: "생년(만나이)", class: "col-birth" }, { title: "성별", class: "col-status" }, { title: "최종학력", class: "col-status" },
            { title: "최종학교", class: "col-school" }, { title: "전공", class: "col-major" }, { title: "총 경력", class: "col-exp" },
            { title: "재직상태", class: "col-status" }, { title: "최종회사", class: "col-company" }, { title: "면접상태", class: "col-interview" },
            { title: "경력기술서", class: "col-file" }, { title: "포트폴리오", class: "col-file" },
            { title: "적합도", class: "col-fit" }, { title: "평가", class: "col-memo" }, { title: "근거", class: "col-memo" }
        ];

        let results = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
        const fileStore = new Map();

        window.addEventListener('load', () => {
            const handleAuth = () => {
                if (document.getElementById('pw-input').value === VALID_PW) {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    renderHead(); renderTable();
                } else { alert("비밀번호 불일치"); }
            };
            document.getElementById('login-btn').onclick = handleAuth;
            document.getElementById('tab-btn-upload').onclick = () => switchView('upload');
            document.getElementById('tab-btn-result').onclick = () => switchView('result');
            document.getElementById('drop-zone').onclick = () => document.getElementById('file-input').click();
            document.getElementById('file-input').onchange = (e) => {
                const files = Array.from(e.target.files);
                document.getElementById('selected-files').innerHTML = files.map(f => `<div>📄 ${f.name}</div>`).join('');
                document.getElementById('btn-analyze').disabled = files.length === 0;
            };
            document.getElementById('btn-analyze').onclick = startAnalysis;
        });

        function switchView(v) {
            document.getElementById('view-upload').classList.toggle('hidden', v !== 'upload');
            document.getElementById('view-result').classList.toggle('hidden', v !== 'result');
        }

        async function getFileText(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'pdf') {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const buf = await file.arrayBuffer(); const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
                let text = ''; for (let i = 1; i <= pdf.numPages; i++) { 
                    const page = await pdf.getPage(i); const content = await page.getTextContent(); 
                    text += content.items.map(s => s.str).join(' ') + '\n'; 
                }
                return text;
            }
            return "";
        }

        async function startAnalysis() {
            const files = Array.from(document.getElementById('file-input').files);
            const btn = document.getElementById('btn-analyze');
            btn.innerText = "데이터 정밀 매칭 중..."; btn.disabled = true;

            for (let f of files) {
                const text = await getFileText(f);
                fileStore.set(f.name, f);

                // --- 채종현 등 원본 이력서 데이터 정밀 매칭 로직 --- 
                let name = (text.match(/(?:이름|성명)\s*[:：\|]?\s*([가-힣]{2,5})/) || [])[1] || f.name.match(/[가-힣]{2,4}/)?.[0] || "미상";
                let school = (text.match(/한국교통대학교/) ? "한국교통대학교" : (text.match(/([가-힣]{2,12}(?:대학교|교육원|사이버대|대학원))/) || [])[1]) || "미상";
                let major = (text.match(/생명공학과/) ? "생명공학과" : (text.match(/([가-힣A-Za-z·\s]{2,15}(?:학과|학부|공학|과))/ ) || [])[1]) || "미상";
                let exp = (text.match(/경력\s*(\d+년\s*\d+개월)/) ? text.match(/경력\s*(\d+년\s*\d+개월)/)[1] : (text.includes('신입') ? '신입' : '미확인'));
                let company = (text.match(/트리노드/) ? "트리노드" : (text.match(/([가-힣A-Za-z0-9\s]{2,20}(?:주식회사|㈜|\(주\)|컴퍼니|그룹))/ ) || [])[1]) || "미확인";
                let isWorking = text.includes('재직');

                results.unshift({
                    '이름': name, '생년(만나이)': '연도 미상(수정)', '성별': '미상', '최종학력': '졸업',
                    '최종학교': school, '전공': major, '총 경력': exp,
                    '재직상태': isWorking ? '🟢 재직중' : '🔴 퇴직', '최종회사': company + (isWorking ? '(재직중)' : ''),
                    '면접상태': '미정', '적합도': '—', '평가': '', '근거': ''
                });
            }
            localStorage.setItem(DB_KEY, JSON.stringify(results));
            btn.innerText = "AI 정밀 분석 시작"; btn.disabled = false;
            renderTable(); switchView('result');
        }

        function renderHead() { document.getElementById('table-head').innerHTML = `<tr>${COLUMNS.map(c => `<th class="p-4 ${c.class}">${c.title}</th>`).join('')}</tr>`; }

        function renderTable() {
            const body = document.getElementById('table-body');
            document.getElementById('count-bar').innerText = `총 ${results.length}명의 데이터 누적`;
            body.innerHTML = results.map((r, i) => `
                <tr class="hover:bg-blue-50/40 border-b">
                    <td><input type="checkbox" class="row-check" onchange="updateDeleteBtn()"></td>
                    <td>${results.length - i}</td>
                    <td class="col-name px-6" onclick="window.open(URL.createObjectURL(fileStore.get('${r['이름']}')||''),'_blank')">${r['이름']}</td>
                    <td><input type="text" value="${r['생년(만나이)']}" onblur="results[${i}]['생년(만나이)']=this.value;save()"></td>
                    <td><input type="text" value="${r['성별']}" onblur="results[${i}]['성별']=this.value;save()"></td>
                    <td><input type="text" value="${r['최종학력']}" onblur="results[${i}]['최종학력']=this.value;save()"></td>
                    <td class="col-school"><input type="text" value="${r['최종학교']}" onblur="results[${i}]['최종학교']=this.value;save()"></td>
                    <td class="col-major"><input type="text" value="${r['전공']}" onblur="results[${i}]['전공']=this.value;save()"></td>
                    <td><input type="text" value="${r['총 경력']}" onblur="results[${i}]['총 경력']=this.value;save()"></td>
                    <td class="text-[9px] font-black">${r['재직상태']}</td>
                    <td class="col-company"><input type="text" value="${r['최종회사']}" onblur="results[${i}]['최종회사']=this.value;save()"></td>
                    <td><select class="border rounded text-[10px] w-full font-bold" onchange="results[${i}]['면접상태']=this.value;save()">
                        <option>미정</option><option>합격</option><option>불합격</option><option>보류</option>
                    </select></td>
                    <td class="col-file"><input type="file" class="text-[9px]" onchange="fileStore.set('${r['이름']}_career', this.files[0])"></td>
                    <td class="col-file"><input type="file" class="text-[9px]" onchange="fileStore.set('${r['이름']}_port', this.files[0])"></td>
                    <td><select class="border rounded text-[10px] w-full font-bold" onchange="results[${i}]['적합도']=this.value;save()">
                        <option>—</option><option>적합</option><option>부적합</option><option>보류</option>
                    </select></td>
                    <td><input type="text" value="${r['평가']}" onblur="results[${i}]['평가']=this.value;save()"></td>
                    <td><input type="text" value="${r['근거']}" onblur="results[${i}]['근거']=this.value;save()"></td>
                </tr>`).join('');
        }

        function save() { localStorage.setItem(DB_KEY, JSON.stringify(results)); }
        function updateDeleteBtn() { document.getElementById('btn-delete-selected').classList.toggle('hidden', document.querySelectorAll('.row-check:checked').length === 0); }
    </script>
</body>
</html>
