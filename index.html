<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY | AI Intelligence v7.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; margin: 0; overflow: hidden; }
        .sidebar { background: #1e1e2d; }
        .active-tab { background-color: #6366f1 !important; color: white !important; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Table Style - 기존 형식 유지 */
        .res-table { width: 100%; border-collapse: separate; border-spacing: 0; }
        .res-table th { position: sticky; top: 0; background: #fdfdfd; z-index: 10; padding: 16px 12px; border-bottom: 1px solid #e2e8f0; font-size: 11px; color: #94a3b8; text-align: center; text-transform: uppercase; }
        .res-table td { padding: 16px 12px; border-bottom: 1px solid #f1f5f9; background: white; font-size: 13px; vertical-align: middle; text-align: center; }
        .res-table tr:hover td { background-color: #f8fafc; }
        
        .score-badge { display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 12px; font-weight: 800; font-size: 14px; }
        .score-high { background: #e0f2fe; color: #0369a1; }
        .score-mid { background: #fef3c7; color: #b45309; }
        .score-low { background: #fee2e2; color: #b91c1c; }

        .loading-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .loading-overlay.active { display: flex; }
        
        .drop-active { border-color: #6366f1 !important; background-color: #eef2ff !important; transform: scale(1.01); }
    </style>
</head>
<body class="h-screen w-screen flex overflow-hidden">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="bg-white p-10 rounded-[2.5rem] text-center shadow-2xl max-w-sm w-full mx-4 border border-slate-100">
            <div class="relative w-16 h-16 mx-auto mb-6">
                <div class="absolute inset-0 border-4 border-indigo-100 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-indigo-600 rounded-full border-t-transparent animate-spin"></div>
            </div>
            <h3 class="text-xl font-black text-slate-900 mb-2">분석 프로세스 가동</h3>
            <p id="loading-status" class="text-slate-400 text-xs font-medium">데이터를 안전하게 전송하고 있습니다...</p>
            <div class="mt-6 w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-indigo-600 w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar w-64 shrink-0 flex flex-col shadow-2xl">
        <div class="p-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <i class="fas fa-microchip text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-white text-md font-black tracking-tight leading-none">EST FAMILY</h1>
                    <p class="text-indigo-400 text-[9px] font-bold uppercase mt-1">Intelligence v7.5</p>
                </div>
            </div>
        </div>
        
        <nav class="flex-1 px-3 space-y-1">
            <button onclick="switchTab('upload')" id="tab-upload" class="active-tab w-full flex items-center gap-3 px-5 py-3.5 rounded-xl text-slate-400 hover:text-white transition-all font-bold text-sm">
                <i class="fas fa-cloud-arrow-up w-5"></i> 분석 엔진 (업로드)
            </button>
            <button onclick="switchTab('list')" id="tab-list" class="w-full flex items-center gap-3 px-5 py-3.5 rounded-xl text-slate-400 hover:text-white transition-all font-bold text-sm">
                <i class="fas fa-list-check w-5"></i> 인재 분석 대시보드
            </button>
        </nav>

        <div class="p-6">
            <div class="bg-indigo-500/10 rounded-2xl p-4 border border-indigo-500/20">
                <p class="text-[10px] text-indigo-300/60 leading-relaxed font-medium">모든 파일은 보안 연결을 통해 암호화되어 전송됩니다.</p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
        <header class="h-16 border-b border-slate-200 px-8 flex items-center justify-between bg-white">
            <div>
                <h2 id="header-title" class="text-lg font-black text-slate-900">분석 엔진</h2>
            </div>
            <div class="flex items-center gap-4">
                <div id="op-avatar" class="w-8 h-8 rounded-full bg-slate-200 border border-white shadow-sm flex items-center justify-center font-black text-slate-500 text-[10px]">
                    ?
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-hidden relative">
            <!-- View: Upload -->
            <div id="view-upload" class="h-full overflow-y-auto p-8 custom-scroll">
                <div class="max-w-4xl mx-auto space-y-6">
                    <!-- JD Section -->
                    <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 block">Job Description</label>
                        <textarea id="jd-text" class="w-full h-28 p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 focus:bg-white transition-all text-sm font-medium outline-none resize-none" placeholder="직무 기술서를 입력하세요."></textarea>
                    </div>
                    
                    <!-- File Section -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div id="drop-zone" class="h-64 border-2 border-dashed border-slate-300 rounded-3xl bg-white flex flex-col items-center justify-center transition-all cursor-pointer hover:border-indigo-400 group">
                            <input type="file" id="file-input" multiple accept=".pdf,image/*" class="hidden">
                            <i class="fas fa-file-arrow-up text-3xl text-slate-300 group-hover:text-indigo-500 mb-4 transition-colors"></i>
                            <p class="text-sm font-black text-slate-800">이력서 파일 선택</p>
                            <p class="text-[10px] text-slate-400 mt-1 font-bold">PDF, Image Support</p>
                        </div>

                        <div class="bg-slate-900 rounded-3xl p-6 flex flex-col shadow-xl">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-indigo-400 text-[10px] font-black uppercase tracking-widest">분석 대기 파일 (<span id="queue-count">0</span>)</h3>
                            </div>
                            <div id="queue-list" class="flex-1 space-y-2 overflow-y-auto custom-scroll pr-1 text-white/30 text-[11px] italic">
                                대기 중인 파일이 없습니다.
                            </div>
                        </div>
                    </div>

                    <button id="btn-analyze" onclick="startProcessing()" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-lg hover:bg-indigo-700 shadow-xl shadow-indigo-600/20 transition-all flex items-center justify-center gap-3">
                        <span>AI 정밀 분석 및 저장 실행</span>
                        <i class="fas fa-bolt-lightning"></i>
                    </button>
                </div>
            </div>

            <!-- View: List (기존 컬럼 형식 유지) -->
            <div id="view-list" class="h-full flex flex-col p-6 hidden">
                <div class="bg-white rounded-3xl border border-slate-200 shadow-xl overflow-hidden flex flex-col flex-1">
                    <div class="flex-1 overflow-auto custom-scroll">
                        <table class="res-table">
                            <thead>
                                <tr>
                                    <th class="w-16">NO</th>
                                    <th>후보자명</th>
                                    <th>성별</th>
                                    <th>나이</th>
                                    <th>학력</th>
                                    <th>경력</th>
                                    <th>직무</th>
                                    <th>매칭점수</th>
                                    <th class="w-24">상세</th>
                                </tr>
                            </thead>
                            <tbody id="data-rows">
                                <tr><td colspan="9" class="py-20 text-slate-400 font-bold italic">데이터를 불러오는 중...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal: Detail -->
    <div id="detail-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeDetail()"></div>
        <div class="bg-white w-full h-full max-w-6xl rounded-[2.5rem] shadow-2xl relative z-10 overflow-hidden flex flex-col md:flex-row">
            <!-- Left: Viewer -->
            <div class="w-full md:w-1/2 bg-slate-100 border-r border-slate-200 flex flex-col">
                <div class="p-4 bg-white border-b border-slate-200 text-[10px] font-black text-slate-400 uppercase flex justify-between">
                    <span>File Viewer</span>
                    <span id="det-filename">...</span>
                </div>
                <div class="flex-1 relative bg-slate-200/50 flex items-center justify-center overflow-hidden">
                    <img id="viewer-img" class="max-w-full max-h-full object-contain hidden">
                    <iframe id="viewer-pdf" class="w-full h-full border-none hidden"></iframe>
                    <div id="viewer-empty" class="text-slate-400 text-xs font-bold">PREVIEW NOT AVAILABLE</div>
                </div>
            </div>
            <!-- Right: Result -->
            <div class="w-full md:w-1/2 flex flex-col bg-white">
                <div class="p-8 border-b border-slate-50 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div id="det-score" class="score-badge !w-14 !h-14">0</div>
                        <div>
                            <h3 id="det-name" class="text-2xl font-black text-slate-900">-</h3>
                            <p id="det-sub" class="text-xs font-bold text-indigo-500 uppercase tracking-tight"></p>
                        </div>
                    </div>
                    <button onclick="closeDetail()" class="text-slate-300 hover:text-slate-600 transition-colors">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                <div class="flex-1 overflow-y-auto custom-scroll p-8 space-y-6">
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest">AI Summary</h4>
                        <p id="det-summary" class="text-sm font-bold text-slate-700 leading-relaxed"></p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-5 bg-emerald-50 rounded-2xl border border-emerald-100">
                            <h5 class="text-[9px] font-black text-emerald-600 uppercase mb-2">Strengths</h5>
                            <p id="det-reason" class="text-[11px] font-bold text-slate-600 leading-relaxed"></p>
                        </div>
                        <div class="p-5 bg-rose-50 rounded-2xl border border-rose-100">
                            <h5 class="text-[9px] font-black text-rose-600 uppercase mb-2">Considerations</h5>
                            <p id="det-penalty" class="text-[11px] font-bold text-slate-600 leading-relaxed"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'est-resume-v75';
        const apiKey = "";

        let currentUser = null;
        let fileQueue = [];
        let analyticsData = [];

        // Auth
        const init = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                const av = document.getElementById('op-avatar');
                av.innerText = user.uid.substring(0,2).toUpperCase();
                av.className = "w-8 h-8 rounded-full bg-indigo-600 border border-white shadow-sm flex items-center justify-center font-black text-white text-[10px]";
                loadData();
            }
        });

        init();

        // Files
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drop-active'); };
        dropZone.ondragleave = () => dropZone.classList.remove('drop-active');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-active');
            addFiles(e.dataTransfer.files);
        };
        fileInput.onchange = (e) => addFiles(e.target.files);

        function addFiles(files) {
            fileQueue = [...fileQueue, ...Array.from(files)];
            renderQueue();
        }

        function renderQueue() {
            const list = document.getElementById('queue-list');
            document.getElementById('queue-count').innerText = fileQueue.length;
            if (!fileQueue.length) { list.innerHTML = "대기 중인 파일이 없습니다."; return; }
            list.innerHTML = fileQueue.map((f, i) => `
                <div class="flex items-center justify-between p-2.5 bg-white/5 border border-white/10 rounded-xl">
                    <span class="truncate pr-4 text-white font-bold">${f.name}</span>
                    <i class="fas fa-circle-xmark cursor-pointer hover:text-rose-400" onclick="window.removeFile(${i})"></i>
                </div>
            `).join('');
        }

        window.removeFile = (i) => { fileQueue.splice(i, 1); renderQueue(); };

        // Process
        window.startProcessing = async () => {
            if (!currentUser || !fileQueue.length) return;
            const jd = document.getElementById('jd-text').value.trim();
            if (!jd) { alert("JD를 입력해주세요."); return; }

            const overlay = document.getElementById('loading-overlay');
            const status = document.getElementById('loading-status');
            const progress = document.getElementById('progress-bar');
            overlay.classList.add('active');

            for (let i = 0; i < fileQueue.length; i++) {
                const file = fileQueue[i];
                progress.style.width = `${((i)/fileQueue.length)*100}%`;
                status.innerText = `${file.name} 분석 중...`;

                try {
                    const b64 = await fileToBase64(file);
                    const aiRes = await runAI(jd, file.type, b64);
                    if (aiRes) {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'resumes'), {
                            ...aiRes,
                            originalFile: b64,
                            mimeType: file.type,
                            fileName: file.name,
                            owner: currentUser.uid,
                            timestamp: serverTimestamp()
                        });
                    }
                } catch (e) { console.error(e); }
            }

            overlay.classList.remove('active');
            fileQueue = [];
            renderQueue();
            switchTab('list');
        };

        async function runAI(jd, mime, b64) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = `이력서 분석 전문가로서 다음 JD와 이력서를 대조하여 JSON으로 출력하세요.
            반드시 한국어로 작성하며, 아래 형식의 JSON 객체여야 합니다.
            {
                "name": "성명",
                "gender": "남성/여성",
                "age": "나이(숫자만)",
                "education": "최종학력 및 전공",
                "career": "총 경력(예: 5년 6개월)",
                "job": "최종 또는 주요 직무",
                "score": 0~100 사이 숫자,
                "summary": "핵심 요약 2문장",
                "reason": "강점 및 적합 사유",
                "penalty": "주의 및 고려 사항"
            }
            JD: ${jd}`;

            const payload = {
                contents: [{
                    parts: [
                        { text: prompt },
                        { inlineData: { mimeType: mime.includes('pdf') ? 'application/pdf' : 'image/jpeg', data: b64 } }
                    ]
                }],
                generationConfig: { responseMimeType: "application/json" }
            };

            const r = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
            const d = await r.json();
            return JSON.parse(d.candidates[0].content.parts[0].text);
        }

        const fileToBase64 = (f) => new Promise(res => {
            const r = new FileReader();
            r.onload = () => res(r.result.split(',')[1]);
            r.readAsDataURL(f);
        });

        // Data & UI
        function loadData() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'resumes'), (snap) => {
                analyticsData = snap.docs.map(d => ({id: d.id, ...d.data()}))
                    .sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                renderTable();
            });
        }

        function renderTable() {
            const tb = document.getElementById('data-rows');
            if (!analyticsData.length) {
                tb.innerHTML = `<tr><td colspan="9" class="py-20 text-slate-400 font-bold italic">데이터가 없습니다.</td></tr>`;
                return;
            }
            tb.innerHTML = analyticsData.map((d, i) => `
                <tr class="cursor-pointer" onclick="window.viewDetail('${d.id}')">
                    <td class="text-slate-300 font-bold">${analyticsData.length - i}</td>
                    <td class="font-black text-slate-900">${d.name || '-'}</td>
                    <td class="text-slate-500 font-bold">${d.gender || '-'}</td>
                    <td class="text-slate-500 font-bold">${d.age || '-'}세</td>
                    <td class="text-indigo-600 font-bold">${d.education || '-'}</td>
                    <td class="font-black text-slate-700">${d.career || '-'}</td>
                    <td class="font-bold text-slate-600">${d.job || '-'}</td>
                    <td><div class="score-badge ${d.score >= 80 ? 'score-high' : d.score >= 40 ? 'score-mid' : 'score-low'}">${d.score || 0}</div></td>
                    <td><button class="w-8 h-8 rounded-lg bg-slate-50 text-slate-400 hover:bg-indigo-600 hover:text-white transition-all"><i class="fas fa-eye text-xs"></i></button></td>
                </tr>
            `).join('');
        }

        window.viewDetail = (id) => {
            const d = analyticsData.find(x => x.id === id);
            if (!d) return;
            document.getElementById('det-name').innerText = d.name;
            document.getElementById('det-sub').innerText = `${d.gender} | ${d.age}세 | ${d.career}`;
            document.getElementById('det-summary').innerText = d.summary;
            document.getElementById('det-reason').innerText = d.reason;
            document.getElementById('det-penalty').innerText = d.penalty;
            document.getElementById('det-score').innerText = d.score;
            document.getElementById('det-score').className = `score-badge !w-14 !h-14 ${d.score >= 80 ? 'score-high' : d.score >= 40 ? 'score-mid' : 'score-low'}`;
            document.getElementById('det-filename').innerText = d.fileName;

            const img = document.getElementById('viewer-img');
            const pdf = document.getElementById('viewer-pdf');
            img.classList.add('hidden'); pdf.classList.add('hidden');

            if (d.originalFile) {
                if (d.mimeType?.includes('pdf')) {
                    pdf.src = `data:application/pdf;base64,${d.originalFile}`;
                    pdf.classList.remove('hidden');
                } else {
                    img.src = `data:${d.mimeType};base64,${d.originalFile}`;
                    img.classList.remove('hidden');
                }
            }
            document.getElementById('detail-modal').classList.remove('hidden');
        };

        window.closeDetail = () => {
            document.getElementById('detail-modal').classList.add('hidden');
            document.getElementById('viewer-pdf').src = "";
        };

        window.switchTab = (t) => {
            document.getElementById('view-upload').classList.toggle('hidden', t !== 'upload');
            document.getElementById('view-list').classList.toggle('hidden', t !== 'list');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`tab-${t}`).classList.add('active-tab');
            document.getElementById('header-title').innerText = t === 'upload' ? '분석 엔진' : '인재 분석 대시보드';
        };
    </script>
</body>
</html>
