<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY - 채용 이력서 분석 시스템</title>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background-color: #f9fafb; margin: 0; }
        .hidden { display: none !important; }
        .active-nav { background-color: rgba(255,255,255,0.12); color: #ffffff; font-weight: 700; }
        table { border-collapse: collapse; width: 100%; font-size: 11px; }
        th, td { border: 1px solid #e5e7eb; padding: 12px; text-align: center; }
        th { background-color: #f8f9fc; color: #6b7280; font-weight: 700; }
    </style>
</head>
<body>
    <div id="login-screen" class="h-screen flex items-center justify-center bg-[#f4f7f9]">
        <div class="bg-white p-10 rounded-2xl shadow-xl border border-gray-100 w-96 text-center">
            <div class="w-14 h-14 bg-[#4a6cf7] rounded-2xl mx-auto mb-6 flex items-center justify-center text-white font-bold text-xl shadow-lg">EST</div>
            <h2 class="text-xl font-extrabold text-gray-800 mb-2">채용 이력서 분석 시스템</h2>
            <p class="text-sm text-gray-400 mb-8 font-medium">접근하려면 비밀번호를 입력하세요</p>
            <input type="password" id="pw-input" class="w-full border border-gray-200 p-4 rounded-xl mb-4 outline-none focus:ring-2 ring-[#4a6cf7] text-center" placeholder="비밀번호 입력" onkeypress="if(event.keyCode==13) checkAuth()">
            <button onclick="checkAuth()" class="w-full bg-[#4a6cf7] text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all">로그인</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-60 bg-[#1e3a8a] text-white flex flex-col shrink-0 shadow-2xl">
            <div class="p-6 border-b border-white/10">
                <h1 class="text-xl font-black italic tracking-tighter">EST FAMILY</h1>
            </div>
            <nav class="p-4 space-y-2">
                <button onclick="switchTab('upload')" id="nav-upload" class="w-full text-left p-3 rounded-xl text-sm opacity-60 hover:opacity-100 transition">📁 이력서 업로드</button>
                <button onclick="switchTab('result')" id="nav-result" class="w-full text-left p-3 rounded-xl text-sm active-nav">📊 분석 결과 확인</button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white border-b p-4 px-8 flex justify-between items-center shadow-sm">
                <h2 id="header-title" class="font-bold text-gray-800 text-lg">분석 결과 리스트</h2>
                <div class="flex items-center gap-2 px-3 py-1 bg-green-50 rounded-full">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-xs font-bold text-green-700 uppercase">Online</span>
                </div>
            </header>

            <div id="tab-result" class="p-8 flex-1 overflow-auto">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-extrabold text-gray-800 text-sm">총 <span id="count" class="text-blue-600">0</span>명의 데이터가 누적되었습니다</h3>
                    <button onclick="downloadXLSX()" class="bg-[#4a6cf7] text-white px-5 py-2.5 rounded-lg text-xs font-bold shadow-lg hover:bg-blue-700 transition">⬇ 엑셀(XLSX) 다운로드</button>
                </div>
                <div class="bg-white rounded-xl border border-gray-100 overflow-x-auto shadow-sm">
                    <table>
                        <thead><tr id="table-head"></tr></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-upload" class="hidden p-8 max-w-2xl mx-auto w-full space-y-6">
                <div class="bg-white p-12 rounded-2xl border-2 border-dashed border-gray-200 text-center cursor-pointer hover:border-blue-400 transition" onclick="document.getElementById('file-input').click()">
                    <div class="text-4xl mb-4">📄</div>
                    <p class="text-blue-600 font-bold">클릭하여 이력서 파일(PDF/TXT)을 선택하세요</p>
                    <input type="file" id="file-input" class="hidden" multiple accept=".pdf,.txt" onchange="handleFileSelect(this)">
                </div>
                <div id="selected-files" class="space-y-2 text-sm text-gray-600 font-medium"></div>
                <button id="btn-analyze" onclick="startAnalysis()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold opacity-50 cursor-not-allowed transition" disabled>AI 분석 시작</button>
            </div>
        </main>
    </div>

    <script>
        const DEFAULT_PW = "estsoft2024";
        const CURRENT_YEAR = 2026; // 현재 시점 기준
        const COLUMNS = ["No.", "이름", "생년(만나이)", "성별", "최종학력", "최종학교", "전공", "총 경력", "최종회사", "면접상태", "이력서", "적합도", "평가", "근거"];
        let results = JSON.parse(localStorage.getItem('est_data_v5') || '[]');

        function checkAuth() {
            if (document.getElementById('pw-input').value === DEFAULT_PW) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                renderHead(); renderTable();
            } else { alert("비밀번호가 틀렸습니다."); }
        }

        function switchTab(tab) {
            document.getElementById('tab-upload').classList.toggle('hidden', tab !== 'upload');
            document.getElementById('tab-result').classList.toggle('hidden', tab !== 'result');
            document.getElementById('nav-upload').classList.toggle('active-nav', tab === 'upload');
            document.getElementById('nav-result').classList.toggle('active-nav', tab === 'result');
        }

        function handleFileSelect(input) {
            const list = document.getElementById('selected-files');
            const files = Array.from(input.files);
            list.innerHTML = files.map(f => `<div>✅ ${f.name}</div>`).join('');
            const btn = document.getElementById('btn-analyze');
            btn.disabled = files.length === 0;
            btn.style.opacity = files.length === 0 ? "0.5" : "1";
            btn.style.cursor = files.length === 0 ? "not-allowed" : "pointer";
        }

        // 나이 계산 로직 추가 
        function calculateAge(birthText) {
            const yearMatch = birthText.match(/\d{4}/); // 4자리 연도 추출
            if (yearMatch) {
                const birthYear = parseInt(yearMatch[0]);
                const age = CURRENT_YEAR - birthYear;
                return `${birthYear}년생 (만 ${age}세)`; [cite: 167]
            }
            return birthText || "미상";
        }

        async function startAnalysis() {
            const btn = document.getElementById('btn-analyze');
            const files = Array.from(document.getElementById('file-input').files);
            btn.innerText = "나이 계산 및 데이터 분석 중...";
            btn.disabled = true;

            setTimeout(() => {
                files.forEach(file => {
                    // 예시 생년 데이터 (실제 AI 분석 결과에서 가져온다고 가정) 
                    const mockBirth = "1994년"; 
                    
                    results.unshift({
                        "이름": file.name.split('.')[0],
                        "생년(만나이)": calculateAge(mockBirth), // 자동 계산 함수 적용
                        "성별": "남", "최종학력": "대졸", "최종학교": "대학교", "전공": "컴퓨터공학",
                        "총 경력": "3년", "최종회사": "ESTSOFT", "면접상태": "미정"
                    });
                });
                localStorage.setItem('est_data_v5', JSON.stringify(results));
                btn.innerText = "AI 분석 시작"; btn.disabled = false;
                renderTable(); switchTab('result');
            }, 1500);
        }

        function renderHead() {
            document.getElementById('table-head').innerHTML = COLUMNS.map(c => `<th class="p-4 text-xs">${c}</th>`).join('');
        }

        function renderTable() {
            const body = document.getElementById('table-body');
            document.getElementById('count').innerText = results.length;
            if (results.length === 0) { body.innerHTML = `<tr><td colspan="14" class="p-20 text-gray-400">데이터가 없습니다.</td></tr>`; return; }
            body.innerHTML = results.map((r, i) => `
                <tr class="hover:bg-gray-50 border-b">
                    <td class="text-gray-400">${results.length - i}</td>
                    <td class="font-bold text-gray-800">${r["이름"]}</td>
                    <td class="text-blue-700 font-medium">${r["생년(만나이)"]}</td>
                    <td>${r["성별"]}</td><td>${r["최종학력"]}</td><td>${r["최종학교"]}</td>
                    <td class="text-blue-600 font-bold text-[10px]">${r["전공"]}</td>
                    <td>${r["총 경력"]}</td><td>${r["최종회사"]}</td>
                    <td><select class="border rounded p-1 text-[10px] bg-white"><option>미정</option><option>합격</option></select></td>
                    <td colspan="4" class="text-gray-300">—</td>
                </tr>`).join('');
        }

        function downloadXLSX() {
            const ws = XLSX.utils.json_to_sheet(results);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "분석결과");
            XLSX.writeFile(wb, "EST_FAMILY_분석결과_나이포함.xlsx");
        }
    </script>
</body>
</html>
