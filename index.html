<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY | 이력서 분석 시스템</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2224%22 fill=%22%231d4ed8%22/><text y=%22.75em%22 x=%22.18em%22 font-family=%22Arial Black%22 font-size=%2270%22 fill=%22white%22>E</text></svg>">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f9fafb; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .sidebar-active { background: rgba(255,255,255,0.15); color: white; font-weight: 700; border-radius: 0.75rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- 원본 코드 기반 설정 ---
        const COLUMNS = ["No.", "이름", "생년(만나이)", "성별", "최종학력", "최종학교", "전공", "총 경력", "최종회사", "면접진행 여부", "이력서", "JD 적합도", "적합도 평가", "평가 근거"];
        const SCORE_LABELS = {
            1: { label: "매우 부적합", sub: "직무 요건 불일치", color: "#dc2626", bg: "#fef2f2", border: "#fecaca" },
            2: { label: "부적합", sub: "보완 필요", color: "#ea580c", bg: "#fff7ed", border: "#fed7aa" },
            3: { label: "보통", sub: "추가 검토 필요", color: "#b45309", bg: "#fefce8", border: "#fde68a" },
            4: { label: "적합 Outreach 권장", sub: "직무 요건 충족", color: "#15803d", bg: "#f0fdf4", border: "#86efac" },
            5: { label: "매우 적합 Outreach 권장", sub: "탁월한 부합", color: "#1d4ed8", bg: "#eff6ff", border: "#93c5fd" }
        };

        function App() {
            const [auth, setAuth] = useState(null);
            const [passwords, setPasswords] = useState({ user: "estsoft2024", admin: "admin1234" });
            const [loginInput, setLoginInput] = useState("");
            const [activeTab, setActiveTab] = useState("upload");
            
            const [files, setFiles] = useState([]);
            const [fileLinks, setFileLinks] = useState({});
            const [jd, setJd] = useState("");
            const [results, setResults] = useState([]);
            const [processing, setProcessing] = useState(false);
            const fileRef = useRef(null);

            const handleLogin = () => {
                if (loginInput === passwords.admin) setAuth("admin");
                else if (loginInput === passwords.user) setAuth("user");
                else alert("비밀번호가 올바르지 않습니다.");
            };

            const handleAnalyze = async () => {
                if (!files.length) return;
                setProcessing(true);
                setActiveTab("result");
                
                // 가상의 분석 프로세스 (원본 로직 반영)
                const mock = files.map((f, i) => ({
                    "No.": i + 1,
                    "이름": f.name.split('.')[0], 
                    "생년(만나이)": "199X년생 (만 XX세)",
                    "성별": "미추출",
                    "최종학력": "대졸",
                    "최종학교": "대학교",
                    "전공": "관련학과",
                    "총 경력": "X년 X개월",
                    "최종회사": "OOO사",
                    "면접진행 여부": "미정",
                    "이력서": fileLinks[f.name] || "#",
                    "JD 적합도": (Math.random() * (5 - 3) + 3).toFixed(1),
                    "평가 근거": ["경험 기반 역량 보유", "JD 필수 요건 부합"]
                }));

                setTimeout(() => {
                    setResults(mock);
                    setProcessing(false);
                }, 2000);
            };

            const openResume = (link) => {
                if (!link || link === "#") {
                    alert("등록된 이력서 링크가 없습니다.");
                    return;
                }
                window.open(link.startsWith('http') ? link : `https://${link}`, '_blank');
            };

            const exportExcel = () => {
                const ws = XLSX.utils.json_to_sheet(results.map(r => ({
                    ...r,
                    "적합도 평가": SCORE_LABELS[Math.round(r["JD 적합도"])].label,
                    "평가 근거": r["평가 근거"].join(", ")
                })));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "분석결과");
                XLSX.writeFile(wb, `이력서_분석결과_${new Date().toLocaleDateString()}.xlsx`);
            };

            if (!auth) return (
                <div className="h-screen flex items-center justify-center bg-[#f3f4f6]">
                    <div className="bg-white p-12 rounded-3xl shadow-2xl w-full max-w-[400px] border border-gray-100 text-center">
                        <div className="bg-[#1d4ed8] text-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl font-black shadow-lg shadow-blue-200">E</div>
                        <h1 className="text-2xl font-black text-gray-900 mb-2">EST FAMILY</h1>
                        <p className="text-gray-400 text-sm mb-10">채용 이력서 분석 시스템</p>
                        <input type="password" value={loginInput} onChange={e => setLoginInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin()} className="w-full border-2 border-gray-100 rounded-xl px-5 py-4 mb-5 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition-all text-center tracking-widest" placeholder="비밀번호를 입력하세요"/>
                        <button onClick={handleLogin} className="w-full bg-[#1d4ed8] text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-800 transition-all shadow-lg shadow-blue-100">시스템 접속</button>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen w-full overflow-hidden">
                    {/* 사이드바 */}
                    <div className="w-64 bg-[#1e3a8a] text-white flex flex-col shrink-0 shadow-2xl">
                        <div className="p-8 border-b border-white/10">
                            <div className="flex items-center gap-2">
                                <span className="text-3xl font-black italic tracking-tighter">EST</span>
                                <span className="text-xs font-bold text-white/40 tracking-[0.2em] mt-1">FAMILY</span>
                            </div>
                        </div>
                        <nav className="flex-1 p-4 space-y-2 mt-4">
                            {[
                                { id: "upload", label: "📁 업로드 & 설정" },
                                { id: "result", label: "📊 분석 결과" },
                                { id: "admin", label: "⚙️ 관리자 설정" }
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full text-left px-5 py-4 transition-all text-sm ${activeTab === tab.id ? "sidebar-active" : "text-white/50 hover:bg-white/5 hover:text-white"}`}>
                                    {tab.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-6">
                            <button onClick={() => setAuth(null)} className="w-full bg-white/10 border border-white/10 py-3 rounded-xl text-xs font-bold text-white/60 hover:bg-white/20 hover:text-white transition-all">시스템 잠금</button>
                        </div>
                    </div>

                    {/* 메인 컨텐츠 */}
                    <div className="flex-1 flex flex-col min-w-0 bg-[#f9fafb]">
                        <header className="h-20 bg-white border-b border-gray-100 px-10 flex justify-between items-center shrink-0">
                            <div>
                                <h2 className="text-lg font-black text-gray-800 uppercase tracking-tight">{activeTab === "upload" ? "Upload & Setup" : activeTab === "result" ? "Analysis Result" : "Settings"}</h2>
                                <p className="text-[11px] text-blue-600 font-bold tracking-widest uppercase">HR Intelligence System</p>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right mr-4">
                                    <p className="text-xs font-black text-gray-800">{auth === "admin" ? "관리자 모드" : "사용자 모드"}</p>
                                    <p className="text-[10px] text-green-500 font-bold">System Online</p>
                                </div>
                                <div className="w-10 h-10 bg-gray-100 rounded-full border-2 border-white shadow-sm"></div>
                            </div>
                        </header>

                        <main className="flex-1 p-10 overflow-auto no-scrollbar">
                            <div className="w-full h-full"> {/* 최대화 설정: max-w 제거 */}
                                {activeTab === "upload" && (
                                    <div className="grid grid-cols-1 gap-8 animate-in fade-in duration-500">
                                        <div className="bg-white p-10 rounded-3xl border border-gray-100 shadow-sm">
                                            <h3 className="text-base font-bold text-gray-800 mb-6 flex items-center gap-2">이력서 원본 업로드 <span className="text-xs font-normal text-gray-400">(최대 10개)</span></h3>
                                            <div onClick={() => fileRef.current.click()} className="group border-4 border-dashed border-gray-50 rounded-3xl py-16 text-center cursor-pointer hover:bg-blue-50/50 hover:border-blue-100 transition-all">
                                                <div className="text-5xl mb-4 group-hover:scale-110 transition-transform">📂</div>
                                                <p className="text-blue-600 font-black text-sm">분석할 파일을 선택하거나 여기로 드래그하세요</p>
                                                <p className="text-gray-400 text-xs mt-2">PDF, TXT 파일 지원</p>
                                                <input type="file" multiple ref={fileRef} className="hidden" onChange={e => setFiles(Array.from(e.target.files).slice(0, 10))}/>
                                            </div>
                                            {files.length > 0 && (
                                                <div className="mt-8 space-y-3">
                                                    {files.map(f => (
                                                        <div key={f.name} className="flex gap-4 items-center bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                                            <span className="text-xs font-bold text-gray-700 w-48 truncate">{f.name}</span>
                                                            <input className="flex-1 border-2 border-white rounded-xl px-4 py-2 text-xs outline-none focus:border-blue-200 transition-all shadow-sm" placeholder="OneDrive 또는 이력서 링크를 입력해 주세요 (선택)" onChange={e => setFileLinks(prev => ({...prev, [f.name]: e.target.value}))}/>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        <div className="bg-white p-10 rounded-3xl border border-gray-100 shadow-sm">
                                            <h3 className="text-base font-bold text-gray-800 mb-6">직무 기술서 (JD) 설정</h3>
                                            <textarea value={jd} onChange={e => setJd(e.target.value)} className="w-full h-48 border-2 border-gray-50 bg-gray-50 rounded-2xl p-6 text-sm outline-none focus:bg-white focus:border-blue-100 transition-all resize-none" placeholder="채용하고자 하는 직무의 주요 역량, 우대 사항 등을 상세히 입력해 주세요. 입력된 내용을 바탕으로 AI가 적합도를 평가합니다." />
                                        </div>

                                        <button onClick={handleAnalyze} disabled={!files.length || processing} className={`w-full py-5 rounded-2xl font-black text-lg shadow-2xl transition-all ${!files.length || processing ? "bg-gray-200 text-gray-400 cursor-not-allowed" : "bg-[#1d4ed8] text-white hover:bg-blue-800 hover:scale-[1.01] shadow-blue-200"}`}>
                                            {processing ? "데이터 분석 및 평가 중..." : `AI 분석 시작 (${files.length}건)`}
                                        </button>
                                    </div>
                                )}

                                {activeTab === "result" && (
                                    <div className="animate-in slide-in-from-bottom-4 duration-700 h-full flex flex-col">
                                        <div className="flex justify-between items-end mb-6 shrink-0">
                                            <div>
                                                <h3 className="text-xl font-black text-gray-900">분석 요약 보고서</h3>
                                                <p className="text-xs text-gray-400 mt-1">총 {results.length}명의 후보자가 분석되었습니다.</p>
                                            </div>
                                            <button onClick={exportExcel} className="bg-gray-900 text-white px-6 py-3 rounded-xl text-xs font-bold hover:bg-black transition-all shadow-lg">엑셀 파일 내보내기</button>
                                        </div>

                                        <div className="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden flex-1 overflow-x-auto">
                                            <table className="w-full text-left text-xs border-collapse min-w-[1200px]">
                                                <thead className="bg-gray-50/80 border-b border-gray-100 text-gray-500 font-bold sticky top-0">
                                                    <tr>
                                                        {COLUMNS.map(c => <th key={c} className="px-6 py-5 whitespace-nowrap uppercase tracking-tighter">{c}</th>)}
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-50">
                                                    {results.map((r, i) => {
                                                        const scoreIdx = Math.round(r["JD 적합도"]);
                                                        const scoreInfo = SCORE_LABELS[scoreIdx] || SCORE_LABELS[3];
                                                        return (
                                                            <tr key={i} className="hover:bg-blue-50/30 transition-all group">
                                                                <td className="px-6 py-5 text-gray-300 font-bold">{i+1}</td>
                                                                <td onClick={() => openResume(r.이력서)} className="px-6 py-5 font-black text-gray-900 cursor-pointer group-hover:text-blue-700 whitespace-nowrap underline decoration-gray-200 decoration-2 underline-offset-4">{r.이름}</td>
                                                                <td className="px-6 py-5 text-gray-600 whitespace-nowrap">{r["생년(만나이)"]}</td>
                                                                <td className="px-6 py-5 text-gray-600">{r.성별}</td>
                                                                <td className="px-6 py-5 text-gray-600">{r.최종학력}</td>
                                                                <td className="px-6 py-5 text-gray-600">{r.최종학교}</td>
                                                                <td className="px-6 py-5 text-gray-600">{r.전공}</td>
                                                                <td className="px-6 py-5 text-gray-600 whitespace-nowrap font-bold">{r["총 경력"]}</td>
                                                                <td className="px-6 py-5 text-gray-600">{r.최종회사}</td>
                                                                <td className="px-6 py-5">
                                                                    <select className="bg-gray-50 border-none rounded-lg px-2 py-1 text-[10px] font-bold outline-none focus:ring-2 focus:ring-blue-100">
                                                                        <option>미정</option><option>진행 예정</option><option>합격</option><option>불합격</option>
                                                                    </select>
                                                                </td>
                                                                <td className="px-6 py-5">
                                                                    <button onClick={() => openResume(r.이력서)} className="text-blue-600 font-black hover:scale-110 transition-transform">Link</button>
                                                                </td>
                                                                <td className="px-6 py-5">
                                                                    <span className="bg-gray-900 text-white px-3 py-1 rounded-full font-black text-[10px] shadow-sm">{r["JD 적합도"]}/5</span>
                                                                </td>
                                                                <td className="px-6 py-5">
                                                                    <div style={{ backgroundColor: scoreInfo.bg, borderColor: scoreInfo.border }} className="border rounded-xl p-2 min-w-[140px] shadow-sm">
                                                                        <div style={{ color: scoreInfo.color }} className="font-black text-[10px]">{scoreInfo.label}</div>
                                                                        <div className="text-gray-400 text-[9px] mt-0.5">{scoreInfo.sub}</div>
                                                                    </div>
                                                                </td>
                                                                <td className="px-6 py-5 text-gray-500 leading-relaxed min-w-[250px]">
                                                                    <ul className="list-disc pl-4 space-y-1">
                                                                        {r["평가 근거"].map((msg, midx) => <li key={midx} className="text-[11px]">{msg}</li>)}
                                                                    </ul>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {activeTab === "admin" && (
                                    <div className="max-w-2xl mx-auto mt-10 animate-in zoom-in-95 duration-500">
                                        <div className="bg-white p-12 rounded-[2.5rem] border border-gray-100 shadow-2xl text-center">
                                            <div className="text-6xl mb-8">🛡️</div>
                                            <h3 className="text-2xl font-black text-gray-900 mb-2">관리자 보안 설정</h3>
                                            <p className="text-gray-400 text-sm mb-10">시스템 접근 비밀번호를 관리하고 보안 정책을 설정합니다.</p>
                                            
                                            <div className="text-left space-y-6">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="text-[11px] font-black text-gray-400 uppercase tracking-widest block mb-2 ml-1">사용자 PW</label>
                                                        <input type="password" value={passwords.user} onChange={e => setPasswords(p => ({...p, user: e.target.value}))} className="w-full border-2 border-gray-50 bg-gray-50 rounded-2xl px-5 py-4 text-sm outline-none focus:bg-white focus:border-blue-100 transition-all" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[11px] font-black text-gray-400 uppercase tracking-widest block mb-2 ml-1">관리자 PW</label>
                                                        <input type="password" value={passwords.admin} onChange={e => setPasswords(p => ({...p, admin: e.target.value}))} className="w-full border-2 border-gray-50 bg-gray-50 rounded-2xl px-5 py-4 text-sm outline-none focus:bg-white focus:border-blue-100 transition-all" />
                                                    </div>
                                                </div>
                                                <div className="pt-4">
                                                    <button onClick={() => alert("설정이 저장되었습니다.")} className="w-full bg-gray-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-black transition-all shadow-xl shadow-gray-200">새로운 설정 저장하기</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
