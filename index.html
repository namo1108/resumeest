<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY - 채용 이력서 분석 시스템</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; }
        .sidebar-active { background: rgba(255,255,255,.12); color: #fff; font-weight: 700; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 설정 및 상수 ---
        const CLAUDE_MODEL = "claude-3-5-sonnet-20240620"; // 최신 모델로 조정 가능 [cite: 8]
        const DEFAULT_PW = "estsoft2024"; // [cite: 9]
        const ADMIN_PW = "admin1234"; // [cite: 10]
        
        const SCORE_LABELS = {
            1: { label: "매우 부적합", sub: "직무 요건과 거의 일치하지 않음", color: "#dc2626", bg: "#fef2f2", border: "#fecaca" },
            2: { label: "부적합", sub: "일부 요건 충족, 보완 필요", color: "#ea580c", bg: "#fff7ed", border: "#fed7aa" },
            3: { label: "보통", sub: "기본 요건 충족, 추가 검토 필요", color: "#b45309", bg: "#fefce8", border: "#fde68a" },
            4: { label: "적합", sub: "직무 요건 충족, 적극 접촉 권장", color: "#15803d", bg: "#f0fdf4", border: "#86efac" },
            5: { label: "매우 적합", sub: "직무 요건에 탁월히 부합", color: "#1d4ed8", bg: "#eff6ff", border: "#93c5fd" }
        }; // [cite: 12-21]

        // --- 메인 앱 컴포넌트 ---
        function App() {
            const [auth, setAuth] = useState(null);
            const [activeTab, setActiveTab] = useState("upload");
            const [results, setResults] = useState([]); // 분석 결과 누적 데이터
            const [files, setFiles] = useState([]);
            const [jd, setJd] = useState("");
            const [processing, setProcessing] = useState(false);
            const fileRef = useRef();

            // 1. 데이터 로드 (localStorage에서 누적 데이터 가져오기)
            useEffect(() => {
                const savedResults = localStorage.getItem('resume_results');
                if (savedResults) {
                    setResults(JSON.parse(savedResults));
                }
            }, []);

            // 2. 데이터 저장 (결과가 변할 때마다 저장)
            useEffect(() => {
                localStorage.setItem('resume_results', JSON.stringify(results));
            }, [results]);

            // --- Claude API 호출 함수 (기존 로직 유지) --- [cite: 24-33]
            const callClaude = async (messages, systemPrompt) => {
                // 주의: 클라이언트 측에서 API Key를 직접 넣으면 보안 위험이 있습니다.
                // 배포 시에는 Netlify Functions 등을 통해 숨기는 것을 권장합니다.
                const API_KEY = "YOUR_CLAUDE_API_KEY"; 
                try {
                    const res = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "x-api-key": API_KEY,
                            "anthropic-version": "2023-06-01",
                            "dangerouslyAllowBrowser": "true"
                        },
                        body: JSON.stringify({ model: CLAUDE_MODEL, max_tokens: 1000, system: systemPrompt, messages })
                    });
                    const data = await res.json();
                    return data.content[0].text;
                } catch (err) {
                    console.error("API Error:", err);
                    return null;
                }
            };

            const handleAnalyze = async () => {
                if (!files.length) return;
                setProcessing(true);
                
                const newResults = [];
                // 기존 로직을 따라 이력서 분석 수행... [cite: 161-189]
                // (샘플 로직으로 대체, 실제 구현 시 callClaude 연동 필요)
                
                // 분석 완료 후 데이터 누적
                setResults(prev => [...newResults, ...prev]); 
                setProcessing(false);
                setActiveTab("result");
            };

            const clearData = () => {
                if(confirm("모든 누적 데이터를 삭제하시겠습니까?")) {
                    setResults([]);
                    localStorage.removeItem('resume_results');
                }
            };

            // --- UI 렌더링 (이미지와 코드의 스타일 반영) ---
            return (
                <div className="flex min-h-screen">
                    {/* 사이드바 [cite: 76-111] */}
                    <aside className="w-[220px] bg-[#1e3a8a] text-white flex flex-col shrink-0">
                        <div className="p-5 border-b border-white/10">
                            <h1 className="text-2xl font-black">EST <span className="text-white/70 font-semibold text-sm">FAMILY</span></h1>
                            <p className="text-[10px] text-white/40 mt-1">채용 이력서 분석 시스템</p>
                        </div>
                        <nav className="flex-1 p-3 space-y-1">
                            {["upload", "result", "admin"].map(id => (
                                <button 
                                    key={id}
                                    onClick={() => setActiveTab(id)}
                                    className={`w-full text-left px-3 py-2.5 rounded-md text-sm transition ${activeTab === id ? 'bg-white/10 text-white font-bold' : 'text-white/60 font-medium'}`}
                                >
                                    {id === 'upload' ? '📁 업로드 & 설정' : id === 'result' ? '📊 분석 결과' : '⚙️ 관리자 설정'}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* 메인 콘텐츠 */}
                    <main className="flex-1 flex flex-col">
                        {/* 상단바 [cite: 418-438] */}
                        <header className="bg-white border-b px-7 py-3.5 flex justify-between items-center shadow-sm">
                            <span className="font-bold text-gray-800">{activeTab === 'upload' ? '업로드 & 설정' : '분석 결과'}</span>
                            <div className="flex items-center gap-2">
                                <div className="w-2 h-2 bg-green-500 rounded-full"></div>
                                <span className="text-xs font-semibold text-gray-600">일반 사용자</span>
                            </div>
                        </header>

                        <section className="p-8 max-w-[1100px] w-full">
                            {activeTab === 'upload' && (
                                <div className="space-y-5">
                                    <div className="bg-white p-6 rounded-lg border shadow-sm">
                                        <h3 className="text-sm font-bold mb-4">이력서 업로드 <span className="text-gray-400 font-normal">- 최대 10개</span></h3>
                                        <div 
                                            onClick={() => fileRef.current.click()}
                                            className="border-2 border-dashed border-gray-200 rounded-lg p-9 text-center cursor-pointer bg-gray-50 hover:bg-gray-100 transition"
                                        >
                                            <p className="text-blue-600 font-semibold text-sm">클릭하거나 파일을 드래그하세요</p>
                                            <p className="text-gray-400 text-xs mt-1">PDF, TXT 지원</p>
                                            <input type="file" ref={fileRef} className="hidden" multiple accept=".pdf,.txt" onChange={(e) => setFiles(Array.from(e.target.files))} />
                                        </div>
                                    </div>

                                    <div className="bg-white p-6 rounded-lg border shadow-sm">
                                        <h3 className="text-sm font-bold mb-1">직무 기술서 (JD)</h3>
                                        <p className="text-xs text-gray-400 mb-3">입력 시 적합도 자동 평가가 진행됩니다.</p>
                                        <textarea 
                                            className="w-full h-32 p-3 border rounded-md text-sm outline-none focus:border-blue-500"
                                            placeholder="예) 마케팅 기획 3년 이상..."
                                            value={jd}
                                            onChange={(e) => setJd(e.target.value)}
                                        ></textarea>
                                    </div>

                                    <button 
                                        onClick={handleAnalyze}
                                        disabled={!files.length || processing}
                                        className="w-full bg-blue-600 text-white py-3 rounded-md font-bold disabled:opacity-50"
                                    >
                                        {processing ? "분석 중..." : `AI 분석 시작 (${files.length}개 이력서)`}
                                    </button>
                                </div>
                            )}

                            {activeTab === 'result' && (
                                <div className="bg-white rounded-lg border shadow-sm overflow-hidden">
                                    <div className="p-4 border-b flex justify-between items-center">
                                        <span className="font-bold text-sm">총 {results.length}명 누적 분석 완료</span>
                                        <button onClick={clearData} className="text-xs text-red-500 hover:underline">전체 기록 삭제</button>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-xs text-left">
                                            <thead className="bg-gray-50 border-b-2 border-gray-200">
                                                <tr>
                                                    <th className="p-3">No.</th>
                                                    <th className="p-3">이름</th>
                                                    <th className="p-3">총 경력</th>
                                                    <th className="p-3">JD 적합도</th>
                                                    <th className="p-3">적합도 평가</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {results.map((r, i) => (
                                                    <tr key={i} className="border-b hover:bg-gray-50">
                                                        <td className="p-3 text-gray-400">{results.length - i}</td>
                                                        <td className="p-3 font-bold">{r.이름}</td>
                                                        <td className="p-3 text-gray-600">{r.경력}</td>
                                                        <td className="p-3"><span className="bg-blue-600 text-white px-2 py-1 rounded-full text-[10px]">{r.score}/5</span></td>
                                                        <td className="p-3">
                                                            <div className="border p-1 rounded bg-blue-50">
                                                                <p className="font-bold text-blue-600 text-[10px]">매우 적합</p>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
