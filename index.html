<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY - 채용 이력서 분석 시스템</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; }
        .active-tab { background: rgba(255,255,255,.12); color: #fff; font-weight: 700; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 색상 및 라벨 상수 [cite: 12-21]
        const SCORE_LABELS = {
            1: { label: "매우 부적합", color: "#dc2626", bg: "#fef2f2", border: "#fecaca" },
            2: { label: "부적합", color: "#ea580c", bg: "#fff7ed", border: "#fed7aa" },
            3: { label: "보통", color: "#b45309", bg: "#fefce8", border: "#fde68a" },
            4: { label: "적합", color: "#15803d", bg: "#f0fdf4", border: "#86efac" },
            5: { label: "매우 적합", color: "#1d4ed8", bg: "#eff6ff", border: "#93c5fd" }
        };

        function App() {
            const [activeTab, setActiveTab] = useState("upload");
            const [files, setFiles] = useState([]);
            const [results, setResults] = useState([]); // 누적 데이터
            const [processing, setProcessing] = useState(false);
            const [jd, setJd] = useState("");
            const fileRef = useRef();

            // 1. 초기 로드: 로컬 스토리지에서 데이터 가져오기
            useEffect(() => {
                const saved = localStorage.getItem('est_resume_results');
                if (saved) setResults(JSON.parse(saved));
            }, []);

            // 2. 데이터 변경 시 자동 저장
            useEffect(() => {
                localStorage.setItem('est_resume_results', JSON.stringify(results));
            }, [results]);

            // 분석 시작 함수
            const handleAnalyze = async () => {
                if (files.length === 0) return;
                setProcessing(true);

                // 가상의 지연 시간 (분석 느낌 유도)
                setTimeout(() => {
                    const newItems = files.map((file, i) => ({
                        id: Date.now() + i,
                        이름: file.name.split('.')[0],
                        학력: "대졸",
                        학교: "대학교",
                        경력: "3년 6개월",
                        score: (Math.random() * 2 + 3).toFixed(1), // 3.0 ~ 5.0 랜덤 점수
                        date: new Date().toLocaleDateString()
                    }));

                    setResults(prev => [...newItems, ...prev]); // 최신 데이터가 위로 오게 누적 [cite: 203]
                    setFiles([]); // 파일 목록 초기화
                    setProcessing(false);
                    setActiveTab("result"); // 결과 탭으로 자동 이동 [cite: 195]
                }, 1500);
            };

            const resetData = () => {
                if(confirm("모든 데이터를 초기화하시겠습니까?")) {
                    setResults([]);
                    localStorage.removeItem('est_resume_results');
                }
            };

            return (
                <div className="flex min-h-screen">
                    {/* 사이드바 [cite: 83-111] */}
                    <aside className="w-[220px] bg-[#1e3a8a] text-white flex flex-col shrink-0">
                        <div className="p-5 border-b border-white/10">
                            <h1 className="text-xl font-black italic">EST <span className="font-normal text-white/70 text-sm">FAMILY</span></h1> [cite: 86-87]
                            <p className="text-[10px] text-white/40 mt-1">채용 이력서 분석 시스템</p> [cite: 88]
                        </div>
                        <nav className="flex-1 p-3 space-y-1">
                            <button onClick={() => setActiveTab("upload")} className={`w-full text-left px-3 py-2 rounded text-sm ${activeTab==='upload'?'active-tab':'text-white/60'}`}>업로드 & 설정</button>
                            <button onClick={() => setActiveTab("result")} className={`w-full text-left px-3 py-2 rounded text-sm ${activeTab==='result'?'active-tab':'text-white/60'}`}>분석 결과</button>
                        </nav>
                    </aside>

                    {/* 메인 콘텐츠 */}
                    <main className="flex-1 flex flex-col bg-[#f9fafb]">
                        <header className="bg-white border-b px-8 py-4 flex justify-between items-center shadow-sm">
                            <span className="font-bold text-gray-800">{activeTab === 'upload' ? '업로드 & 설정' : '분석 결과'}</span> [cite: 422-423]
                            <div className="flex items-center gap-2">
                                <div className="w-2 h-2 bg-green-500 rounded-full"></div>
                                <span className="text-xs font-bold text-gray-600">일반 사용자</span> [cite: 433-435]
                            </div>
                        </header>

                        <div className="p-8 max-w-5xl mx-auto w-full">
                            {activeTab === 'upload' ? (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-lg border">
                                        <h3 className="text-sm font-bold mb-4">이력서 업로드 <span className="text-gray-400 font-normal">- 최대 10개</span></h3> [cite: 235]
                                        <div 
                                            onClick={() => fileRef.current.click()}
                                            className="border-2 border-dashed border-gray-200 rounded-lg p-10 text-center cursor-pointer bg-gray-50 hover:bg-gray-100 transition"
                                        > [cite: 236-238]
                                            <p className="text-blue-600 font-bold text-sm">클릭하거나 파일을 드래그하세요</p> [cite: 241]
                                            <input type="file" ref={fileRef} multiple className="hidden" onChange={(e) => setFiles(Array.from(e.target.files))} /> [cite: 243-244]
                                        </div>
                                        {files.length > 0 && <p className="mt-3 text-xs text-blue-600 font-bold">{files.length}개의 파일 선택됨</p>}
                                    </div>

                                    <div className="bg-white p-6 rounded-lg border">
                                        <h3 className="text-sm font-bold mb-3">직무 기술서 (JD)</h3> [cite: 268]
                                        <textarea 
                                            className="w-full h-32 p-3 border rounded text-sm outline-none focus:border-blue-500"
                                            placeholder="예) 마케팅 기획 3년 이상..."
                                            value={jd}
                                            onChange={(e) => setJd(e.target.value)}
                                        ></textarea> [cite: 270-271]
                                    </div>

                                    <button 
                                        onClick={handleAnalyze}
                                        disabled={files.length === 0 || processing}
                                        className="w-full bg-[#1d4ed8] text-white py-3 rounded-lg font-bold disabled:bg-gray-300 shadow-md"
                                    > [cite: 273-274]
                                        {processing ? "분석 중..." : `AI 분석 시작 (${files.length}개 이력서)`}
                                    </button>
                                </div>
                            ) : (
                                <div className="bg-white rounded-lg border shadow-sm overflow-hidden">
                                    <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                                        <span className="font-bold text-sm text-gray-700">총 {results.length}명 누적 분석 완료</span> [cite: 296]
                                        <button onClick={resetData} className="text-[10px] text-red-500 hover:underline">데이터 초기화</button>
                                    </div>
                                    <table className="w-full text-xs text-left">
                                        <thead className="bg-gray-50 border-b">
                                            <tr>
                                                <th className="p-3 text-gray-500">No.</th>
                                                <th className="p-3">이름</th>
                                                <th className="p-3">최종학력</th>
                                                <th className="p-3">총 경력</th>
                                                <th className="p-3">적합도 평가</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {results.map((r, i) => {
                                                const scoreInfo = SCORE_LABELS[Math.round(r.score)] || SCORE_LABELS[3];
                                                return (
                                                    <tr key={r.id} className="border-b hover:bg-gray-50">
                                                        <td className="p-3 text-gray-400">{results.length - i}</td>
                                                        <td className="p-3 font-bold">{r.이름}</td>
                                                        <td className="p-3">{r.학력}</td>
                                                        <td className="p-3">{r.경력}</td>
                                                        <td className="p-3">
                                                            <div style={{background: scoreInfo.bg, color: scoreInfo.color, border: `1px solid ${scoreInfo.border}`}} className="inline-block px-2 py-1 rounded font-bold text-[10px]">
                                                                {scoreInfo.label} ({r.score}/5)
                                                            </div> [cite: 71-74]
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                            {results.length === 0 && <tr><td colSpan="5" className="p-20 text-center text-gray-400">데이터가 없습니다. 업로드 탭에서 분석을 시작해 주세요.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
