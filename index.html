<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY 이력서 분석 시스템</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2224%22 fill=%22%231d4ed8%22/><text y=%22.75em%22 x=%22.18em%22 font-family=%22Arial Black%22 font-size=%2270%22 fill=%22white%22>E</text></svg>">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; }
        .sidebar-item-active { background: rgba(255,255,255,0.12); color: white; border-radius: 0.5rem; }
        /* 테이블 스크롤바 디자인 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f9fafb]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const DEFAULT_PW = "estsoft2024";
        const ADMIN_PW = "admin1234";
        const COLUMNS = ["No.", "이름", "생년(만나이)", "성별", "최종학력", "최종학교", "전공", "총 경력", "최종회사", "면접진행 여부", "이력서", "JD 적합도", "적합도 평가", "평가 근거"];

        const SCORE_LABELS = {
            1: { label: "매우 부적합", sub: "직무 요건과 거의 일치하지 않음", color: "#dc2626", bg: "#fef2f2", border: "#fecaca" },
            2: { label: "부적합", sub: "일부 요건 충족, 보완 필요", color: "#ea580c", bg: "#fff7ed", border: "#fed7aa" },
            3: { label: "보통", sub: "기본 요건 충족, 추가 검토 필요", color: "#b45309", bg: "#fefce8", border: "#fde68a" },
            4: { label: "적합 Outreach 권장", sub: "직무 요건 충족, 적극 접촉 권장", color: "#15803d", bg: "#f0fdf4", border: "#86efac" },
            5: { label: "매우 적합 Outreach 권장", sub: "직무 요건에 탁월히 부합", color: "#1d4ed8", bg: "#eff6ff", border: "#93c5fd" }
        };

        const ScoreBadge = ({ score }) => {
            if (!score) return <span className="text-gray-400">-</span>;
            const n = Math.min(Math.max(Math.round(parseFloat(score)), 1), 5);
            const colors = { 1: "#dc2626", 2: "#ea580c", 3: "#b45309", 4: "#15803d", 5: "#1d4ed8" };
            return (
                <span style={{ backgroundColor: colors[n] }} className="text-white px-2.5 py-0.5 rounded-full text-[11px] font-bold">
                    {score}/5
                </span>
            );
        };

        const ScoreInfo = ({ score }) => {
            if (!score) return <span className="text-gray-400">-</span>;
            const n = Math.min(Math.max(Math.round(parseFloat(score)), 1), 5);
            const info = SCORE_LABELS[n];
            return (
                <div style={{ backgroundColor: info.bg, borderColor: info.border }} className="border rounded-md p-1.5 min-w-[150px]">
                    <div style={{ color: info.color }} className="font-bold text-[11px]">{info.label}</div>
                    <div className="text-gray-500 text-[10px]">{info.sub}</div>
                </div>
            );
        };

        function App() {
            const [auth, setAuth] = useState(null);
            const [loginInput, setLoginInput] = useState("");
            const [loginErr, setLoginErr] = useState("");
            const [activeTab, setActiveTab] = useState("upload");
            
            const [files, setFiles] = useState([]);
            const [fileLinks, setFileLinks] = useState({}); // 파일별 링크 저장
            const [jd, setJd] = useState("");
            const [results, setResults] = useState([]);
            const [processing, setProcessing] = useState(false);
            const [progress, setProgress] = useState({ current: 0, total: 0, label: "" });
            const fileRef = useRef(null);

            const handleLogin = () => {
                if (loginInput === ADMIN_PW) { setAuth("admin"); setLoginErr(""); }
                else if (loginInput === DEFAULT_PW) { setAuth("user"); setLoginErr(""); }
                else { setLoginErr("비밀번호가 일치하지 않습니다."); }
            };

            const handleAnalyze = async () => {
                if (files.length === 0) return;
                setProcessing(true);
                setActiveTab("result");
                
                const dummyResults = [];
                for (let i = 0; i < files.length; i++) {
                    setProgress({ current: i + 1, total: files.length, label: `${files[i].name} 분석 중...` });
                    await new Promise(res => setTimeout(res, 800));
                    
                    dummyResults.push({
                        "이름": files[i].name.split('.')[0], 
                        "생년(만나이)": "199X년생 (만 XX세)", "성별": "남",
                        "최종학력": "대졸", "최종학교": "대학교", "전공": "관련학과",
                        "총 경력": "X년 X개월", "최종회사": "전 직장", "면접진행 여부": "미정",
                        "이력서": fileLinks[files[i].name] || "", // 입력한 링크 저장
                        "JD 적합도": (Math.random() * (5 - 3) + 3).toFixed(1), 
                        "평가 근거": ["직무 역량 우수", "경험 일치도 높음"]
                    });
                    setResults([...dummyResults]);
                }
                setProcessing(false);
            };

            const openResume = (link) => {
                if (!link) { alert("등록된 링크가 없습니다."); return; }
                const url = link.startsWith('http') ? link : `https://${link}`;
                window.open(url, '_blank');
            };

            const exportExcel = () => {
                const ws = XLSX.utils.json_to_sheet(results);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "분석결과");
                XLSX.writeFile(wb, "이력서_분석결과.xlsx");
            };

            if (!auth) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-50 p-6">
                        <div className="bg-white p-10 rounded-2xl shadow-xl w-full max-w-sm border border-gray-100 text-center">
                            <div className="bg-[#1d4ed8] text-white w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-6 text-xl font-black">EST</div>
                            <h1 className="text-xl font-bold text-gray-900 mb-1">이력서 분석 시스템</h1>
                            <p className="text-gray-400 text-sm mb-8">Password를 입력해 주세요.</p>
                            <input type="password" className="w-full border border-gray-200 rounded-xl px-4 py-3 mb-4 outline-none focus:ring-2 focus:ring-blue-500 transition text-center tracking-widest" placeholder="비밀번호" value={loginInput} onChange={e => setLoginInput(e.target.value)} onKeyDown={e => e.key === "Enter" && handleLogin()}/>
                            {loginErr && <p className="text-red-500 text-xs mb-4 text-left font-medium">{loginErr}</p>}
                            <button onClick={handleLogin} className="w-full bg-[#1d4ed8] text-white py-3 rounded-xl font-bold hover:bg-blue-800 transition shadow-lg shadow-blue-200">로그인</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex min-h-screen font-sans">
                    {/* 사이드바 */}
                    <div className="w-60 bg-[#1e3a8a] text-white flex flex-col shrink-0 shadow-2xl">
                        <div className="p-6 border-b border-white/10">
                            <div className="flex items-baseline gap-1">
                                <span className="text-2xl font-black italic">EST</span>
                                <span className="text-xs font-semibold text-white/50 tracking-widest">FAMILY</span>
                            </div>
                            <div className="text-[10px] text-white/40 mt-1 uppercase tracking-tighter">Resume Analysis System</div>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            {[{id:"upload", label:"📁 업로드 & 설정"}, {id:"result", label:"📊 분석 결과"}, {id:"admin", label:"⚙️ 관리자 설정"}].map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 text-sm transition ${activeTab === item.id ? "sidebar-item-active" : "text-white/60 hover:bg-white/5"}`}>
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4">
                            <button onClick={() => setAuth(null)} className="w-full bg-white/10 py-2 rounded-lg text-xs text-white/70 hover:bg-white/20 transition">시스템 잠금</button>
                        </div>
                    </div>

                    {/* 메인 컨텐츠 - 최대화 설정 */}
                    <div className="flex-1 flex flex-col bg-[#f9fafb] overflow-hidden">
                        <header className="h-16 bg-white border-b border-gray-200 px-8 flex justify-between items-center shadow-sm shrink-0">
                            <div>
                                <h2 className="text-sm font-bold text-gray-800">{activeTab === "upload" ? "업로드 & 설정" : activeTab === "result" ? "분석 결과" : "관리자 설정"}</h2>
                                <p className="text-[10px] text-gray-400 uppercase tracking-widest">ESTsoft Human Resources</p>
                            </div>
                            <div className="flex items-center gap-2 text-xs font-bold text-gray-500">
                                <span className="w-2 h-2 bg-green-500 rounded-full"></span>
                                {auth === "admin" ? "ADMIN" : "USER"}
                            </div>
                        </header>

                        <main className="p-8 w-full flex-1 overflow-y-auto"> {/* max-w 제거로 최대화 */}
                            {activeTab === "upload" && (
                                <div className="space-y-6">
                                    <div className="bg-white p-8 rounded-2xl border border-gray-200 shadow-sm">
                                        <h3 className="text-sm font-bold mb-4">이력서 업로드 및 링크 설정</h3>
                                        <div onClick={() => fileRef.current.click()} className="border-2 border-dashed border-gray-200 rounded-2xl py-12 text-center cursor-pointer bg-gray-50 hover:bg-blue-50/50 hover:border-blue-200 transition">
                                            <div className="text-3xl mb-3">📄</div>
                                            <p className="text-blue-600 font-bold text-sm">클릭하거나 파일을 이곳에 드롭하세요</p>
                                            <input type="file" multiple ref={fileRef} className="hidden" onChange={e => setFiles(Array.from(e.target.files).slice(0, 10))} />
                                        </div>
                                        {files.length > 0 && (
                                            <div className="mt-6 space-y-2">
                                                <p className="text-[11px] font-bold text-gray-400 ml-1 uppercase">파일별 OneDrive/파일 링크 입력</p>
                                                {files.map((f, idx) => (
                                                    <div key={idx} className="flex gap-3 items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                                                        <span className="text-[11px] font-bold text-gray-700 w-40 truncate">{f.name}</span>
                                                        <input className="flex-1 border border-gray-200 rounded-lg px-3 py-1.5 text-[11px] outline-none focus:border-blue-500 transition" placeholder="OneDrive 또는 이력서 링크를 입력해 주세요 (선택)" onChange={e => setFileLinks(prev => ({...prev, [f.name]: e.target.value}))} />
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    <div className="bg-white p-8 rounded-2xl border border-gray-200 shadow-sm">
                                        <h3 className="text-sm font-bold mb-4">직무 기술서 (JD) 설정</h3>
                                        <textarea className="w-full h-40 border border-gray-200 rounded-xl p-4 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition resize-none bg-gray-50/50" placeholder="요구 역량, 우대 사항 등을 입력해 주세요." value={jd} onChange={e => setJd(e.target.value)} />
                                    </div>
                                    <button onClick={handleAnalyze} disabled={files.length === 0 || processing} className={`w-full py-4 rounded-xl font-bold text-white transition shadow-lg ${files.length === 0 || processing ? 'bg-gray-300' : 'bg-[#1d4ed8] hover:bg-blue-800 shadow-blue-100'}`}>
                                        {processing ? "분석 중..." : `AI 분석 시작 (${files.length}건)`}
                                    </button>
                                </div>
                            )}

                            {activeTab === "result" && (
                                <div className="space-y-4 h-full flex flex-col">
                                    {processing && (
                                        <div className="bg-white p-6 rounded-xl border border-gray-200 animate-pulse">
                                            <div className="flex justify-between mb-3 text-xs font-bold">
                                                <span className="text-blue-600">{progress.label}</span>
                                                <span>{progress.current}/{progress.total}</span>
                                            </div>
                                            <div className="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                                                <div style={{ width: `${(progress.current/progress.total)*100}%` }} className="bg-blue-600 h-full transition-all"></div>
                                            </div>
                                        </div>
                                    )}
                                    <div className="flex justify-between items-center shrink-0">
                                        <h3 className="font-bold text-gray-800 text-sm">분석 결과 <span className="text-blue-600 ml-1">{results.length}건</span></h3>
                                        <button onClick={exportExcel} className="bg-gray-800 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-black transition">엑셀 다운로드</button>
                                    </div>
                                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden flex-1 overflow-x-auto no-scrollbar">
                                        <table className="w-full text-left text-xs border-collapse min-w-[1200px]">
                                            <thead className="bg-gray-50 border-b border-gray-200 text-gray-500 font-bold uppercase sticky top-0 z-10">
                                                <tr>{COLUMNS.map(col => <th key={col} className="px-4 py-4 whitespace-nowrap">{col}</th>)}</tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {results.map((res, i) => (
                                                    <tr key={i} className="hover:bg-blue-50/30 transition group">
                                                        <td className="px-4 py-4 text-gray-400 font-medium">{i+1}</td>
                                                        <td onClick={() => openResume(res.이력서)} className="px-4 py-4 font-bold text-gray-900 whitespace-nowrap cursor-pointer hover:text-blue-600 hover:underline">{res.이름}</td>
                                                        <td className="px-4 py-4 text-gray-600 whitespace-nowrap">{res["생년(만나이)"]}</td>
                                                        <td className="px-4 py-4">{res.성별}</td>
                                                        <td className="px-4 py-4">{res.최종학력}</td>
                                                        <td className="px-4 py-4">{res.최종학교}</td>
                                                        <td className="px-4 py-4">{res.전공}</td>
                                                        <td className="px-4 py-4 whitespace-nowrap font-semibold">{res["총 경력"]}</td>
                                                        <td className="px-4 py-4">{res.최종회사}</td>
                                                        <td className="px-4 py-4">
                                                            <select className="border border-gray-200 rounded p-1 text-[11px] outline-none bg-white font-medium">
                                                                <option>미정</option><option>진행 중</option><option>합격</option><option>불합격</option>
                                                            </select>
                                                        </td>
                                                        <td className="px-4 py-4">
                                                            <button onClick={() => openResume(res.이력서)} className="text-blue-600 font-bold hover:scale-110 transition-transform">Link</button>
                                                        </td>
                                                        <td className="px-4 py-4"><ScoreBadge score={res["JD 적합도"]} /></td>
                                                        <td className="px-4 py-4"><ScoreInfo score={res["JD 적합도"]} /></td>
                                                        <td className="px-4 py-4 min-w-[250px] text-gray-500 leading-relaxed">
                                                            <ul className="list-disc pl-4 space-y-0.5 text-[11px]">
                                                                {res["평가 근거"].map((msg, midx) => <li key={midx}>{msg}</li>)}
                                                            </ul>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {activeTab === "admin" && (
                                <div className="max-w-md mx-auto mt-10 bg-white p-10 rounded-[2rem] border border-gray-200 shadow-xl text-center">
                                    <div className="text-5xl mb-6">🛡️</div>
                                    <h3 className="font-bold text-xl text-gray-900 mb-2">관리자 보안 설정</h3>
                                    <p className="text-gray-400 text-xs mb-8">시스템 접속 비밀번호를 안전하게 관리하세요.</p>
                                    <div className="text-left space-y-5">
                                        <div>
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2 ml-1">변경할 사용자 비밀번호</label>
                                            <input type="password" placeholder="새 비밀번호 입력" className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition bg-gray-50" />
                                        </div>
                                        <button className="w-full bg-gray-900 text-white py-3.5 rounded-xl text-sm font-bold shadow-xl hover:bg-black transition">저장하기</button>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
