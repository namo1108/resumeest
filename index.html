<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY - 채용 이력서 분석 시스템</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-weight='900' fill='%234a6cf7'>E</text></svg>">
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; }
        .hidden { display: none !important; }
        .active-nav { background-color: rgba(255,255,255,0.2); color: #ffffff; font-weight: 800; border-left: 4px solid #ffffff; }
        
        /* 테이블 UI 개선: 줄바꿈 방지 및 가독성 최적화 */
        table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 11px; min-width: 1700px; table-layout: fixed; }
        th, td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #e2e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 700; position: sticky; top: 0; z-index: 10; }
        
        /* 특정 컬럼 너비 고정 및 줄바꿈 허용 여부 설정 */
        .col-check { width: 40px; }
        .col-no { width: 50px; }
        .col-name { width: 140px; text-align: left; font-weight: 800; color: #0f172a; white-space: normal; }
        .col-birth { width: 160px; }
        .col-school { width: 180px; text-align: left; }
        .col-major { width: 180px; text-align: left; color: #2563eb; font-weight: 600; white-space: normal; line-height: 1.3; }
        .col-exp { width: 110px; }
        .col-status { width: 90px; }
        .col-company { width: 180px; text-align: left; }
        .col-interview { width: 100px; }
        .col-fit { width: 100px; }
        .col-memo { width: 150px; }

        input[type="text"]:focus, select:focus { border-color: #4a6cf7; ring: 2px; ring-color: #bfdbfe; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.4s ease; }
    </style>
</head>
<body>

    <div id="login-screen" class="h-screen flex items-center justify-center bg-gradient-to-br from-[#1e3a8a] via-[#4a6cf7] to-[#93c5fd]">
        <div class="bg-white p-12 rounded-3xl shadow-2xl w-[420px] text-center relative overflow-hidden">
            <div class="w-20 h-20 bg-gradient-to-br from-[#4a6cf7] to-[#1e3a8a] rounded-3xl mx-auto mb-8 flex items-center justify-center text-white font-black text-3xl shadow-lg">E</div>
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2 tracking-tighter">이력서 분석 시스템</h1>
            <p class="text-sm text-gray-500 mb-10 font-medium text-center">접근하려면 비밀번호를 입력하세요</p>
            <input type="password" id="pw-input" 
                class="w-full border-2 border-gray-100 p-5 rounded-xl mb-3 outline-none text-center font-bold bg-white transition-all" 
                placeholder="비밀번호 입력" autocomplete="off">
            <p id="login-error" class="hidden text-red-500 text-sm font-bold mb-5">비밀번호가 올바르지 않습니다.</p>
            <div class="mb-0 h-3"></div>
            <button id="login-btn" 
                class="w-full bg-[#1e3a8a] text-white py-5 rounded-xl font-bold hover:bg-blue-800 shadow-lg text-lg transition-all active:scale-[0.98]">
                시스템 로그인
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-64 bg-gradient-to-b from-[#1e3a8a] to-[#1e40af] text-white flex flex-col shrink-0 shadow-2xl z-20">
            <div class="p-7 border-b border-white/10 flex items-center gap-3">
                <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center text-white font-black text-xl">E</div>
                <div>
                    <h1 class="text-xl font-extrabold italic uppercase leading-none tracking-tight">EST FAMILY</h1>
                    <p class="text-[10px] text-white/50 mt-1 uppercase">HR System</p>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-2 font-bold">
                <button id="tab-btn-upload" class="w-full text-left p-4 rounded-xl text-sm opacity-70 hover:opacity-100 flex items-center gap-3 transition-all">📁 이력서 업로드</button>
                <button id="tab-btn-result" class="w-full text-left p-4 rounded-xl text-sm active-nav flex items-center gap-3 transition-all">📊 분석 결과 리스트</button>
            </nav>
            <div class="p-4 border-t border-white/10">
                <button id="logout-btn" class="w-full text-left p-3 rounded-xl text-xs opacity-50 hover:opacity-90 flex items-center gap-3 transition-all text-white font-bold">🚪 로그아웃</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-[#f1f5f9]">
            <header class="bg-white border-b border-gray-100 p-5 px-9 flex justify-between items-center shadow-sm z-10">
                <h2 id="header-title" class="font-extrabold text-gray-900 text-xl">분석 결과 리스트</h2>
                <div class="px-4 py-1.5 bg-green-50 rounded-full border border-green-100 flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[11px] font-extrabold text-green-700 tracking-widest uppercase">System Online</span>
                </div>
            </header>

            <div id="view-result" class="p-9 flex-1 overflow-auto">
                <div class="bg-white p-6 rounded-2xl mb-7 shadow-sm border border-gray-100 flex justify-between items-center">
                    <div>
                        <h3 id="count-bar" class="font-bold text-gray-900 text-base">
                            총 <span class="text-blue-600 font-black text-xl">0</span>명의 데이터 누적
                        </h3>
                    </div>
                    <div class="flex gap-3">
                        <button id="btn-delete-selected" class="bg-orange-50 text-orange-500 border border-orange-200 px-5 py-3 rounded-xl text-sm font-bold hover:bg-orange-100 transition-colors hidden">🗑 선택 삭제</button>
                        <button id="btn-clear" class="bg-red-50 text-red-500 border border-red-100 px-5 py-3 rounded-xl text-sm font-bold hover:bg-red-100 transition-colors">전체 초기화</button>
                        <button id="btn-download" class="bg-[#4a6cf7] text-white px-7 py-3 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700 transition-colors">⬇ XLSX 다운로드</button>
                    </div>
                </div>
                <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table id="result-table">
                            <thead id="table-head"></thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="view-upload" class="hidden p-9 max-w-3xl mx-auto w-full space-y-7 text-center">
                <div class="bg-white p-16 rounded-3xl border-4 border-dashed border-gray-200 cursor-pointer hover:border-blue-400 transition-colors" id="drop-zone">
                    <div class="text-6xl mb-7">📂</div>
                    <p class="text-2xl text-blue-700 font-extrabold text-center">분석할 이력서를 선택하세요</p>
                    <p class="text-sm text-gray-400 mt-2.5 font-medium text-center">PDF, HWP, DOCX, TXT 지원 (개별 데이터 자동 추출)</p>
                    <input type="file" id="file-input" class="hidden" multiple accept=".pdf,.hwp,.docx,.doc,.txt">
                </div>
                <div id="selected-files" class="grid grid-cols-2 gap-3 text-xs text-gray-600 font-bold px-2 text-center"></div>
                <button id="btn-analyze" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl opacity-30 cursor-not-allowed transition-all shadow-xl" disabled>AI 정밀 분석 시작</button>
            </div>
        </main>
    </div>

    <script>
        const VALID_PW = "estsoft2024";
        const CURRENT_YEAR = 2026; //
        const DB_KEY = 'est_final_master_db';
        const SESSION_KEY = 'est_auth';
        const COLUMNS = [
            { title: "☑", class: "col-check" }, { title: "No.", class: "col-no" }, 
            { title: "이름", class: "col-name" }, { title: "생년(만나이)", class: "col-birth" }, 
            { title: "성별", class: "col-status" }, { title: "최종학력", class: "col-status" },
            { title: "최종학교", class: "col-school" }, { title: "전공", class: "col-major" }, 
            { title: "총 경력", class: "col-exp" }, { title: "재직상태", class: "col-status" }, 
            { title: "최종회사", class: "col-company" }, { title: "면접상태", class: "col-interview" }, 
            { title: "이력서", class: "col-status" }, { title: "적합도", class: "col-fit" }, 
            { title: "평가", class: "col-memo" }, { title: "근거", class: "col-memo" }
        ];

        let results = JSON.parse(localStorage.getItem(DB_KEY) || '[]');

        function saveData() { localStorage.setItem(DB_KEY, JSON.stringify(results)); }

        function parseExpMonths(str) {
            if (!str || str === '신입') return 0;
            const s = str.replace(/\s/g, '');
            let months = 0;
            const y = s.match(/(\d+)년/); if (y) months += parseInt(y[1]) * 12;
            const m = s.match(/(\d+)개월/); if (m) months += parseInt(m[1]);
            return months;
        }

        function formatExp(months) {
            if (months <= 0) return '신입';
            const y = Math.floor(months / 12), m = months % 12;
            return y > 0 && m > 0 ? `${y}년 ${m}개월` : y > 0 ? `${y}년` : `${m}개월`;
        }

        function statusBadge(company, exp) {
            const c = (company || '').toLowerCase();
            if (!company || company === '-' || company === '미확인') {
                return exp === '신입' ? '<span class="px-2 py-0.5 rounded-full text-[9px] font-black bg-blue-100 text-blue-600 uppercase">신입</span>' : '<span class="px-2 py-0.5 rounded-full text-[9px] font-black bg-gray-100 text-gray-400 uppercase">미확인</span>';
            }
            if (c.includes('재직')) return '<span class="px-2 py-0.5 rounded-full text-[9px] font-black bg-green-100 text-green-700">🟢 재직중</span>';
            return '<span class="px-2 py-0.5 rounded-full text-[9px] font-black bg-red-100 text-red-600 uppercase">🔴 퇴직</span>';
        }

        function enterApp() {
            sessionStorage.setItem(SESSION_KEY, '1');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            renderHead(); renderTable();
        }

        // ── 초기화 & 인증 ──
        window.addEventListener('load', () => {
            if (sessionStorage.getItem(SESSION_KEY) === '1') enterApp();

            const pwInput = document.getElementById('pw-input');
            const loginBtn = document.getElementById('login-btn');
            const handleAuth = () => {
                if (pwInput.value === VALID_PW) enterApp();
                else {
                    document.getElementById('login-error').classList.remove('hidden');
                    pwInput.classList.add('shake');
                    setTimeout(() => pwInput.classList.remove('shake'), 400);
                }
            };
            loginBtn.onclick = handleAuth;
            pwInput.onkeydown = e => { if (e.key === 'Enter') handleAuth(); };
            
            // 이벤트 위임
            document.getElementById('table-body').addEventListener('change', e => {
                const idx = parseInt(e.target.dataset.index);
                if (isNaN(idx)) return;
                if (e.target.classList.contains('interview-select')) results[idx]['면접상태'] = e.target.value;
                if (e.target.classList.contains('fit-select')) results[idx]['적합도'] = e.target.value;
                saveData();
            });

            document.getElementById('table-body').addEventListener('blur', e => {
                const idx = parseInt(e.target.dataset.index);
                if (isNaN(idx)) return;
                const fields = { 'exp-input': '총 경력', 'company-input': '최종회사', 'eval-input': '평가', 'note-input': '근거' };
                for (let cls in fields) {
                    if (e.target.classList.contains(cls)) { results[idx][fields[cls]] = e.target.value; saveData(); renderTable(); break; }
                }
            }, true);

            document.getElementById('tab-btn-upload').onclick = () => switchView('upload');
            document.getElementById('tab-btn-result').onclick = () => switchView('result');
            document.getElementById('logout-btn').onclick = () => { sessionStorage.clear(); location.reload(); };
            document.getElementById('btn-clear').onclick = () => { if(confirm('전체 초기화하시겠습니까?')) { results = []; saveData(); renderTable(); } };
        });

        function switchView(view) {
            document.getElementById('view-upload').classList.toggle('hidden', view !== 'upload');
            document.getElementById('view-result').classList.toggle('hidden', view !== 'result');
            document.getElementById('tab-btn-upload').classList.toggle('active-nav', view === 'upload');
            document.getElementById('tab-btn-result').classList.toggle('active-nav', view === 'result');
        }

        // ── 데이터 추출 (강화된 정규식) ──
        function parseResume(text, fname) {
            const t = text || '';
            // 이름 추출 최적화
            let name = (t.match(/(?:이름|성명)\s*[:：\|]?\s*([가-힣]{2,5})/) || [])[1];
            if (!name) name = fname.replace(/^[\[\(].*?[\]\)]\s*/, '').match(/[가-힣]{2,4}/)?.[0] || fname.split('.')[0];

            // 생년 및 나이
            let birth = 1990;
            const bMatch = t.match(/(\d{4})[.\-년\/]\s*(\d{1,2})[.\-월\/]\s*(\d{1,2})/) || t.match(/(\d{4})\s*년/);
            if (bMatch) birth = parseInt(bMatch[1]);
            else { const fnYear = fname.match(/\d{4}/); if(fnYear) birth = parseInt(fnYear[0]); }

            // 전공 추출 (더 넓은 범위 매칭)
            const major = (t.match(/([가-힣A-Za-z·\s]{2,20}(?:학과|학부|공학|계열|전공))/ ) || [])[1]?.trim() || '미확인';

            // 경력 계산
            let totalMonths = 0;
            const rangeRe = /(\d{4})[.\-년\/]\s*(\d{1,2})[월]?\s*[~\-]\s*(?:(\d{4})[.\-년\/]\s*(\d{1,2})[월]?|(현재|재직|재학))/g;
            let m; while ((m = rangeRe.exec(t)) !== null) {
                const sy = parseInt(m[1]), sm = parseInt(m[2]);
                let ey = m[5] ? CURRENT_YEAR : parseInt(m[3]), em = m[5] ? (new Date().getMonth()+1) : parseInt(m[4]);
                const dur = (ey - sy) * 12 + (em - sm);
                if (dur > 0 && dur < 600) totalMonths += dur;
            }

            // 최종회사 (가장 최근 기간 앞 텍스트)
            let company = '미확인';
            if (totalMonths > 0) {
                const coMatch = t.match(/([가-힣A-Za-z0-9\s]{2,20}(?:주식회사|㈜|\(주\)|컴퍼니|테크|시스템|서비스|그룹))/);
                if (coMatch) company = coMatch[0].trim();
                if (t.match(/현재|재직중|현직/)) company += '(재직중)';
            }

            return { name, birth, school: (t.match(/([가-힣]{2,12}(?:대학교|대학|사이버대|교육원))/) || [])[1] || '미확인', major, exp: formatExp(totalMonths), company };
        }

        async function startAnalysis() {
            const files = Array.from(document.getElementById('file-input').files);
            const btn = document.getElementById('btn-analyze');
            btn.disabled = true; btn.innerText = "분석 중...";
            
            for (let f of files) {
                // PDF/DOCX 파싱 생략 (getFileText 유틸 사용 권장)
                const d = parseResume("", f.name); // 시뮬레이션
                if (!results.find(r => r['이름'] === d.name)) {
                    results.unshift({
                        'No.': 0, '이름': d.name, '생년(만나이)': `${d.birth}년생 (만 ${CURRENT_YEAR-d.birth}세)`,
                        '성별': '남', '최종학력': '대졸', '최종학교': d.school, '전공': d.major, '총 경력': d.exp,
                        '최종회사': d.company, '면접상태': '미정', '적합도': '', '평가': '', '근거': ''
                    });
                }
            }
            saveData(); renderTable(); switchView('result');
            btn.disabled = false; btn.innerText = "AI 정밀 분석 시작";
        }

        function renderHead() {
            document.getElementById('table-head').innerHTML = `<tr>${COLUMNS.map(c => `<th class="p-4 ${c.class}">${c.title}</th>`).join('')}</tr>`;
        }

        function renderTable() {
            const body = document.getElementById('table-body');
            document.getElementById('count-bar').innerHTML = `총 <span class="text-blue-600 font-black text-xl">${results.length}</span>명의 데이터 누적`;
            if (results.length === 0) {
                body.innerHTML = `<tr><td colspan="16" class="p-32 text-gray-300 font-bold text-center">NO DATA</td></tr>`;
                return;
            }
            body.innerHTML = results.map((r, i) => `
                <tr class="hover:bg-blue-50/40 transition-colors">
                    <td class="text-center"><input type="checkbox" class="row-check" data-index="${i}"></td>
                    <td class="text-gray-400 font-semibold text-center">${results.length - i}</td>
                    <td class="col-name px-6">${r['이름']}</td>
                    <td class="col-birth text-blue-700 font-black text-center">${r['생년(만나이)']}</td>
                    <td class="text-center">${r['성별']}</td>
                    <td class="text-center">${r['최종학력']}</td>
                    <td class="col-school px-6">${r['최종학교']}</td>
                    <td class="col-major px-6">${r['전공']}</td>
                    <td class="col-exp px-2"><input type="text" class="border rounded px-2 py-1 text-[10px] w-full exp-input" data-index="${i}" value="${r['총 경력']}"></td>
                    <td class="text-center">${statusBadge(r['최종회사'], r['총 경력'])}</td>
                    <td class="col-company px-2"><input type="text" class="border rounded px-2 py-1 text-[10px] w-full company-input" data-index="${i}" value="${r['최종회사']}"></td>
                    <td class="col-interview"><select class="border rounded text-[10px] w-full interview-select" data-index="${i}">${['미정','서류통과','최종합격','불합격'].map(v => `<option ${r['면접상태']===v?'selected':''}>${v}</option>`).join('')}</select></td>
                    <td class="text-center">—</td>
                    <td class="col-fit"><select class="border rounded text-[10px] w-full fit-select" data-index="${i}">${['','적합','부적합'].map(v => `<option ${r['적합도']===v?'selected':''}>${v}</option>`).join('')}</select></td>
                    <td class="col-memo"><input type="text" class="border rounded px-2 py-1 text-[10px] w-full eval-input" data-index="${i}" value="${r['평가']||''}"></td>
                    <td class="col-memo"><input type="text" class="border rounded px-2 py-1 text-[10px] w-full note-input" data-index="${i}" value="${r['근거']||''}"></td>
                </tr>`).join('');
        }

        // 엑셀 다운로드 (기능 유지)
        function downloadXLSX() {
            const ws = XLSX.utils.json_to_sheet(results);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Results");
            XLSX.writeFile(wb, `EST_Analysis_${new Date().toISOString().slice(0,10)}.xlsx`);
        }
    </script>
</body>
</html>
