<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EST FAMILY - 채용 이력서 분석 시스템</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 상수 설정 ---
        const CLAUDE_MODEL = "claude-3-5-sonnet-20240620"; [cite: 8]
        const DEFAULT_PW = "estsoft2024"; [cite: 9]
        const SCORE_LABELS = {
            1: { label: "매우 부적합", sub: "직무 요건과 거의 일치하지 않음", color: "#dc2626", bg: "#fef2f2", border: "#fecaca" },
            2: { label: "부적합", sub: "일부 요건 충족, 보완 필요", color: "#ea580c", bg: "#fff7ed", border: "#fed7aa" },
            3: { label: "보통", sub: "기본 요건 충족, 추가 검토 필요", color: "#b45309", bg: "#fefce8", border: "#fde68a" },
            4: { label: "적합", sub: "직무 요건 충족, 적극 접촉 권장", color: "#15803d", bg: "#f0fdf4", border: "#86efac" },
            5: { label: "매우 적합", sub: "직무 요건에 탁월히 부합", color: "#1d4ed8", bg: "#eff6ff", border: "#93c5fd" }
        }; [cite: 12-21]

        // --- 헬퍼 함수 (파일 읽기) ---
        const readFileAsBase64 = (file) => new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result.split(",")[1]); [cite: 34, 37]
            r.onerror = rej;
            r.readAsDataURL(file); [cite: 35]
        });

        const readFileAsText = (file) => new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result); [cite: 36, 38]
            r.onerror = rej;
            r.readAsText(file); [cite: 39]
        });

        function App() {
            const [auth, setAuth] = useState(null);
            const [activeTab, setActiveTab] = useState("upload");
            const [results, setResults] = useState([]);
            const [files, setFiles] = useState([]);
            const [jd, setJd] = useState("");
            const [processing, setProcessing] = useState(false);
            const [apiKey, setApiKey] = useState(""); // 관리자 설정에서 입력 가능하도록 구성 가능
            const fileRef = useRef();

            // 데이터 로드/저장 (누적 관리)
            useEffect(() => {
                const saved = localStorage.getItem('est_resume_data');
                if (saved) setResults(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('est_resume_data', JSON.stringify(results));
            }, [results]);

            // --- 분석 로직 ---
            const handleAnalyze = async () => {
                if (!files.length) return; [cite: 193]
                setProcessing(true);
                setActiveTab("result"); [cite: 195]

                const newAnalyzedItems = [];
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    try {
                        let content;
                        const sysPrompt = `당신은 이력서 분석 전문가입니다. 반드시 JSON만 반환하세요: {"이름":"","생년":"","성별":"","최종학력":"","최종학교":"","경력":"","score":""}`; [cite: 166-167]

                        if (file.type === "application/pdf") {
                            const b64 = await readFileAsBase64(file); [cite: 169]
                            // 실제 API 호출 시 apiKey 필요
                            console.log(`${file.name} 분석 중...`); [cite: 162]
                        } else {
                            const text = await readFileAsText(file); [cite: 173]
                        }

                        // 가상의 결과 데이터 생성 (API 연동 전 테스트용)
                        const mockResult = {
                            id: Date.now() + i,
                            이름: file.name.split('.')[0],
                            최종학력: "학사",
                            경력: "3년 2개월", [cite: 167]
                            score: (Math.random() * 2 + 3).toFixed(1),
                            date: new Date().toLocaleDateString()
                        };
                        newAnalyzedItems.push(mockResult);
                    } catch (err) {
                        console.error("파일 분석 실패:", file.name, err); [cite: 188]
                    }
                }

                setResults(prev => [...newAnalyzedItems, ...prev]); // 최신 데이터가 위로 오게 누적
                setProcessing(false);
            };

            const resetResults = () => {
                if(confirm("모든 누적 데이터를 초기화할까요?")) {
                    setResults([]);
                    localStorage.removeItem('est_resume_data');
                }
            };

            return (
                <div className="flex min-h-screen bg-[#f9fafb]">
                    {/* 사이드바 */}
                    <aside className="w-[220px] bg-[#1e3a8a] text-white shrink-0"> [cite: 83]
                        <div className="p-5 border-b border-white/10">
                            <h1 className="text-xl font-black italic">EST FAMILY</h1> [cite: 86-87]
                            <p className="text-[10px] text-white/40">채용 이력서 분석 시스템</p> [cite: 88]
                        </div>
                        <nav className="p-3 space-y-1">
                            <button onClick={() => setActiveTab("upload")} className={`w-full text-left px-3 py-2 rounded ${activeTab==='upload'?'bg-white/10 font-bold':'text-white/60'}`}>업로드 & 설정</button> [cite: 78, 94]
                            <button onClick={() => setActiveTab("result")} className={`w-full text-left px-3 py-2 rounded ${activeTab==='result'?'bg-white/10 font-bold':'text-white/60'}`}>분석 결과</button> [cite: 80, 94]
                        </nav>
                    </aside>

                    {/* 메인 영역 */}
                    <main className="flex-1 flex flex-col">
                        <header className="bg-white border-b p-4 flex justify-between shadow-sm"> [cite: 419]
                            <span className="font-bold text-gray-700">{activeTab === 'upload' ? '업로드 & 설정' : '분석 결과'}</span> [cite: 422-423]
                            <div className="text-xs text-gray-500 font-bold flex items-center gap-1">
                                <span className="w-2 h-2 bg-green-500 rounded-full"></span> 일반 사용자 [cite: 433-435]
                            </div>
                        </header>

                        <div className="p-8 max-w-5xl mx-auto w-full">
                            {activeTab === 'upload' ? (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-lg border">
                                        <h3 className="text-sm font-bold mb-4 text-gray-800">이력서 업로드 <span className="text-gray-400 font-normal">- 최대 10개</span></h3> [cite: 235]
                                        <div onClick={() => fileRef.current.click()} className="border-2 border-dashed border-gray-200 rounded-lg p-10 text-center cursor-pointer bg-gray-50"> [cite: 236-238]
                                            <p className="text-blue-600 font-bold text-sm">클릭하거나 파일을 드래그하세요</p> [cite: 241]
                                            <input type="file" ref={fileRef} className="hidden" multiple onChange={(e) => setFiles(Array.from(e.target.files))} /> [cite: 243-244]
                                        </div>
                                        {files.length > 0 && <p className="mt-3 text-xs text-blue-500 font-bold">{files.length}개의 파일이 선택됨</p>}
                                    </div>

                                    <div className="bg-white p-6 rounded-lg border">
                                        <h3 className="text-sm font-bold mb-3 text-gray-800">직무 기술서 (JD)</h3> [cite: 268]
                                        <textarea value={jd} onChange={(e) => setJd(e.target.value)} className="w-full h-32 p-3 border rounded text-sm outline-none focus:ring-1 ring-blue-500" placeholder="예) 마케팅 기획 3년 이상..."></textarea> [cite: 270-271]
                                    </div>

                                    <button onClick={handleAnalyze} disabled={!files.length || processing} className="w-full bg-[#1d4ed8] text-white py-3 rounded-lg font-bold shadow-md disabled:bg-gray-300"> [cite: 273-274]
                                        {processing ? "AI 분석 중..." : `AI 분석 시작 (${files.length}개 이력서)`} 
                                    </button>
                                </div>
                            ) : (
                                <div className="bg-white rounded-lg border shadow-sm">
                                    <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                                        <h3 className="font-bold text-sm">총 {results.length}명 분석 결과</h3> [cite: 296]
                                        <button onClick={resetResults} className="text-[10px] text-red-500 hover:underline">기록 초기화</button>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-xs text-left">
                                            <thead className="bg-gray-50 border-b"> [cite: 303-304]
                                                <tr>
                                                    <th className="p-3 text-gray-500">No.</th> [cite: 317]
                                                    <th className="p-3 text-gray-700">이름</th> [cite: 318]
                                                    <th className="p-3 text-gray-700">최종학력</th> [cite: 320]
                                                    <th className="p-3 text-gray-700">총 경력</th> [cite: 323]
                                                    <th className="p-3 text-gray-700 text-center">JD 적합도</th> [cite: 338]
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {results.map((r, i) => (
                                                    <tr key={r.id} className="border-b hover:bg-gray-50 transition"> [cite: 316, 347]
                                                        <td className="p-3 text-gray-400">{results.length - i}</td>
                                                        <td className="p-3 font-bold text-gray-800">{r.이름}</td>
                                                        <td className="p-3 text-gray-600">{r.최종학력}</td>
                                                        <td className="p-3 text-gray-600">{r.경력}</td>
                                                        <td className="p-3 text-center">
                                                            <span style={{background: SCORE_LABELS[Math.round(r.score)]?.bg || '#eee', color: SCORE_LABELS[Math.round(r.score)]?.color || '#333'}} className="px-2 py-1 rounded-full font-bold text-[10px]">
                                                                {r.score}/5
                                                            </span> [cite: 61-64]
                                                        </td>
                                                    </tr>
                                                ))}
                                                {results.length === 0 && (
                                                    <tr>
                                                        <td colSpan="5" className="p-20 text-center text-gray-400">분석된 데이터가 없습니다.</td> [cite: 355]
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
